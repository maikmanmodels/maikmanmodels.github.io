<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maikman Models - Pro Stock v6.8.5</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
:root {
    --bg:#0f172a; --card:#1e293b; --text:#f8fafc; --accent:#38bdf8; --success:#22c55e; --danger:#ef4444;
}
body.light { --bg:#f1f5f9; --card:#ffffff; --text:#0f172a; --accent:#2563eb; }
* { box-sizing:border-box; transition: 0.2s; }
body { margin:0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background:var(--bg); color:var(--text); padding-bottom: 60px; }

/* Navegación */
.nav-tabs { display: flex; justify-content: space-around; background: var(--card); padding: 10px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.1); }
.tab-btn { background: none; border: none; color: var(--text); padding: 10px; cursor: pointer; font-weight: bold; opacity: 0.6; font-size: 12px; }
.tab-btn.active { opacity: 1; border-bottom: 2px solid var(--accent); color: var(--accent); }

#app { display:none; }
.content-section { display: none; padding: 15px; animation: fadeIn 0.3s; }
.content-section.active { display: block; }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* Grid de Modelos */
#grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
.card { background: var(--card); border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
.card img { width: 100%; height: 180px; object-fit: cover; cursor: pointer; }
.card-info { padding: 12px; flex-grow: 1; }
.card-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; padding: 10px; background: rgba(0,0,0,0.2); }

/* Botones */
.btn { padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 12px; color: white; text-align: center; }
.btn-blue { background: #3b82f6; }
.btn-purple { background: #8b5cf6; }
.btn-orange { background: #f59e0b; }
.btn-red { background: var(--danger); }

/* Mixer & Picker */
.mixer-container { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; }
.mixer-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
#canvasPicker { max-width: 100%; border-radius: 8px; cursor: crosshair; margin-top: 10px; display: none; border: 2px solid var(--accent); }

/* Modales */
.modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 15px; }
.modal-content { background: var(--bg); padding: 20px; border-radius: 15px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; }

input, select { width: 100%; padding: 10px; margin: 5px 0; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: white; }
</style>
</head>
<body>

<div id="login" style="max-width:350px; margin:100px auto; padding:20px; text-align:center;">
    <h2 style="color:var(--accent)">Maikman Models</h2>
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Contraseña">
    <button class="btn btn-blue" onclick="login()" style="width:100%; margin-top:10px;">Entrar</button>
</div>

<div id="app">
    <nav class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('tab-maquetas')">MODELOS</button>
        <button class="tab-btn" onclick="switchTab('tab-pinturas')">PINTURAS</button>
        <button class="tab-btn" onclick="switchTab('tab-mixer')">MIXER</button>
        <button class="tab-btn" onclick="openConfig()">⚙️</button>
    </nav>

    <section id="tab-maquetas" class="content-section active">
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <input id="search" placeholder="Buscar modelo o marca..." oninput="renderMaquetas()">
            <button class="btn btn-blue" onclick="startScanner()">📷</button>
            <button class="btn btn-blue" onclick="openForm()">➕</button>
        </div>
        <div id="grid"></div>
    </section>

    <section id="tab-pinturas" class="content-section">
        <select id="brandFilter" onchange="renderPinturas()"></select>
        <input id="paintSearch" placeholder="Buscar color..." oninput="renderPinturas()">
        <div id="paintGrid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(140px, 1fr)); gap:10px; margin-top:15px;"></div>
    </section>

    <section id="tab-mixer" class="content-section">
        <div class="mixer-container">
            <h4>🧪 Mezclador e Identificador</h4>
            <input type="file" id="imageInput" accept="image/*" onchange="loadPickerImage(event)" style="margin-bottom:10px;">
            <canvas id="canvasPicker"></canvas>
            <div id="matchResults" style="margin:10px 0; font-size:13px;"></div>
            
            <hr style="opacity:0.1; margin:15px 0;">
            
            <div id="mixerInputs" class="mixer-grid"></div>
            <div style="display:flex; align-items:center; gap:15px; margin-top:15px; background:rgba(0,0,0,0.2); padding:10px; border-radius:10px;">
                <div id="mixPreview" style="width:60px; height:60px; border-radius:50%; border:2px solid white;"></div>
                <div id="mixHex" style="font-weight:bold; font-family:monospace;">#------</div>
            </div>
            <button class="btn btn-red" onclick="resetMixer()" style="width:100%; margin-top:10px;">Limpiar Mixer</button>
        </div>
    </section>
</div>

<div id="formModal" class="modal">
    <div class="modal-content">
        <h3 id="formTitle">Nuevo Modelo</h3>
        <input type="hidden" id="f_id">
        <input id="f_codigo" placeholder="EAN / Referencia">
        <input id="f_marca" placeholder="Marca">
        <input id="f_modelo" placeholder="Nombre del Modelo">
        <input id="f_foto" placeholder="URL Foto Principal">
        <button class="btn btn-blue" onclick="saveModelo()" style="width:100%; margin-top:10px;">Guardar</button>
        <button class="btn" onclick="closeModal('formModal')" style="width:100%; margin-top:5px;">Cancelar</button>
    </div>
</div>

<div id="scanModal" class="modal">
    <div class="modal-content">
        <div id="reader" style="width:100%;"></div>
        <button class="btn btn-red" onclick="stopScanner()" style="width:100%; margin-top:10px;">Cerrar</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAtWLxQfVqsEt8fLZkGRN-3zSHuzKMUTk8",
  authDomain: "maikmanmodelsstock.firebaseapp.com",
  projectId: "maikmanmodelsstock",
  storageBucket: "maikmanmodelsstock.appspot.com",
  messagingSenderId: "871520809912",
  appId: "1:871520809912:web:4042f15ef200832a95d54d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let modelos = [];
let pinturas = {};
let html5QrCode = null;

// Lógica de Inicio
window.login = () => {
    const e = document.getElementById('email').value;
    const p = document.getElementById('password').value;
    signInWithEmailAndPassword(auth, e, p).catch(err => alert("Error"));
};

onAuthStateChanged(auth, user => {
    if(user) {
        document.getElementById('login').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        loadData();
    }
});

async function loadData() {
    const q = query(collection(db, "modelos"), orderBy("marca"));
    const snap = await getDocs(q);
    modelos = snap.docs.map(d => ({id: d.id, ...d.data()}));
    renderMaquetas();

    const pResp = await fetch('pinturas.json');
    pinturas = await pResp.json();
    initPinturasUI();
}

window.switchTab = (id) => {
    document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    event.currentTarget.classList.add('active');
};

// --- MODELOS ---
window.renderMaquetas = () => {
    const grid = document.getElementById('grid');
    const q = document.getElementById('search').value.toLowerCase();
    grid.innerHTML = "";
    modelos.filter(m => m.modelo.toLowerCase().includes(q) || m.marca.toLowerCase().includes(q)).forEach(m => {
        grid.innerHTML += `
            <div class="card">
                <img src="${m.foto || 'https://via.placeholder.com/300x180'}" onclick="window.open('${m.foto}')">
                <div class="card-info">
                    <div style="font-weight:bold">${m.modelo}</div>
                    <div style="font-size:12px; opacity:0.7">${m.marca}</div>
                </div>
                <div class="card-btns">
                    <button class="btn btn-orange" onclick="editModelo('${m.id}')">EDITAR</button>
                    <button class="btn btn-red" onclick="deleteModelo('${m.id}')">BORRAR</button>
                </div>
            </div>`;
    });
};

window.openForm = () => {
    document.getElementById('f_id').value = "";
    document.getElementById('f_codigo').value = "";
    document.getElementById('f_marca').value = "";
    document.getElementById('f_modelo').value = "";
    document.getElementById('f_foto').value = "";
    document.getElementById('formModal').style.display = 'flex';
};

window.saveModelo = async () => {
    const id = document.getElementById('f_id').value;
    const data = {
        codigo: document.getElementById('f_codigo').value,
        marca: document.getElementById('f_marca').value,
        modelo: document.getElementById('f_modelo').value,
        foto: document.getElementById('f_foto').value
    };
    if(id) await updateDoc(doc(db, "modelos", id), data);
    else await addDoc(collection(db, "modelos"), data);
    document.getElementById('formModal').style.display = 'none';
    loadData();
};

// --- MIXER ---
function initPinturasUI() {
    const brandSel = document.getElementById('brandFilter');
    brandSel.innerHTML = Object.keys(pinturas).map(b => `<option value="${b}">${b}</option>`).join('');
    
    const mixerDiv = document.getElementById('mixerInputs');
    mixerDiv.innerHTML = "";
    let options = `<option value="">- Seleccionar -</option>`;
    for(let b in pinturas) {
        options += `<optgroup label="${b}">`;
        pinturas[b].forEach(p => options += `<option value="${p.hex}">${p.id} - ${p.nombre}</option>`);
        options += `</optgroup>`;
    }

    for(let i=1; i<=4; i++) {
        mixerDiv.innerHTML += `
            <div style="background:rgba(255,255,255,0.05); padding:8px; border-radius:8px;">
                <select id="m_col_${i}" onchange="updateMixer()">${options}</select>
                <input type="range" id="m_qty_${i}" min="0" max="10" value="0" oninput="updateMixer()">
            </div>`;
    }
    renderPinturas();
}

window.updateMixer = () => {
    let r=0, g=0, b=0, total=0;
    for(let i=1; i<=4; i++) {
        const hex = document.getElementById(`m_col_${i}`).value;
        const qty = parseInt(document.getElementById(`m_qty_${i}`).value);
        if(hex && qty > 0) {
            const rgb = hexToRgb(hex);
            r += rgb.r * qty; g += rgb.g * qty; b += rgb.b * qty;
            total += qty;
        }
    }
    if(total > 0) {
        const finalHex = rgbToHex(Math.round(r/total), Math.round(g/total), Math.round(b/total));
        document.getElementById('mixPreview').style.backgroundColor = finalHex;
        document.getElementById('mixHex').innerText = finalHex;
    }
};

window.loadPickerImage = (e) => {
    const reader = new FileReader();
    reader.onload = (event) => {
        const img = new Image();
        img.onload = () => {
            const canvas = document.getElementById('canvasPicker');
            const ctx = canvas.getContext('2d');
            canvas.width = img.width; canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
            canvas.style.display = 'block';
        };
        img.src = event.target.result;
    };
    reader.readAsDataURL(e.target.files[0]);
};

document.getElementById('canvasPicker').addEventListener('click', (e) => {
    const canvas = document.getElementById('canvasPicker');
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (canvas.width / rect.width);
    const y = (e.clientY - rect.top) * (canvas.height / rect.height);
    const pixel = canvas.getContext('2d').getImageData(x, y, 1, 1).data;
    const hex = rgbToHex(pixel[0], pixel[1], pixel[2]);
    findMatches(pixel[0], pixel[1], pixel[2]);
});

function findMatches(r, g, b) {
    let all = [];
    for(let bnd in pinturas) pinturas[bnd].forEach(p => {
        const target = hexToRgb(p.hex);
        const dist = Math.sqrt((r-target.r)**2 + (g-target.g)**2 + (b-target.b)**2);
        all.push({...p, dist, bnd});
    });
    all.sort((a,b) => a.dist - b.dist);
    const top = all.slice(0, 3);
    document.getElementById('matchResults').innerHTML = "<b>Sugerencias:</b><br>" + 
        top.map(m => `<span style="color:${m.hex}">●</span> ${m.id} ${m.bnd} (${Math.round(m.dist)})`).join('<br>');
}

// --- ESCÁNER ---
window.startScanner = () => {
    document.getElementById('scanModal').style.display = 'flex';
    html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
        const m = modelos.find(x => x.codigo === text);
        if(m) {
            document.getElementById('search').value = m.modelo;
            renderMaquetas();
            stopScanner();
        } else {
            if(confirm("No encontrado. ¿Crear nuevo?")) {
                stopScanner();
                openForm();
                document.getElementById('f_codigo').value = text;
            }
        }
    }).catch(err => {
        console.log(err);
        stopScanner();
    });
};

window.stopScanner = () => {
    if(html5QrCode) html5QrCode.stop().then(() => {
        document.getElementById('scanModal').style.display = 'none';
        html5QrCode = null;
    });
    else document.getElementById('scanModal').style.display = 'none';
};

// Utils
function hexToRgb(h) { return { r: parseInt(h.slice(1,3),16), g: parseInt(h.slice(3,5),16), b: parseInt(h.slice(5,7),16) }; }
function rgbToHex(r, g, b) { return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1).toUpperCase(); }
window.closeModal = (id) => document.getElementById(id).style.display = 'none';

</script>
</body>
</html>
