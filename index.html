<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maikman Models - Pro Stock v5.3.0</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
:root {
    --bg:#0f172a; --card:#020617; --text:#e5e7eb; --accent:#38bdf8; --success:#00b894; --danger:#d63031;
    --min-card-width: 260px;
}
body.light { --bg:#f1f5f9; --card:#fff; --text:#020617; --accent:#2563eb; }
* { box-sizing:border-box; transition:.3s; }
body { margin:0; font-family:system-ui; background:var(--bg); color:var(--text); padding-bottom: 20px; }

/* Navegación - ORDEN SOLICITADO */
.nav-tabs {
    display: flex;
    align-items: center;
    background: var(--card);
    padding: 8px;
    gap: 4px;
    position: sticky;
    top: 0;
    z-index: 900;
    border-bottom: 1px solid #334155;
    overflow-x: auto;
}
.tab-btn {
    background:none;
    border:none;
    color:var(--text);
    padding: 10px 16px;
    cursor:pointer;
    font-weight:600;
    white-space:nowrap;
    border-radius: 6px;
}
.tab-btn.active { background:var(--accent); color:#000; }

.container { padding: 16px; max-width: 1200px; margin: auto; }
.view { display:none; }
.view.active { display:block; }

/* Estilos de Tarjetas */
.paint-grid {
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(var(--min-card-width), 1fr));
    gap: 12px;
    margin-top:10px;
}
.model-card, .paint-card {
    background:var(--card);
    padding: 15px;
    border-radius: 12px;
    border: 1px solid #334155;
    position: relative;
}
.color-swatch { width: 45px; height: 45px; border-radius: 8px; flex-shrink: 0; border: 1px solid #444; }

/* Formularios */
.form-group {
    display:grid;
    gap:10px;
    background:var(--card);
    padding:15px;
    border-radius:12px;
    margin-bottom:20px;
    border:1px solid var(--accent);
}
.form-group input {
    padding:12px;
    border-radius:6px;
    border:1px solid #334155;
    background:#0f172a;
    color:white;
}

/* Scanner */
#scannerModal {
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.9);
    z-index:2000;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}
#reader { width: 90%; max-width: 400px; border-radius: 12px; overflow: hidden; background: white; }
</style>
</head>
<body>

<div class="nav-tabs">
    <button class="tab-btn active" onclick="showTab('models', event)">📦 Maquetas</button>
    <button class="tab-btn" onclick="showTab('paints', event)">🎨 Pinturas</button>
    <button class="tab-btn" onclick="showTab('stats', event)">📊 Stats</button>
    <button class="tab-btn" onclick="abrirScanner()">📷 Scan</button>
    <button class="tab-btn" onclick="abrirCompra()" id="buyTab">🛒 Compra (0)</button>
    <div style="flex-grow:1"></div>
    <button class="tab-btn" onclick="document.body.classList.toggle('light')">🌓</button>
</div>

<div class="container">
    
    <div id="modelsView" class="view active">
        <div class="form-group">
            <input type="text" id="mFab" placeholder="Fabricante (Tamiya, Revell...)">
            <input type="text" id="mMod" placeholder="Nombre del Modelo">
            <input type="text" id="mCod" placeholder="Código de Referencia">
            <input type="number" id="mPre" placeholder="Precio (€)">
            <button class="tab-btn" style="background:var(--success); color:black" onclick="addModelo()">Añadir Maqueta</button>
        </div>
        <div class="paint-grid" id="modelsGrid"></div>
    </div>

    <div id="paintsView" class="view">
        <div style="display:flex; gap:10px; margin-bottom:15px">
            <input type="text" id="paintSearch" class="tab-btn" style="flex-grow:1; text-align:left; background:var(--card); border:1px solid #334155" placeholder="Buscar pintura..." oninput="renderPaints()">
            <select id="filterStock" class="tab-btn" style="background:var(--card); border:1px solid #334155" onchange="renderPaints()">
                <option value="all">Todas</option>
                <option value="owned">En Stock</option>
                <option value="missing">Sin Stock</option>
            </select>
        </div>
        <div id="paintsContainer"></div>
    </div>

    <div id="statsView" class="view">
        <canvas id="stockChart" style="max-height:400px"></canvas>
    </div>

</div>

<div id="scannerModal">
    <div id="reader"></div>
    <button class="tab-btn" style="margin-top:20px; background:var(--danger)" onclick="cerrarScanner()">Cancelar</button>
</div>

<script>
let paintCatalogData = {};
let myPaints = { stock: {}, buy: [] };
let modelos = [];
let html5QrCode = null;
let stockChart = null;

// INICIO CARGA
async function init() {
    // A. CARGAR MODELOS DESDE LOCALSTORAGE (Prioridad absoluta)
    try {
        const storedModels = localStorage.getItem('maikman_models_v5');
        if (storedModels) {
            modelos = JSON.parse(storedModels);
            renderModelos();
        }
        
        const storedPaints = localStorage.getItem('maikman_paints_v5');
        if (storedPaints) myPaints = JSON.parse(storedPaints);
    } catch(e) { console.error("Error cargando locales:", e); }

    // B. CARGAR CATÁLOGO EXTERNO (Si falla, no bloquea lo anterior)
    try {
        const response = await fetch('pinturas.json');
        if (response.ok) {
            paintCatalogData = await response.json();
            renderPaints();
            actualizarGrafico();
        } else {
            console.warn("No se pudo cargar pinturas.json");
        }
    } catch(e) { console.error("Error en archivo de pinturas:", e); }
}

// LÓGICA DE MAQUETAS
function renderModelos() {
    const grid = document.getElementById('modelsGrid');
    if (!grid) return;
    grid.innerHTML = '';
    modelos.forEach(m => {
        grid.innerHTML += `
            <div class="model-card">
                <div style="color:var(--accent); font-size:0.8em; font-weight:bold">${m.fabricante}</div>
                <div style="font-size:1.1em; margin:5px 0">${m.modelo}</div>
                <div style="color:gray; font-size:0.8em">${m.codigo || '-'}</div>
                <div style="display:flex; justify-content:space-between; margin-top:10px; align-items:center">
                    <span style="color:var(--success); font-weight:bold">${m.precio}€</span>
                    <button onclick="deleteModel(${m.id})" style="color:var(--danger); background:none; border:none; cursor:pointer">Eliminar</button>
                </div>
            </div>`;
    });
}

window.addModelo = () => {
    const m = { 
        id: Date.now(), 
        fabricante: document.getElementById('mFab').value, 
        modelo: document.getElementById('mMod').value, 
        codigo: document.getElementById('mCod').value, 
        precio: document.getElementById('mPre').value 
    };
    if(!m.modelo) return alert("El nombre del modelo es obligatorio");
    modelos.push(m);
    localStorage.setItem('maikman_models_v5', JSON.stringify(modelos));
    renderModelos();
    document.querySelectorAll('.form-group input').forEach(i => i.value = '');
};

window.deleteModel = (id) => {
    if(!confirm("¿Eliminar maqueta?")) return;
    modelos = modelos.filter(m => m.id !== id);
    localStorage.setItem('maikman_models_v5', JSON.stringify(modelos));
    renderModelos();
};

// NAVEGACIÓN
function showTab(tab, event) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tab + 'View').classList.add('active');
    if(event) event.currentTarget.classList.add('active');
}

// SCANNER (Optimizado para móvil)
window.abrirScanner = () => {
    document.getElementById('scannerModal').style.display = 'flex';
    html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start(
        { facingMode: "environment" }, 
        { fps: 10, qrbox: 250 },
        (text) => {
            alert("Código detectado: " + text);
            cerrarScanner();
        }
    ).catch(err => {
        alert("Error de cámara: " + err);
        cerrarScanner();
    });
};

window.cerrarScanner = () => {
    if (html5QrCode) {
        html5QrCode.stop().finally(() => {
            document.getElementById('scannerModal').style.display = 'none';
        });
    } else {
        document.getElementById('scannerModal').style.display = 'none';
    }
};

// (Las funciones de renderPaints y actualizarGrafico van aquí abajo, igual que en tu index 7 original)
function renderPaints() { /* ... tu lógica original ... */ }
function actualizarGrafico() { /* ... tu lógica original ... */ }

init();
</script>
</body>
</html>
