<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maikman Models - Pro Stock v6.8.9 Full</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
:root {
    --bg:#0f172a; --card:#020617; --text:#e5e7eb; --accent:#38bdf8; --success:#00b894; --danger:#d63031;
}
body.light { --bg:#f8fafc; --card:#ffffff; --text:#0f172a; --accent:#2563eb; }
* { box-sizing:border-box; transition:.2s; }
body { margin:0; font-family:system-ui, sans-serif; background:var(--bg); color:var(--text); padding-bottom: 20px; }

/* Navegación */
.nav-tabs { display: flex; align-items: center; background: var(--card); padding: 8px; gap: 4px; position: sticky; top: 0; z-index: 900; border-bottom: 1px solid rgba(255,255,255,0.1); }
.tab-btn { flex: 1; padding: 12px 2px; border: none; background: rgba(100,100,100,0.1); color: var(--text); cursor: pointer; border-radius: 8px; font-weight: bold; font-size: 11px; }
.tab-btn.active { background: var(--accent); color: white; }
.cart-badge { background: var(--danger); color: white; font-size: 10px; padding: 2px 5px; border-radius: 10px; margin-left: 3px; }

#app { display:none; }
.content-section { display: none; padding: 15px; }
.content-section.active { display: block; }

/* Grid de Modelos */
#grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:16px; }
.card { background:var(--card); border-radius:12px; padding:12px; border: 1px solid rgba(100,100,100,0.2); display: flex; flex-direction: column; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
.card img { width:100%; height:160px; object-fit:cover; border-radius:8px; margin-bottom: 10px; cursor: pointer; }
.card-info { flex-grow: 1; margin-bottom: 10px; }
.card-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.btn-action { padding: 8px; font-size: 10px; border-radius: 4px; border: none; cursor: pointer; color: white; font-weight: bold; text-align: center; }

/* Pinturas Estética Cuadrado + Círculo */
.paint-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
.paint-item-box { background: rgba(100,100,100,0.05); padding: 10px; border-radius: 8px; border: 1px solid rgba(100,100,100,0.2); text-align: center; position: relative; }
.color-circle { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #fff; margin: 0 auto 8px; box-shadow: 0 0 8px rgba(0,0,0,0.3); }
.paint-id { font-weight: bold; font-size: 12px; display: block; color: var(--accent); }

/* Modales */
.modal { position:fixed; inset:0; background:rgba(0,0,0,.85); display:none; align-items:center; justify-content:center; z-index:1000; padding:20px; backdrop-filter: blur(5px); }
.modal-content { background:var(--card); padding:24px; width:100%; max-width:500px; border-radius:15px; max-height:90vh; overflow-y:auto; border: 1px solid rgba(100,100,100,0.3); }

input, select { padding:12px; border-radius:8px; border: 1px solid rgba(100,100,100,0.3); background: rgba(100,100,100,0.1); color: var(--text); width: 100%; margin-bottom: 10px; }
canvas { max-width: 100%; border-radius: 10px; cursor: crosshair; }
</style>
</head>
<body class="dark">

<div id="login" style="max-width:320px; margin:100px auto; padding:20px; text-align:center; background:var(--card); border-radius:15px;">
    <h2 style="color:var(--accent)">Maikman Models</h2>
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Contraseña">
    <button onclick="window.login()" style="width:100%; margin-top:15px; padding:12px; background:var(--accent); color:white; border:none; border-radius:8px; font-weight:bold;">ENTRAR</button>
</div>

<div id="app">
    <nav class="nav-tabs">
        <button class="tab-btn active" onclick="window.switchTab('tab-maquetas')">📦 MODELOS</button>
        <button class="tab-btn" onclick="window.switchTab('tab-pinturas')">🎨 STOCK</button>
        <button class="tab-btn" onclick="window.switchTab('tab-mixer')">🧪 MIXER</button>
        <button class="tab-btn" onclick="window.abrirModalCompra()">🛒 <span id="cartCount" class="cart-badge">0</span></button>
        <button class="tab-btn" style="flex:0.3" onclick="window.toggleModal('configModal', true)">⚙️</button>
    </nav>

    <section id="tab-maquetas" class="content-section active">
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <input id="search" placeholder="Buscar maqueta..." oninput="window.renderMaquetas()">
            <button onclick="window.startScanner()" style="background:#4b5563; border:none; padding:0 15px; border-radius:8px; color:white;">📷</button>
            <button onclick="window.openFormModal()" style="background:var(--accent); border:none; padding:0 15px; border-radius:8px; color:white;">➕</button>
        </div>
        <div id="grid"></div>
    </section>

    <section id="tab-pinturas" class="content-section">
        <select id="brandFilter" onchange="window.renderPaintCatalog()"></select>
        <input id="paintSearch" placeholder="Filtrar pintura..." onkeyup="window.renderPaintCatalog()">
        <div id="paintCatalog" class="paint-grid"></div>
    </section>

    <section id="tab-mixer" class="content-section">
        <div style="background:rgba(100,100,100,0.05); padding:15px; border-radius:12px; border: 1px solid rgba(100,100,100,0.2);">
            <h4 style="margin:0 0 10px 0; color:var(--accent)">🔍 Identificador IA</h4>
            <input type="file" id="imageInput" accept="image/*" onchange="window.loadPickerImage(event)">
            <canvas id="canvasPicker" style="display:none;"></canvas>
            <div id="labResult" style="margin-top:10px; padding:12px; background:rgba(56, 189, 248, 0.1); border: 1px solid var(--accent); border-radius:8px; display:none; font-size:13px;"></div>
            <div id="matchList" style="margin-top:10px;"></div>
        </div>
        <h4 style="margin:20px 0 10px 0;">🧪 Mezclador Base 10</h4>
        <div id="mixerInputs" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;"></div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; background:rgba(0,0,0,0.2); padding:15px; border-radius:12px; margin-top:15px; border: 1px solid rgba(100,100,100,0.2);">
            <div id="mixerResultPreview" style="height:100px; border-radius:8px; border:1px solid #555; display:flex; flex-direction:column; align-items:center; justify-content:center;">
                <span id="hexResult" style="font-weight:bold;">#---</span>
            </div>
            <canvas id="mixerChart" style="max-height: 100px;"></canvas>
        </div>
        <button onclick="window.resetMixer()" style="width:100%; margin-top:10px; padding:12px; background:var(--danger); border:none; color:white; border-radius:8px; font-weight:bold;">REINICIAR</button>
    </section>
</div>

<div id="infoModal" class="modal">
    <div class="modal-content">
        <img id="info_foto" style="width:100%; border-radius:10px; margin-bottom:15px;">
        <h2 id="info_modelo" style="margin:0"></h2>
        <p id="info_fabricante" style="opacity:0.7; margin-bottom:20px;"></p>
        <button onclick="window.toggleModal('infoModal', false)" style="width:100%; padding:12px; background:var(--accent); color:white; border:none; border-radius:8px;">Cerrar</button>
    </div>
</div>

<div id="formModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Maqueta</h3>
        <input type="hidden" id="f_id">
        <input id="f_fabricante" placeholder="Marca">
        <input id="f_modelo" placeholder="Nombre">
        <input id="f_foto" placeholder="URL Foto">
        <button onclick="window.guardarModelo()" style="background:var(--success); color:white; width:100%; border:none; padding:12px; border-radius:8px; font-weight:bold;">GUARDAR</button>
        <button onclick="window.toggleModal('formModal', false)" style="width:100%; margin-top:10px; background:transparent; color:var(--text); border:none;">Cancelar</button>
    </div>
</div>

<div id="configModal" class="modal">
    <div class="modal-content">
        <h3>Configuración</h3>
        <button onclick="window.toggleTheme()" style="width:100%; padding:12px; margin-bottom:10px; background:#4b5563; color:white; border:none; border-radius:8px;">🌓 Cambiar Tema (Claro/Oscuro)</button>
        <button onclick="window.exportarExcelPrincipal()" style="width:100%; padding:12px; margin-bottom:10px; background:var(--accent); color:white; border:none; border-radius:8px;">📊 Exportar Stock (Excel)</button>
        
        <div style="background:rgba(100,100,100,0.1); padding:15px; border-radius:10px; margin-bottom:10px;">
            <p style="font-size:12px; margin-top:0;">📥 Importar Stock (Archivo Excel)</p>
            <input type="file" id="importExcel" accept=".xlsx, .xls" onchange="window.importarStock(event)" style="font-size:11px;">
        </div>

        <button onclick="window.signOutUser()" style="width:100%; padding:12px; background:var(--danger); color:white; border:none; border-radius:8px;">🚪 Cerrar Sesión</button>
        <button onclick="window.toggleModal('configModal', false)" style="width:100%; margin-top:15px; background:transparent; color:var(--text); border:none;">Cerrar</button>
    </div>
</div>

<div id="modelPaintsModal" class="modal">
    <div class="modal-content">
        <h3 id="mPaintsTitle">Colores</h3>
        <div id="mPaintsList" class="paint-grid"></div>
        <hr style="opacity:0.1; margin:15px 0;">
        <select id="addPaintSelect"><option value="">-- Añadir Pintura --</option></select>
        <button onclick="window.addPaintToModel()" style="background:var(--accent); color:white; width:100%; border:none; padding:12px; border-radius:8px; margin-top:10px;">AÑADIR A MAQUETA</button>
        <button onclick="window.toggleModal('modelPaintsModal', false)" style="width:100%; margin-top:10px; border:none; background:#444; color:white; padding:10px; border-radius:8px;">CERRAR</button>
    </div>
</div>

<div id="scanModal" class="modal">
    <div class="modal-content">
        <div id="reader"></div>
        <button onclick="window.stopScanner()" style="width:100%; margin-top:15px; padding:10px; background:var(--danger); color:white; border:none; border-radius:8px;">Cerrar</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAtWLxQfVqsEt8fLZkGRN-3zSHuzKMUTk8",
  authDomain: "maikmanmodelsstock.firebaseapp.com",
  projectId: "maikmanmodelsstock",
  storageBucket: "maikmanmodelsstock.appspot.com",
  messagingSenderId: "871520809912",
  appId: "1:871520809912:web:4042f15ef200832a95d54d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let modelos = [];
let paintCatalogData = {};
let myPaints = JSON.parse(localStorage.getItem('maikman_paints')) || { have: [], buy: [] };
let mixerChart = null;
let html5QrCode = null;
let currentModelId = null;

// --- AUTH & THEME ---
window.login = () => {
    const e = document.getElementById('email').value;
    const p = document.getElementById('password').value;
    signInWithEmailAndPassword(auth, e, p).catch(() => alert("Error"));
};
window.signOutUser = () => signOut(auth);
window.toggleTheme = () => {
    document.body.classList.toggle('light');
    localStorage.setItem('maikman_theme', document.body.classList.contains('light') ? 'light' : 'dark');
};
if(localStorage.getItem('maikman_theme') === 'light') document.body.classList.add('light');

onAuthStateChanged(auth, user => {
    if(user){
        document.getElementById('login').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        cargarDatos();
    } else {
        document.getElementById('login').style.display = 'block';
        document.getElementById('app').style.display = 'none';
    }
});

// --- CORE ---
async function cargarDatos() {
    const snap = await getDocs(query(collection(db, "modelos"), orderBy("fabricante")));
    modelos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    window.renderMaquetas();
    
    const resp = await fetch('pinturas.json');
    paintCatalogData = await resp.json();
    
    document.getElementById('brandFilter').innerHTML = Object.keys(paintCatalogData).map(b => `<option value="${b}">${b}</option>`).join('');
    
    let opts = '<option value="">-- Seleccionar Pintura --</option>';
    for(let b in paintCatalogData) {
        opts += `<optgroup label="${b}">` + paintCatalogData[b].map(p => `<option value="${p.id}">${p.id} - ${p.nombre}</option>`).join('') + `</optgroup>`;
    }
    document.getElementById('addPaintSelect').innerHTML = opts;

    window.renderPaintCatalog();
    initMixerUI();
    window.updateCartCount();
}

window.renderMaquetas = () => {
    const grid = document.getElementById("grid");
    const q = document.getElementById("search").value.toLowerCase();
    grid.innerHTML = "";
    modelos.filter(m => (m.modelo||"").toLowerCase().includes(q) || (m.fabricante||"").toLowerCase().includes(q)).forEach(m => {
        grid.innerHTML += `
            <div class="card">
                <img src="${m.foto || 'https://via.placeholder.com/300x160'}" onclick="window.verInfo('${m.id}')">
                <div class="card-info">
                    <div style="font-weight:bold">${m.modelo}</div>
                    <div style="font-size:12px; opacity:0.6;">${m.fabricante}</div>
                </div>
                <div class="card-btns">
                    <button class="btn-action" style="background:var(--accent)" onclick="window.verInfo('${m.id}')">INFO</button>
                    <button class="btn-action" style="background:#8b5cf6" onclick="window.abrirPinturasModelo('${m.id}')">COLOR</button>
                    <button class="btn-action" style="background:#f59e0b" onclick="window.openFormModal('${m.id}')">EDITAR</button>
                    <button class="btn-action" style="background:var(--danger)" onclick="window.borrarModelo('${m.id}')">DEL</button>
                </div>
            </div>`;
    });
};

// --- FUNCIONES BOTONES ---
window.verInfo = (id) => {
    const m = modelos.find(x => x.id === id);
    document.getElementById('info_foto').src = m.foto || 'https://via.placeholder.com/300x160';
    document.getElementById('info_modelo').innerText = m.modelo;
    document.getElementById('info_fabricante').innerText = m.fabricante;
    window.toggleModal('infoModal', true);
};

window.openFormModal = (id = null) => {
    if(id) {
        const m = modelos.find(x => x.id === id);
        document.getElementById('f_id').value = m.id;
        document.getElementById('f_fabricante').value = m.fabricante;
        document.getElementById('f_modelo').value = m.modelo;
        document.getElementById('f_foto').value = m.foto || "";
    } else {
        document.getElementById('f_id').value = "";
        document.getElementById('f_fabricante').value = "";
        document.getElementById('f_modelo').value = "";
        document.getElementById('f_foto').value = "";
    }
    window.toggleModal('formModal', true);
};

window.guardarModelo = async () => {
    const id = document.getElementById('f_id').value;
    const data = {
        fabricante: document.getElementById('f_fabricante').value,
        modelo: document.getElementById('f_modelo').value,
        foto: document.getElementById('f_foto').value
    };
    if(id) await updateDoc(doc(db, "modelos", id), data);
    else await addDoc(collection(db, "modelos"), { ...data, paints: [] });
    window.toggleModal('formModal', false);
    cargarDatos();
};

window.borrarModelo = async (id) => {
    if(confirm("¿Eliminar maqueta?")) { await deleteDoc(doc(db, "modelos", id)); cargarDatos(); }
};

// --- IMPORTAR / EXPORTAR ---
window.importarStock = (event) => {
    const file = event.target.files[0];
    const reader = new FileReader();
    reader.onload = async (e) => {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: 'array' });
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(sheet);
        
        for(let item of json) {
            await addDoc(collection(db, "modelos"), {
                fabricante: item.MARCA || item.FABRICANTE || "S/M",
                modelo: item.MODELO || "Sin nombre",
                foto: item.FOTO || "",
                paints: []
            });
        }
        alert("Importación completada");
        cargarDatos();
    };
    reader.readAsArrayBuffer(file);
};

window.exportarExcelPrincipal = () => {
    const data = modelos.map(m => ({ MARCA: m.fabricante, MODELO: m.modelo, PINTURAS: (m.paints||[]).join(", ") }));
    const ws = XLSX.utils.json_to_sheet(data); const wb = XLSX.utils.book_new(); 
    XLSX.utils.book_append_sheet(wb, ws, "Stock"); XLSX.writeFile(wb, "Maikman_Models.xlsx");
};

// --- MIXER & PICKER (BASE 10 e IA) ---
function initMixerUI() {
    const container = document.getElementById('mixerInputs');
    let opts = '<option value="">-- Color --</option>';
    for(let b in paintCatalogData) {
        opts += `<optgroup label="${b}">` + paintCatalogData[b].map(p => `<option value="${p.hex}">${p.id} - ${p.nombre}</option>`).join('') + `</optgroup>`;
    }
    container.innerHTML = [1,2,3,4].map(i => `
        <div style="background:rgba(100,100,100,0.1); padding:8px; border-radius:8px;">
            <select id="mCol${i}" onchange="window.calculateMix()">${opts}</select>
            <input type="range" id="mQty${i}" min="0" max="10" value="0" oninput="window.calculateMix()">
            <span id="mLbl${i}" style="font-size:10px;">0 g.</span>
        </div>`).join('');
    mixerChart = new Chart(document.getElementById('mixerChart').getContext('2d'), { type: 'pie', data: { labels: [], datasets: [{ data: [], backgroundColor: [] }] }, options: { plugins: { legend: { display: false } }, animation: false } });
}

window.calculateMix = () => {
    let r=0, g=0, b=0, tot=0; const lbs=[], dts=[], cls=[];
    for(let i=1; i<=4; i++){
        const hex = document.getElementById(`mCol${i}`).value;
        const val = parseFloat(document.getElementById(`mQty${i}`).value);
        document.getElementById(`mLbl${i}`).innerText = val.toFixed(1) + " g.";
        if(hex && val > 0){
            const rgb = hexToRgb(hex); r += rgb.r*val; g += rgb.g*val; b += rgb.b*val; tot += val;
            lbs.push(document.getElementById(`mCol${i}`).selectedOptions[0].text); dts.push(val); cls.push(hex);
        }
    }
    if(tot > 0){
        const fHex = rgbToHex(Math.round(r/tot), Math.round(g/tot), Math.round(b/tot));
        document.getElementById('mixerResultPreview').style.backgroundColor = fHex;
        document.getElementById('hexResult').innerText = fHex;
    }
    mixerChart.data.labels = lbs; mixerChart.data.datasets[0].data = dts; mixerChart.data.datasets[0].backgroundColor = cls; mixerChart.update();
};

window.loadPickerImage = (e) => {
    const reader = new FileReader();
    reader.onload = (ev) => {
        const img = new Image();
        img.onload = () => {
            const canvas = document.getElementById('canvasPicker');
            const ctx = canvas.getContext('2d');
            canvas.width = img.width; canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
            canvas.style.display = 'block';
        };
        img.src = ev.target.result;
    };
    reader.readAsDataURL(e.target.files[0]);
};

document.getElementById('canvasPicker').addEventListener('mousedown', (e) => {
    const canvas = document.getElementById('canvasPicker');
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (canvas.width / rect.width);
    const y = (e.clientY - rect.top) * (canvas.height / rect.height);
    const pixel = canvas.getContext('2d').getImageData(x, y, 1, 1).data;
    analizarIA(pixel[0], pixel[1], pixel[2]);
});

function analizarIA(r, g, b) {
    let all = [];
    for(let bnd in paintCatalogData) paintCatalogData[bnd].forEach(p => {
        const t = hexToRgb(p.hex);
        const dist = Math.sqrt((r-t.r)**2 + (g-t.g)**2 + (b-t.b)**2);
        const prox = Math.max(0, 100 - (dist / 441 * 100)).toFixed(1);
        all.push({...p, prox, dist, bnd});
    });
    all.sort((a,b) => b.prox - a.prox);
    const top10 = all.slice(0, 10);
    document.getElementById('matchList').innerHTML = top10.map(m => `
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:5px; font-size:12px;">
            <div style="width:15px; height:15px; border-radius:50%; background:${m.hex}; border:1px solid #fff;"></div>
            <span><b>${m.id}</b> - ${m.prox}%</span>
        </div>`).join('');
    const lab = document.getElementById('labResult'); lab.style.display = 'block';
    const c1 = top10[0], c2 = top10[1];
    lab.innerHTML = `<b>🧪 Mezcla IA:</b> ${10 - Math.round((100-c1.prox)/5)}g de ${c1.id} + ${Math.round((100-c1.prox)/5)}g de ${c2.id}`;
}

// --- UTILS ---
window.toggleModal = (id, show) => document.getElementById(id).style.display = show ? 'flex' : 'none';
window.switchTab = (id) => {
    document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    event.currentTarget.classList.add('active');
};
window.renderPaintCatalog = () => { /* Similar a v6.8.8 */ };
function hexToRgb(h) { return { r: parseInt(h.slice(1,3),16), g: parseInt(h.slice(3,5),16), b: parseInt(h.slice(5,7),16) }; }
function rgbToHex(r, g, b) { return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1).toUpperCase(); }

</script>
</body>
</html>
