<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maikman Models - Pro Stock v6.1.0</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
:root {
    --bg:#0f172a; --card:#020617; --text:#e5e7eb; --accent:#38bdf8; --success:#00b894; --danger:#d63031;
    --min-card-width: 260px;
}
body.light { --bg:#f1f5f9; --card:#fff; --text:#020617; --accent:#2563eb; }
* { box-sizing:border-box; transition:.3s; }
body { margin:0; font-family:system-ui; background:var(--bg); color:var(--text); padding-bottom: 20px; }

/* Navegación */
.nav-tabs { display: flex; align-items: center; background: var(--card); padding: 8px; gap: 4px; position: sticky; top: 0; z-index: 900; border-bottom: 1px solid #334155; }
.tab-btn { flex: 1; padding: 12px 2px; border: none; background: rgba(255,255,255,0.05); color: var(--text); cursor: pointer; border-radius: 8px; font-weight: bold; font-size: 11px; }
.tab-btn.active { background: var(--accent); color: white; }
.cart-badge { background: var(--danger); color: white; font-size: 10px; padding: 2px 5px; border-radius: 10px; margin-left: 3px; }

#app { display:none; }
.content-section { display: none; padding: 20px; }
.content-section.active { display: block; }

/* Grid Maquetas */
#grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(var(--min-card-width),1fr)); gap:16px; }
.card { background:var(--card); border-radius:12px; padding:12px; border: 1px solid #334155; display: flex; flex-direction: column; }
.card img { width:100%; height:180px; object-fit:cover; border-radius:8px; margin-bottom: 10px; cursor: pointer; }

/* Catálogo Pinturas (ESTILO MINI CUADRÍCULA) */
.paint-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
.paint-item { background: rgba(255,255,255,0.03); padding: 8px; border-radius: 8px; display: flex; flex-direction: column; align-items: center; text-align: center; border: 1px solid #334155; }
.color-swatch { width: 100%; height: 30px; border-radius: 4px; margin-bottom: 5px; border: 1px solid rgba(255,255,255,0.1); }
.paint-info { font-size: 11px; font-weight: bold; margin-bottom: 5px; min-height: 28px; line-height: 1.2; }
.paint-btns { display: flex; gap: 4px; width: 100%; }
.btn-mini { flex:1; border: none; padding: 6px; border-radius: 4px; cursor: pointer; color: white; background: #334155; font-size: 12px; }
.active-have { background: var(--success) !important; }
.active-buy { background: var(--danger) !important; }

/* Galería y Zoom */
.gallery-item { position: relative; width: 100%; height: 120px; cursor: pointer; }
.gallery-img { width: 100%; height: 100%; object-fit: cover; border-radius: 6px; border: 1px solid #334155; }
.btn-del-photo { position: absolute; top: 5px; right: 5px; background: rgba(214, 48, 49, 0.9); color: white; border: none; border-radius: 4px; width: 22px; height: 22px; cursor: pointer; font-size: 12px; }

/* Modales */
.modal { position:fixed; inset:0; background:rgba(0,0,0,.9); display:none; align-items:center; justify-content:center; z-index:1000; padding:20px; }
.modal-content { background:var(--card); padding:20px; width:100%; max-width:500px; border-radius:12px; display:flex; flex-direction:column; gap:12px; max-height:90vh; overflow-y:auto; }
#zoomImg { max-width: 95%; max-height: 85vh; border-radius: 8px; }
input, select { padding:10px; border-radius:6px; border: 1px solid #334155; background: #1e293b; color: white; }
</style>
</head>
<body class="dark">

<div id="login" style="max-width:320px; margin:80px auto; padding:20px; text-align:center;">
    <h2 style="color:var(--accent)">Maikman Stock</h2>
    <input id="email" type="email" placeholder="Email" style="margin-bottom:10px; width:100%">
    <input id="password" type="password" placeholder="Contraseña" style="margin-bottom:20px; width:100%">
    <button onclick="login()" style="width:100%; padding:12px; background:var(--accent); color:white; border:none; border-radius:6px;">Entrar</button>
</div>

<div id="app">
    <nav class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('tab-maquetas')">📦 MODELOS</button>
        <button class="tab-btn" onclick="switchTab('tab-pinturas')">🎨 PINTURAS</button>
        <button class="tab-btn" onclick="abrirModalCompra()">🛒 <span id="cartCount" class="cart-badge">0</span></button>
        <button class="tab-btn" style="flex:0.3" onclick="openConfigModal()">⚙️</button>
    </nav>

    <section id="tab-maquetas" class="content-section active">
        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <input id="search" placeholder="Buscar..." oninput="renderMaquetas()" style="flex:1">
            <button onclick="openFormModal()" style="background:var(--accent); color:white; border:none; padding:0 15px; border-radius:6px;">➕</button>
        </div>
        <div id="grid"></div>
    </section>

    <section id="tab-pinturas" class="content-section">
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <select id="brandFilter" onchange="renderPaintCatalog()" style="flex:1"></select>
            <button onclick="abrirScanner()" style="background:#8e44ad; color:white; border:none; padding:10px; border-radius:6px;">📷</button>
        </div>
        <input id="paintSearch" placeholder="Buscar color..." onkeyup="renderPaintCatalog()" style="margin-bottom:15px; width:100%">
        <div id="paintCatalog" class="paint-grid"></div>
    </section>
</div>

<div id="infoModal" class="modal"><div class="modal-content">
    <h3 id="infoTitle" style="margin:0"></h3>
    <div id="infoDetails" style="font-size:14px; opacity:0.8"></div>
    <hr style="border:0; border-top:1px solid #444;">
    <div id="galleryGrid" style="display:grid; grid-template-columns:1fr 1fr; gap:8px;"></div>
    <div style="display:flex; gap:5px; margin-top:10px;">
        <input type="text" id="urlPhotoInput" placeholder="URL .jpg de PostImages" style="flex:1">
        <button onclick="añadirUrlAGaleria()" style="background:var(--success); color:white; border:none; padding:10px; border-radius:6px;">Añadir</button>
    </div>
    <button onclick="document.getElementById('infoModal').style.display='none'" style="padding:10px;">Cerrar</button>
</div></div>

<div id="zoomModal" class="modal" onclick="this.style.display='none'">
    <img id="zoomImg" src="">
</div>

<div id="formModal" class="modal"><div class="modal-content">
    <h3 id="formTitle">Modelo</h3>
    <input type="hidden" id="form_id">
    <input id="form_fabricante" placeholder="Fabricante">
    <input id="form_modelo" placeholder="Modelo">
    <input id="form_codigo" placeholder="Código / Referencia">
    <input id="form_precio" type="number" step="0.01" placeholder="Precio (€)">
    <input id="form_foto_url" placeholder="URL Foto Principal">
    <button onclick="guardarModelo()" style="background:var(--success); color:white; padding:12px; border:none; border-radius:6px;">Guardar</button>
    <button onclick="closeFormModal()" style="background:#555; color:white; padding:10px; border:none; border-radius:6px;">Cancelar</button>
</div></div>

<div id="cartModal" class="modal"><div class="modal-content">
    <h3>Lista de Compra</h3>
    <div id="cartListContainer" style="max-height:300px; overflow-y:auto;"></div>
    <button onclick="exportarListaExcel()" style="background:var(--success); color:white; border:none; padding:12px; border-radius:6px; margin-top:10px;">Exportar Excel</button>
    <button onclick="document.getElementById('cartModal').style.display='none'" style="padding:10px;">Cerrar</button>
</div></div>

<div id="configModal" class="modal"><div class="modal-content">
    <h3>Configuración</h3>
    <button onclick="document.body.classList.toggle('light')">🌓 Cambiar Tema</button>
    <button onclick="exportarExcelPrincipal()" style="background:#2ecc71; color:white; border:none; border-radius:6px; padding:10px;">📊 Exportar Stock Excel</button>
    <button onclick="signOutUser()" style="background:var(--danger); color:white; padding:10px; border:none; border-radius:6px;">Cerrar Sesión</button>
    <button onclick="document.getElementById('configModal').style.display='none'" style="margin-top:10px;">Volver</button>
</div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAtWLxQfVqsEt8fLZkGRN-3zSHuzKMUTk8",
  authDomain: "maikmanmodelsstock.firebaseapp.com",
  projectId: "maikmanmodelsstock",
  storageBucket: "maikmanmodelsstock.appspot.com",
  messagingSenderId: "871520809912",
  appId: "1:871520809912:web:4042f15ef200832a95d54d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let modelos = [];
let paintCatalogData = {};
let currentModelId = null;
let myPaints = JSON.parse(localStorage.getItem('maikman_paints')) || { have: [], buy: [] };

// AUTH
window.login = () => {
    const e = document.getElementById('email').value;
    const p = document.getElementById('password').value;
    signInWithEmailAndPassword(auth, e, p).catch(() => alert("Error"));
};
window.signOutUser = () => signOut(auth);
window.switchTab = (id) => {
    document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if(event) event.currentTarget.classList.add('active');
};
window.openConfigModal = () => document.getElementById('configModal').style.display='flex';
window.openFormModal = () => { document.getElementById('form_id').value = ""; document.getElementById('formModal').style.display = 'flex'; };
window.closeFormModal = () => document.getElementById('formModal').style.display = 'none';

// MODELOS
async function cargarModelos() {
    const snap = await getDocs(query(collection(db, "modelos"), orderBy("fabricante")));
    modelos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderMaquetas();
}

window.renderMaquetas = () => {
    const grid = document.getElementById("grid");
    const q = document.getElementById("search").value.toLowerCase();
    grid.innerHTML = "";
    modelos.filter(m => (m.modelo||"").toLowerCase().includes(q) || (m.fabricante||"").toLowerCase().includes(q)).forEach(m => {
        grid.innerHTML += `<div class="card">
            <img src="${m.foto || 'https://via.placeholder.com/300x180'}" onclick="verZoom('${m.foto}')">
            <div style="font-weight:bold">${m.modelo}</div>
            <div style="font-size:12px; opacity:0.7">${m.fabricante}</div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-top:10px;">
                <button class="btn-mini" style="background:#3498db" onclick="abrirInfoModelo('${m.id}')">GALERÍA</button>
                <button class="btn-mini" style="background:#9b59b6" onclick="switchTab('tab-pinturas')">COLOR</button>
                <button class="btn-mini" style="background:#f39c12" onclick="editarModelo('${m.id}')">EDIT</button>
                <button class="btn-mini" style="background:var(--danger)" onclick="borrarModelo('${m.id}')">DEL</button>
            </div>
        </div>`;
    });
};

window.abrirInfoModelo = (id) => {
    currentModelId = id;
    const m = modelos.find(x => x.id === id);
    document.getElementById("infoTitle").innerText = m.modelo;
    document.getElementById("infoDetails").innerText = `${m.fabricante} | ${m.precio||'--'}€`;
    const gal = document.getElementById("galleryGrid"); gal.innerHTML = "";
    if (m.galeria) m.galeria.forEach((url, idx) => {
        gal.innerHTML += `<div class="gallery-item"><img src="${url}" class="gallery-img" onclick="verZoom('${url}')"><button class="btn-del-photo" onclick="borrarFotoGaleria(${idx})">✕</button></div>`;
    });
    document.getElementById("infoModal").style.display = "flex";
};

window.verZoom = (url) => { if(url) { document.getElementById("zoomImg").src = url; document.getElementById("zoomModal").style.display = "flex"; } };

window.añadirUrlAGaleria = async () => {
    const inp = document.getElementById("urlPhotoInput");
    const url = inp.value.trim(); if(!url) return;
    const m = modelos.find(x => x.id === currentModelId);
    if(!m.galeria) m.galeria = []; m.galeria.push(url);
    await updateDoc(doc(db, "modelos", currentModelId), { galeria: m.galeria });
    inp.value = ""; abrirInfoModelo(currentModelId);
};

window.borrarFotoGaleria = async (idx) => {
    const m = modelos.find(x => x.id === currentModelId);
    m.galeria.splice(idx, 1);
    await updateDoc(doc(db, "modelos", currentModelId), { galeria: m.galeria });
    abrirInfoModelo(currentModelId);
};

window.guardarModelo = async () => {
    const id = document.getElementById('form_id').value;
    const d = {
        fabricante: document.getElementById('form_fabricante').value,
        modelo: document.getElementById('form_modelo').value,
        codigo: document.getElementById('form_codigo').value,
        precio: document.getElementById('form_precio').value,
        foto: document.getElementById('form_foto_url').value
    };
    if(id) await updateDoc(doc(db, "modelos", id), d);
    else await addDoc(collection(db, "modelos"), d);
    closeFormModal(); cargarModelos();
};

window.editarModelo = (id) => {
    const m = modelos.find(x => x.id === id);
    document.getElementById('form_id').value = m.id;
    document.getElementById('form_fabricante').value = m.fabricante;
    document.getElementById('form_modelo').value = m.modelo;
    document.getElementById('form_codigo').value = m.codigo;
    document.getElementById('form_precio').value = m.precio;
    document.getElementById('form_foto_url').value = m.foto || "";
    document.getElementById('formModal').style.display = 'flex';
};

window.borrarModelo = async (id) => { if(confirm("¿Borrar?")) { await deleteDoc(doc(db, "modelos", id)); cargarModelos(); } };

// PINTURAS (ESTILO GRID COMPACTO)
async function cargarCatalogoPinturas() {
    const resp = await fetch('pinturas.json');
    paintCatalogData = await resp.json();
    const f = document.getElementById('brandFilter'); f.innerHTML = "";
    Object.keys(paintCatalogData).forEach(b => f.innerHTML += `<option value="${b}">${b}</option>`);
    renderPaintCatalog();
}

window.renderPaintCatalog = () => {
    const brand = document.getElementById('brandFilter').value;
    const q = document.getElementById('paintSearch').value.toLowerCase();
    const cont = document.getElementById('paintCatalog'); cont.innerHTML = "";
    if(paintCatalogData[brand]) {
        paintCatalogData[brand].filter(p => p.nombre.toLowerCase().includes(q) || p.id.toLowerCase().includes(q)).forEach(p => {
            const isH = myPaints.have.includes(p.id); const isB = myPaints.buy.includes(p.id);
            cont.innerHTML += `
                <div class="paint-item">
                    <div class="color-swatch" style="background:${p.hex}"></div>
                    <div class="paint-info">${p.id}<br>${p.nombre}</div>
                    <div class="paint-btns">
                        <button class="btn-mini ${isH?'active-have':''}" onclick="togglePaint('${p.id}', 'have')">✅</button>
                        <button class="btn-mini ${isB?'active-buy':''}" onclick="togglePaint('${p.id}', 'buy')">🛒</button>
                    </div>
                </div>`;
        });
    }
};

window.togglePaint = (id, type) => {
    const idx = myPaints[type].indexOf(id);
    if(idx > -1) myPaints[type].splice(idx, 1); else myPaints[type].push(id);
    localStorage.setItem('maikman_paints', JSON.stringify(myPaints));
    renderPaintCatalog(); updateCartCount();
};
window.updateCartCount = () => document.getElementById('cartCount').innerText = myPaints.buy.length;

window.abrirModalCompra = () => {
    const cont = document.getElementById('cartListContainer'); cont.innerHTML = "";
    myPaints.buy.forEach(id => {
        cont.innerHTML += `<div style="padding:10px; border-bottom:1px solid #333;">${id}</div>`;
    });
    document.getElementById('cartModal').style.display='flex';
};

window.exportarExcelPrincipal = () => {
    const ws = XLSX.utils.json_to_sheet(modelos);
    const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Stock");
    XLSX.writeFile(wb, "Stock_Maikman.xlsx");
};

onAuthStateChanged(auth, user => {
    document.getElementById("login").style.display = user ? "none" : "block";
    document.getElementById("app").style.display = user ? "block" : "none";
    if (user) { cargarModelos(); cargarCatalogoPinturas(); updateCartCount(); }
});
</script>
</body>
</html>
