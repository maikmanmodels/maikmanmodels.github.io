<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maikman Models Pro v5.7.0</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --text: #f8fafc; 
            --accent: #38bdf8; --success: #22c55e; --danger: #ef4444;
        }
        body { margin: 0; font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); padding-bottom: 40px; }
        
        /* Navegación */
        .nav {
            display: flex; background: #020617; padding: 10px; gap: 8px; 
            position: sticky; top: 0; z-index: 1000; overflow-x: auto;
            border-bottom: 1px solid #334155;
        }
        .btn {
            border: none; padding: 10px 16px; border-radius: 8px; cursor: pointer; 
            font-weight: bold; background: #334155; color: white; white-space: nowrap;
        }
        .btn.active { background: var(--accent); color: #0f172a; }

        .container { padding: 15px; max-width: 1000px; margin: auto; }
        .view { display: none; } 
        .view.active { display: block; }

        /* Tarjetas */
        .card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #334155; position: relative; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
        
        .paint-item { display: flex; align-items: center; gap: 12px; }
        .swatch { width: 40px; height: 40px; border-radius: 8px; border: 1px solid #475569; flex-shrink: 0; }

        /* Formulario */
        input { width: 100%; padding: 12px; margin: 6px 0; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: white; box-sizing: border-box; }
        
        /* Modales */
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:2000; align-items:center; justify-content:center; flex-direction:column; padding: 20px; }
        #reader { width: 100%; max-width: 400px; border-radius: 15px; overflow: hidden; background: #000; }
        .modal-content { background: var(--bg); padding: 20px; border-radius: 15px; width: 100%; max-width: 500px; border: 1px solid var(--accent); max-height: 80vh; overflow-y: auto; }
    </style>
</head>
<body>

<nav class="nav">
    <button class="btn active" id="btn-models" onclick="showTab('models')">📦 Maquetas</button>
    <button class="btn" id="btn-paints" onclick="showTab('paints')">🎨 Pinturas</button>
    <button class="btn" onclick="abrirScanner()">📷 Scan</button>
    <button class="btn" id="btn-buy" onclick="abrirCompra()">🛒 Compra (0)</button>
    <button class="btn" style="margin-left:auto; background: #1e293b;" onclick="exportarBackup()">💾 Backup</button>
</nav>

<div class="container">
    
    <div id="modelsView" class="view active">
        <div class="card" style="border-color: var(--accent)">
            <h3 style="margin:0 0 10px 0">Control de Stock de Maquetas</h3>
            <input type="text" id="mFab" placeholder="Fabricante (ej. Tamiya)">
            <input type="text" id="mMod" placeholder="Nombre del Modelo">
            <input type="number" id="mPre" placeholder="Precio (€)">
            <button class="btn" style="background:var(--success); width:100%; margin-top:10px; color:black" onclick="addModelo()">Añadir al Stock</button>
            <div style="margin-top:15px; display:flex; gap:10px">
                <button class="btn" style="font-size:0.8em; flex:1" onclick="document.getElementById('importFile').click()">📥 Importar JSON</button>
                <input type="file" id="importFile" style="display:none" onchange="importarBackup(event)">
            </div>
        </div>
        <div class="grid" id="modelsGrid"></div>
    </div>

    <div id="paintsView" class="view">
        <input type="text" id="pSearch" placeholder="Buscar por código o nombre..." oninput="renderPaints()">
        <div id="paintsContainer"></div>
    </div>

</div>

<div id="scanModal" class="modal">
    <div id="reader"></div>
    <p id="scanStatus" style="color:var(--accent); margin-top:10px">Buscando cámara...</p>
    <button class="btn" style="background:var(--danger); margin-top:10px" onclick="cerrarScanner()">Cerrar Cámara</button>
</div>

<div id="buyModal" class="modal">
    <div class="modal-content">
        <h2 style="margin-top:0">Lista de Compra</h2>
        <div id="buyList"></div>
        <button class="btn" style="background:var(--success); color:black; width:100%; margin-top:20px" onclick="exportarExcel()">Exportar Excel (.xlsx)</button>
        <button class="btn" style="background:#334155; width:100%; margin-top:10px" onclick="document.getElementById('buyModal').style.display='none'">Cerrar</button>
    </div>
</div>

<script>
// --- VARIABLES GLOBALES ---
let modelos = [];
let stockData = { paints: {}, buy: [] };
let paintCatalog = {};
let scanner = null;

// --- INICIALIZACIÓN ---
async function init() {
    // 1. Recuperar modelos (rastreo de todas las llaves posibles)
    const llavesModelos = ['maikman_models_v5', 'maikman_models', 'modelos'];
    for (let k of llavesModelos) {
        let saved = localStorage.getItem(k);
        if (saved) {
            try {
                let parsed = JSON.parse(saved);
                if (Array.isArray(parsed) && parsed.length > 0) { 
                    modelos = parsed; 
                    localStorage.setItem('maikman_models_v5', JSON.stringify(modelos)); // Normalizar
                    break; 
                }
            } catch(e) {}
        }
    }
    
    // 2. Recuperar pinturas
    let savedPaints = localStorage.getItem('maikman_paints_v5');
    if (savedPaints) stockData = JSON.parse(savedPaints);

    renderModelos();
    actualizarContador();

    // 3. Cargar catálogo externo
    try {
        let res = await fetch('pinturas.json');
        if (res.ok) {
            paintCatalog = await res.json();
            renderPaints();
        }
    } catch(e) { console.warn("Catálogo no disponible localmente."); }
}

// --- LÓGICA DE MAQUETAS ---
function renderModelos() {
    const grid = document.getElementById('modelsGrid');
    grid.innerHTML = '';
    modelos.forEach((m, index) => {
        grid.innerHTML += `
            <div class="card">
                <div style="color:var(--accent); font-size:0.8em; font-weight:800">${m.fabricante || 'GENERAL'}</div>
                <div style="font-weight:bold; font-size:1.1em; margin:5px 0">${m.modelo}</div>
                <div style="color:var(--success); font-weight:bold">${m.precio || 0}€</div>
                <button onclick="borrarModelo(${index})" style="position:absolute; top:10px; right:10px; background:none; border:none; color:var(--danger); cursor:pointer; font-weight:bold">✖</button>
            </div>`;
    });
}

window.addModelo = () => {
    const mod = document.getElementById('mMod').value;
    if (!mod) return alert("El nombre es obligatorio");
    modelos.push({ 
        fabricante: document.getElementById('mFab').value, 
        modelo: mod, 
        precio: document.getElementById('mPre').value 
    });
    saveAll();
    renderModelos();
    document.getElementById('mFab').value = ''; document.getElementById('mMod').value = ''; document.getElementById('mPre').value = '';
};

window.borrarModelo = (index) => {
    if (confirm("¿Eliminar esta maqueta?")) {
        modelos.splice(index, 1);
        saveAll();
        renderModelos();
    }
};

// --- LÓGICA DE PINTURAS ---
function renderPaints() {
    const container = document.getElementById('paintsContainer');
    const search = document.getElementById('pSearch').value.toLowerCase();
    container.innerHTML = '';

    for (let marca in paintCatalog) {
        let filtered = paintCatalog[marca].filter(p => p.id.toLowerCase().includes(search) || p.nombre.toLowerCase().includes(search));
        
        if (filtered.length > 0) {
            let section = document.createElement('div');
            section.innerHTML = `<h3 style="color:var(--accent); border-bottom:1px solid #334155; margin-top:20px">${marca}</h3>`;
            let grid = document.createElement('div');
            grid.className = 'grid';
            
            filtered.forEach(p => {
                const qty = stockData.paints[p.id] || 0;
                const inBuy = stockData.buy.includes(p.id);
                grid.innerHTML += `
                    <div class="card paint-item">
                        <div class="swatch" style="background:${p.hex}"></div>
                        <div style="flex-grow:1">
                            <div style="font-weight:bold; font-size:0.9em">${p.id}</div>
                            <div style="font-size:0.75em; color:#aaa">${p.nombre}</div>
                            <div style="display:flex; align-items:center; gap:8px; margin-top:8px">
                                <button class="btn" style="padding:4px 10px" onclick="cambiarCantidad('${p.id}', -1)">-</button>
                                <b style="min-width:20px; text-align:center">${qty}</b>
                                <button class="btn" style="padding:4px 10px" onclick="cambiarCantidad('${p.id}', 1)">+</button>
                                <button onclick="toggleCompra('${p.id}')" style="background:none; border:1px solid #444; color:${inBuy?'#f39c12':'white'}; border-radius:5px; padding:4px 8px; cursor:pointer">🛒</button>
                            </div>
                        </div>
                    </div>`;
            });
            section.appendChild(grid);
            container.appendChild(section);
        }
    }
}

window.cambiarCantidad = (id, delta) => {
    stockData.paints[id] = Math.max(0, (stockData.paints[id] || 0) + delta);
    saveAll();
    renderPaints();
};

window.toggleCompra = (id) => {
    const idx = stockData.buy.indexOf(id);
    if (idx > -1) stockData.buy.splice(idx, 1);
    else stockData.buy.push(id);
    saveAll();
    renderPaints();
    actualizarContador();
};

// --- LISTA DE COMPRA ---
window.abrirCompra = () => {
    const list = document.getElementById('buyList');
    list.innerHTML = '';
    if (stockData.buy.length === 0) list.innerHTML = '<p style="text-align:center; color:gray">No hay nada en la lista</p>';
    
    stockData.buy.forEach(id => {
        list.innerHTML += `<div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #334155">
            <span><b>${id}</b></span>
            <button class="btn" style="background:none; color:var(--danger)" onclick="toggleCompra('${id}'); abrirCompra()">✖</button>
        </div>`;
    });
    document.getElementById('buyModal').style.display = 'flex';
};

window.exportarExcel = () => {
    if (stockData.buy.length === 0) return alert("Lista vacía");
    const ws = XLSX.utils.json_to_sheet(stockData.buy.map(id => ({ REFERENCIA: id })));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Compra");
    XLSX.writeFile(wb, "Lista_Compra_Maikman.xlsx");
};

// --- SCANNER ---
window.abrirScanner = () => {
    document.getElementById('scanModal').style.display = 'flex';
    document.getElementById('scanStatus').innerText = "Iniciando cámara...";
    scanner = new Html5Qrcode("reader");
    scanner.start(
        { facingMode: "environment" }, 
        { fps: 10, qrbox: 250 },
        (txt) => { alert("Código detectado: " + txt); cerrarScanner(); }
    ).catch(err => {
        alert("Error de cámara: " + err);
        cerrarScanner();
    });
};

window.cerrarScanner = () => {
    if (scanner && scanner.isScanning) {
        scanner.stop().finally(() => { document.getElementById('scanModal').style.display = 'none'; });
    } else {
        document.getElementById('scanModal').style.display = 'none';
    }
};

// --- BACKUPS Y UTILIDADES ---
function saveAll() {
    localStorage.setItem('maikman_models_v5', JSON.stringify(modelos));
    localStorage.setItem('maikman_paints_v5', JSON.stringify(stockData));
}

function actualizarContador() {
    document.getElementById('btn-buy').innerText = `🛒 Compra (${stockData.buy.length})`;
}

window.showTab = (tab) => {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tab + 'View').classList.add('active');
    document.getElementById('btn-' + tab).classList.add('active');
};

window.exportarBackup = () => {
    const data = { modelos, stockData };
    const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `backup_maikman_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
};

window.importarBackup = (event) => {
    const reader = new FileReader();
    reader.onload = (e) => {
        try {
            const d = JSON.parse(e.target.result);
            if (d.modelos) modelos = d.modelos;
            if (d.stockData) stockData = d.stockData;
            saveAll(); renderModelos(); renderPaints(); actualizarContador();
            alert("¡Copia de seguridad restaurada con éxito!");
        } catch(err) { alert("Archivo de backup no válido"); }
    };
    reader.readAsText(event.target.files[0]);
};

// Lanzar aplicación
init();
</script>
</body>
</html>
