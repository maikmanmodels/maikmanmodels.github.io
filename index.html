<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maikman Models - Pro Stock v6.8.9 Full Gallery</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
:root {
    --bg:#0f172a; --card:#020617; --text:#e5e7eb; --accent:#38bdf8; --success:#00b894; --danger:#d63031;
    --min-card-width: 260px;
}
body.light { --bg:#f1f5f9; --card:#fff; --text:#020617; --accent:#2563eb; }
* { box-sizing:border-box; transition:.3s; }
body { margin:0; font-family:system-ui; background:var(--bg); color:var(--text); padding-bottom: 20px; }

/* Navegación */
.nav-tabs { display: flex; align-items: center; background: var(--card); padding: 8px; gap: 4px; position: sticky; top: 0; z-index: 900; border-bottom: 1px solid #334155; }
.tab-btn { flex: 1; padding: 12px 2px; border: none; background: rgba(255,255,255,0.05); color: var(--text); cursor: pointer; border-radius: 8px; font-weight: bold; font-size: 11px; }
.tab-btn.active { background: var(--accent); color: white; }
.cart-badge { background: var(--danger); color: white; font-size: 10px; padding: 2px 5px; border-radius: 10px; margin-left: 3px; }

#app { display:none; }
.content-section { display: none; padding: 20px; }
.content-section.active { display: block; }

/* Grid de Modelos */
#grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(var(--min-card-width),1fr)); gap:16px; }
.card { background:var(--card); border-radius:12px; padding:12px; border: 1px solid #334155; display: flex; flex-direction: column; }
.card img { width:100%; height:180px; object-fit:cover; border-radius:8px; margin-bottom: 10px; cursor: pointer; }
.card-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: auto; }
.btn-action { padding: 8px; font-size: 11px; border-radius: 4px; border: none; cursor: pointer; color: white; font-weight: bold; text-align: center; }

/* Pinturas Estética */
.paint-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
.paint-item-box { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 8px; border: 1px solid #334155; text-align: center; position: relative; }
.color-circle { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #fff; margin: 0 auto 8px; box-shadow: 0 0 8px rgba(0,0,0,0.5); }
.paint-id { font-weight: bold; font-size: 12px; display: block; color: var(--accent); }

/* Modales */
.modal { position:fixed; inset:0; background:rgba(0,0,0,.9); display:none; align-items:center; justify-content:center; z-index:1000; padding:20px; }
.modal-content { background:var(--card); padding:24px; width:100%; max-width:500px; border-radius:12px; max-height:90vh; overflow-y:auto; border: 1px solid #334155; display: flex; flex-direction: column; gap: 12px; position: relative; }
.sticky-close { position: sticky; bottom: -25px; left: 0; right: 0; background: var(--card); padding: 15px 0; border-top: 1px solid #334155; margin-top: 10px; z-index: 10; }

input, select { padding:10px; border-radius:6px; border: 1px solid #334155; background: #1e293b; color: white; width: 100%; }

/* Visor Zoom Panorámico */
#zoomModal { background: rgba(0,0,0,0.95); overflow: hidden; display: none; cursor: default; z-index: 2000; }
#zoomContainer { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; }
#zoomImg { max-width: 90%; max-height: 90%; transition: transform 0.1s ease-out; cursor: grab; user-select: none; }
.zoom-controls { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 2100; }
.btn-zoom { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 30px; font-weight: bold; cursor: pointer; }
</style>
</head>
<body class="dark">

<div id="login" style="max-width:320px; margin:80px auto; padding:20px; text-align:center;">
    <h2 style="color:var(--accent)">Maikman Stock</h2>
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Contraseña" style="margin-top:10px">
    <button onclick="window.login()" style="width:100%; margin-top:20px; padding:12px; background:var(--accent); color:white; border:none; border-radius:6px; font-weight:bold;">ENTRAR</button>
</div>

<div id="app">
    <nav class="nav-tabs">
        <button class="tab-btn active" onclick="window.switchTab('tab-maquetas')">📦 MODELOS</button>
        <button class="tab-btn" onclick="window.switchTab('tab-pinturas')">🎨 STOCK</button>
        <button class="tab-btn" onclick="window.switchTab('tab-mixer')">🧪 MIXER</button>
        <button class="tab-btn" onclick="window.abrirModalCompra(true)">🛒 <span id="cartCount" class="cart-badge">0</span></button>
        <button class="tab-btn" style="flex:0.3" onclick="window.toggleModal('configModal', true)">⚙️</button>
    </nav>

    <section id="tab-maquetas" class="content-section active">
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <input id="search" placeholder="Buscar..." oninput="window.renderMaquetas()">
            <button onclick="window.startScanner()" style="background:#4b5563; border:none; padding:0 15px; border-radius:6px; color:white;">📷</button>
            <button onclick="window.openFormModal()" style="background:var(--accent); border:none; padding:0 15px; border-radius:6px; color:white;">➕</button>
        </div>
        <div id="grid"></div>
    </section>

    <section id="tab-pinturas" class="content-section">
        <select id="brandFilter" onchange="window.renderPaintCatalog()"></select>
        <input id="paintSearch" placeholder="Filtrar pintura..." onkeyup="window.renderPaintCatalog()" style="margin-top:10px">
        <div id="paintCatalog" class="paint-grid" style="margin-top:15px"></div>
    </section>

    <section id="tab-mixer" class="content-section">
        <h4 style="margin:0 0 10px 0; color:var(--accent)">🧪 Mixer Pro (Base 10)</h4>
        <div id="mixerCardsContainer" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(180px,1fr)); gap:10px; margin-bottom:20px;"></div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; background:rgba(255,255,255,0.03); padding:15px; border-radius:12px;">
            <div id="mixerResultPreview" style="height:100px; border-radius:12px; display:flex; flex-direction:column; align-items:center; justify-content:center; border:1px solid #444;">
                <span id="hexResult" style="font-weight:bold;">#---</span>
            </div>
            <canvas id="mixerChart" style="max-height: 100px;"></canvas>
        </div>
        <button onclick="window.resetMixer()" style="width:100%; margin-top:15px; padding:12px; background:var(--danger); border:none; color:white; border-radius:8px;">Reiniciar</button>
    </section>
</div>

<div id="infoModal" class="modal">
    <div class="modal-content">
        <h3 id="infoTitle"></h3>
        <div id="infoDetails"></div>
        <hr style="border:0; border-top:1px solid #444;">
        <b>Galería (URLs con , o ;)</b>
        <div id="galleryGrid" style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:10px 0;"></div>
        <div style="display:flex; gap:5px;">
            <input type="text" id="urlPhotoInput" placeholder="Pegar URLs aquí...">
            <button onclick="window.añadirUrlsAGaleria()" style="background:var(--success); color:white; border:none; padding:10px; border-radius:6px;">Añadir</button>
        </div>
        <div class="sticky-close">
            <button onclick="window.toggleModal('infoModal', false)" style="width:100%; padding:12px; background:var(--accent); color:white; border:none; border-radius:8px;">Cerrar Info</button>
        </div>
    </div>
</div>

<div id="formModal" class="modal">
    <div class="modal-content">
        <h3 id="modalFormTitle">Maqueta</h3>
        <input type="hidden" id="form_id">
        <input id="form_fabricante" placeholder="Marca">
        <input id="form_modelo" placeholder="Modelo">
        <input id="form_foto_url" placeholder="URL Foto Principal">
        <button onclick="window.guardarModelo()" style="background:var(--success); color:white; padding:12px; border:none; border-radius:8px; font-weight:bold;">GUARDAR</button>
        <button onclick="window.toggleModal('formModal', false)" style="background:transparent; color:var(--text); border:none;">Cancelar</button>
    </div>
</div>

<div id="zoomModal" class="modal">
    <div id="zoomContainer" onwheel="window.handleWheel(event)">
        <img id="zoomImg" src="" draggable="false">
    </div>
    <div class="zoom-controls">
        <button class="btn-zoom" onclick="window.adjustZoom(0.2)">➕</button>
        <button class="btn-zoom" onclick="window.resetZoomParams()">🏠</button>
        <button class="btn-zoom" onclick="window.adjustZoom(-0.2)">➖</button>
        <button class="btn-zoom" onclick="window.closeZoom()" style="background:var(--danger)">CERRAR</button>
    </div>
</div>

<div id="configModal" class="modal">
    <div class="modal-content">
        <h3>Configuración</h3>
        <button onclick="window.toggleTheme()" style="width:100%; padding:12px; margin-bottom:10px; background:#4b5563; color:white; border:none; border-radius:8px;">🌓 Cambiar Tema</button>
        <button onclick="window.exportarExcelPrincipal()" style="width:100%; padding:12px; margin-bottom:10px; background:var(--accent); color:white; border:none; border-radius:8px;">📊 Exportar Todo</button>
        <div style="background:rgba(100,100,100,0.1); padding:15px; border-radius:10px; margin-bottom:10px;">
            <p style="font-size:12px; margin-top:0;">📥 Importar desde Excel</p>
            <input type="file" id="importExcel" accept=".xlsx, .xls" onchange="window.importarStock(event)">
        </div>
        <button onclick="window.signOutUser()" style="width:100%; padding:12px; background:var(--danger); color:white; border:none; border-radius:8px;">Cerrar Sesión</button>
        <button onclick="window.toggleModal('configModal', false)" style="margin-top:10px; background:transparent; color:var(--text); border:none;">Volver</button>
    </div>
</div>

<div id="modelPaintsModal" class="modal">
    <div class="modal-content">
        <h3>Colores Maqueta</h3>
        <div id="modelPaintsList" class="paint-grid" style="grid-template-columns: 1fr;"></div>
        <hr style="opacity:0.1;">
        <select id="addPaintSelect"><option value="">-- Añadir Pintura --</option></select>
        <button onclick="window.addPaintToModel()" style="background:var(--accent); color:white; padding:12px; border:none; border-radius:8px; margin-top:10px;">AÑADIR COLOR</button>
        <button onclick="window.toggleModal('modelPaintsModal', false)" style="margin-top:10px; background:#444; color:white; border:none; border-radius:8px; padding:10px;">Cerrar</button>
    </div>
</div>

<div id="cartModal" class="modal"><div class="modal-content"><h3>Lista de Compra</h3><div id="cartListContainer"></div><button onclick="window.exportarListaExcel()" style="background:var(--success); color:white; padding:12px; border:none; border-radius:8px; margin-top:10px;">📥 Excel</button><button onclick="window.toggleModal('cartModal', false)" style="margin-top:10px; border:none; background:transparent; color:var(--text);">Cerrar</button></div></div>
<div id="scanModal" class="modal"><div class="modal-content"><div id="reader"></div><button onclick="window.stopScanner()" style="width:100%; margin-top:15px; padding:10px; background:var(--danger); color:white; border:none; border-radius:8px;">Cerrar Cámara</button></div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAtWLxQfVqsEt8fLZkGRN-3zSHuzKMUTk8",
  authDomain: "maikmanmodelsstock.firebaseapp.com",
  projectId: "maikmanmodelsstock",
  storageBucket: "maikmanmodelsstock.appspot.com",
  messagingSenderId: "871520809912",
  appId: "1:871520809912:web:4042f15ef200832a95d54d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let modelos = [];
let paintCatalogData = {};
let currentModelId = null;
let myPaints = JSON.parse(localStorage.getItem('maikman_paints')) || { have: [], buy: [] };
let mixerChart = null;
let html5QrCode = null;

// Zoom State
let scale = 1, posX = 0, posY = 0, isDragging = false, startX, startY;

// --- AUTH & THEME ---
window.login = () => {
    const e = document.getElementById('email').value;
    const p = document.getElementById('password').value;
    signInWithEmailAndPassword(auth, e, p).catch(() => alert("Error"));
};
window.signOutUser = () => signOut(auth);
window.toggleTheme = () => {
    document.body.classList.toggle('light');
    localStorage.setItem('maikman_theme', document.body.classList.contains('light') ? 'light' : 'dark');
};
if(localStorage.getItem('maikman_theme') === 'light') document.body.classList.add('light');

onAuthStateChanged(auth, user => {
    document.getElementById("login").style.display = user ? "none" : "block";
    document.getElementById("app").style.display = user ? "block" : "none";
    if (user) cargarDatos();
});

// --- CORE ---
async function cargarDatos() {
    const snap = await getDocs(query(collection(db, "modelos"), orderBy("fabricante")));
    modelos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    window.renderMaquetas();
    
    const resp = await fetch('pinturas.json');
    paintCatalogData = await resp.json();
    
    // Selects
    const f = document.getElementById('brandFilter');
    f.innerHTML = Object.keys(paintCatalogData).map(b => `<option value="${b}">${b}</option>`).join('');
    
    let opts = '<option value="">-- Seleccionar Pintura --</option>';
    for(let b in paintCatalogData) {
        opts += `<optgroup label="${b}">` + paintCatalogData[b].map(p => `<option value="${p.id}">${p.id} - ${p.nombre}</option>`).join('') + `</optgroup>`;
    }
    document.getElementById('addPaintSelect').innerHTML = opts;

    window.renderPaintCatalog();
    initMixerUI();
}

window.renderMaquetas = () => {
    const grid = document.getElementById("grid");
    const q = document.getElementById("search").value.toLowerCase();
    grid.innerHTML = "";
    modelos.filter(m => (m.modelo||"").toLowerCase().includes(q) || (m.fabricante||"").toLowerCase().includes(q)).forEach(m => {
        grid.innerHTML += `
            <div class="card">
                <img src="${m.foto || 'https://via.placeholder.com/300x180'}" onclick="window.verZoom('${m.foto}')">
                <div style="font-weight:bold">${m.modelo}</div>
                <div style="font-size:12px; opacity:0.7">${m.fabricante}</div>
                <div class="card-btns">
                    <button class="btn-action" style="background:#3498db" onclick="window.abrirInfoModelo('${m.id}')">INFO</button>
                    <button class="btn-action" style="background:#9b59b6" onclick="window.abrirPinturasModelo('${m.id}')">COLOR</button>
                    <button class="btn-action" style="background:#f39c12" onclick="window.openFormModal('${m.id}')">EDIT</button>
                    <button class="btn-action" style="background:var(--danger)" onclick="window.borrarModelo('${m.id}')">DEL</button>
                </div>
            </div>`;
    });
};

// --- INFO & GALERIA (Lógica index (8) recuperada) ---
window.abrirInfoModelo = (id) => {
    currentModelId = id;
    const m = modelos.find(x => x.id === id);
    document.getElementById("infoTitle").innerText = m.modelo;
    document.getElementById("infoDetails").innerHTML = `<b>Marca:</b> ${m.fabricante}`;
    const gal = document.getElementById("galleryGrid"); gal.innerHTML = "";
    (m.galeria || []).forEach((url, idx) => {
        gal.innerHTML += `
            <div style="position:relative;">
                <img src="${url}" style="width:100%; height:80px; object-fit:cover; border-radius:4px" onclick="window.verZoom('${url}')">
                <button onclick="window.borrarFotoGaleria(${idx})" style="position:absolute; top:2px; right:2px; background:red; color:white; border:none; border-radius:3px; padding:2px 5px; cursor:pointer;">X</button>
            </div>`;
    });
    window.toggleModal('infoModal', true);
};

window.añadirUrlsAGaleria = async () => {
    const input = document.getElementById("urlPhotoInput").value.trim();
    if(!input) return;
    const urls = input.split(/[;,]+/).map(u => u.trim()).filter(u => u.length > 0);
    const m = modelos.find(x => x.id === currentModelId);
    if(!m.galeria) m.galeria = [];
    m.galeria.push(...urls);
    await updateDoc(doc(db, "modelos", currentModelId), { galeria: m.galeria });
    document.getElementById("urlPhotoInput").value = "";
    window.abrirInfoModelo(currentModelId);
};

window.borrarFotoGaleria = async (idx) => {
    const m = modelos.find(x => x.id === currentModelId);
    m.galeria.splice(idx, 1);
    await updateDoc(doc(db, "modelos", currentModelId), { galeria: m.galeria });
    window.abrirInfoModelo(currentModelId);
};

// --- FORMULARIO & IMPORT ---
window.openFormModal = (id = null) => {
    if(id && typeof id === 'string') {
        const m = modelos.find(x => x.id === id);
        document.getElementById('form_id').value = m.id;
        document.getElementById('form_fabricante').value = m.fabricante;
        document.getElementById('form_modelo').value = m.modelo;
        document.getElementById('form_foto_url').value = m.foto || "";
    } else {
        document.getElementById('form_id').value = "";
        document.getElementById('form_fabricante').value = "";
        document.getElementById('form_modelo').value = "";
        document.getElementById('form_foto_url').value = "";
    }
    window.toggleModal('formModal', true);
};

window.guardarModelo = async () => {
    const id = document.getElementById('form_id').value;
    const d = {
        fabricante: document.getElementById('form_fabricante').value,
        modelo: document.getElementById('form_modelo').value,
        foto: document.getElementById('form_foto_url').value
    };
    if(id) await updateDoc(doc(db, "modelos", id), d);
    else await addDoc(collection(db, "modelos"), { ...d, paints: [], galeria: [] });
    window.toggleModal('formModal', false);
    cargarDatos();
};

window.importarStock = (event) => {
    const file = event.target.files[0];
    const reader = new FileReader();
    reader.onload = async (e) => {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: 'array' });
        const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
        for(let item of json) {
            await addDoc(collection(db, "modelos"), {
                fabricante: item.MARCA || "S/M",
                modelo: item.MODELO || "Sin nombre",
                foto: item.FOTO || "",
                paints: [], galeria: []
            });
        }
        alert("Importado"); cargarDatos();
    };
    reader.readAsArrayBuffer(file);
};

// --- ZOOM (Lógica index (8) recuperada) ---
window.verZoom = (url) => {
    if(!url || url.includes('placeholder')) return;
    document.getElementById("zoomImg").src = url;
    window.resetZoomParams();
    document.getElementById("zoomModal").style.display = "flex";
};
window.resetZoomParams = () => { scale = 1; posX = 0; posY = 0; applyTransform(); };
window.adjustZoom = (delta) => { scale = Math.min(Math.max(.5, scale + delta), 5); applyTransform(); };
window.handleWheel = (e) => { e.preventDefault(); scale = Math.min(Math.max(.5, scale + (e.deltaY * -0.001)), 5); applyTransform(); };
function applyTransform() { document.getElementById("zoomImg").style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`; }

const imgZ = document.getElementById("zoomImg");
imgZ.addEventListener('mousedown', (e) => { isDragging = true; startX = e.clientX - posX; startY = e.clientY - posY; });
window.addEventListener('mousemove', (e) => { if (!isDragging) return; posX = e.clientX - startX; posY = e.clientY - startY; applyTransform(); });
window.addEventListener('mouseup', () => { isDragging = false; });
window.closeZoom = () => document.getElementById("zoomModal").style.display = 'none';

// --- MIXER & PINTURAS ---
function initMixerUI() {
    const container = document.getElementById('mixerCardsContainer');
    let opts = '<option value="">- Vacío -</option>';
    for(let b in paintCatalogData) {
        opts += `<optgroup label="${b}">` + paintCatalogData[b].map(p => `<option value="${p.hex}">${p.id} - ${p.nombre}</option>`).join('') + `</optgroup>`;
    }
    container.innerHTML = [1,2,3,4].map(i => `
        <div style="background:rgba(255,255,255,0.03); padding:8px; border-radius:8px; border:1px solid #333;">
            <select id="mixColor${i}" onchange="window.calculateMix()">${opts}</select>
            <input type="range" id="mixSlider${i}" min="0" max="100" value="0" oninput="window.calculateMix()">
            <div style="display:flex; justify-content:space-between; font-size:11px;">
                <span id="mixLabel${i}">0%</span>
                <span style="color:var(--accent); font-weight:bold;">${i==1?'Base':''}</span>
            </div>
        </div>`).join('');
    mixerChart = new Chart(document.getElementById('mixerChart').getContext('2d'), { type: 'pie', data: { labels: [], datasets: [{ data: [], backgroundColor: [] }] }, options: { plugins: { legend: { display: false } }, animation: false } });
}

window.calculateMix = () => {
    let r=0, g=0, b=0, tot=0; const lbs=[], dts=[], cls=[];
    for(let i=1; i<=4; i++) {
        const hex = document.getElementById(`mixColor${i}`).value;
        const p = parseFloat(document.getElementById(`mixSlider${i}`).value);
        document.getElementById(`mixLabel${i}`).innerText = Math.round(p) + "%";
        if(hex && p > 0) {
            const rgb = hexToRgb(hex); r += rgb.r*p; g += rgb.g*p; b += rgb.b*p; tot += p;
            lbs.push(document.getElementById(`mixColor${i}`).selectedOptions[0].text); dts.push(p); cls.push(hex);
        }
    }
    if(tot > 0) {
        const fHex = rgbToHex(Math.round(r/tot), Math.round(g/tot), Math.round(b/tot));
        document.getElementById('mixerResultPreview').style.backgroundColor = fHex;
        document.getElementById('hexResult').innerText = fHex;
    }
    mixerChart.data.labels = lbs; mixerChart.data.datasets[0].data = dts; mixerChart.data.datasets[0].backgroundColor = cls; mixerChart.update();
};

window.resetMixer = () => { for(let i=1; i<=4; i++){ document.getElementById(`mixColor${i}`).value=""; document.getElementById(`mixSlider${i}`).value=0; } window.calculateMix(); };

// --- UTILS ---
window.toggleModal = (id, show) => document.getElementById(id).style.display = show ? 'flex' : 'none';
window.switchTab = (id) => {
    document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    event.currentTarget.classList.add('active');
};
window.renderPaintCatalog = () => { /* Renderizado de stock similar a versiones previas */ };
