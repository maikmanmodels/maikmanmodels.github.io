<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maikman Models - Pro Stock v7.0.0</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
:root {
    --bg:#0f172a; --card:#020617; --text:#e5e7eb; --accent:#38bdf8; --success:#00b894; --danger:#d63031;
    --min-card-width: 260px;
}
body.light { --bg:#f1f5f9; --card:#fff; --text:#020617; --accent:#2563eb; }
* { box-sizing:border-box; transition:.3s; }
body { margin:0; font-family:system-ui; background:var(--bg); color:var(--text); padding-bottom: 20px; }

/* Navegación */
.nav-tabs { display: flex; align-items: center; background: var(--card); padding: 8px; gap: 4px; position: sticky; top: 0; z-index: 900; border-bottom: 1px solid #334155; }
.tab-btn { flex: 1; padding: 12px 2px; border: none; background: rgba(255,255,255,0.05); color: var(--text); cursor: pointer; border-radius: 8px; font-weight: bold; font-size: 11px; }
.tab-btn.active { background: var(--accent); color: white; }
.cart-badge { background: var(--danger); color: white; font-size: 10px; padding: 2px 5px; border-radius: 10px; margin-left: 3px; }

#app { display:none; }
.content-section { display: none; padding: 20px; }
.content-section.active { display: block; }

/* Grid de Modelos */
#grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(var(--min-card-width),1fr)); gap:16px; }
.card { background:var(--card); border-radius:12px; padding:12px; border: 1px solid #334155; display: flex; flex-direction: column; }
.card img { width:100%; height:180px; object-fit:cover; border-radius:8px; margin-bottom: 10px; cursor: pointer; }
.card-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: auto; }
.btn-action { padding: 8px; font-size: 11px; border-radius: 4px; border: none; cursor: pointer; color: white; font-weight: bold; text-align: center; }

/* Pinturas y Stock */
.paint-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 10px; }
.paint-item { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 8px; display: flex; align-items: center; gap: 10px; border: 1px solid #334155; }
.color-swatch { width: 30px; height: 30px; border-radius: 50%; border: 2px solid #444; flex-shrink: 0; }
.stock-level { font-size: 10px; padding: 2px 6px; border-radius: 4px; cursor: pointer; border: 1px solid #444; }
.level-full { background: #00b894; color: white; }
.level-low { background: #fdcb6e; color: #000; }
.level-empty { background: #d63031; color: white; }

/* Mixer y Color Picker */
.mixer-mode-btns { display: flex; gap: 10px; margin-bottom: 20px; }
.mode-btn { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--accent); background: transparent; color: var(--text); cursor: pointer; }
.mode-btn.active { background: var(--accent); color: white; }

#imagePickerContainer { text-align: center; background: rgba(255,255,255,0.02); padding: 15px; border-radius: 12px; border: 1px dashed #444; }
#canvasPicker { max-width: 100%; border-radius: 8px; cursor: crosshair; margin-top: 10px; display: none; }
.match-card { background: var(--card); border: 1px solid #334155; padding: 10px; border-radius: 8px; display: flex; align-items: center; gap: 10px; margin-top: 5px; }

/* Modales */
.modal { position:fixed; inset:0; background:rgba(0,0,0,.9); display:none; align-items:center; justify-content:center; z-index:1000; padding:20px; }
.modal-content { background:var(--card); padding:24px; width:100%; max-width:500px; border-radius:12px; display:flex; flex-direction:column; gap:12px; max-height:90vh; overflow-y:auto; position: relative; }

/* Visor Zoom */
#zoomModal { background: rgba(0,0,0,0.95); overflow: hidden; display: none; cursor: default; }
#zoomContainer { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; }
#zoomImg { max-width: 90%; max-height: 90%; transition: transform 0.1s ease-out; cursor: grab; user-select: none; }
.zoom-controls { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 1100; }
.btn-zoom { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 30px; font-weight: bold; cursor: pointer; }

input, select { padding:10px; border-radius:6px; border: 1px solid #334155; background: #1e293b; color: white; width: 100%; }
#reader { width: 100%; border-radius: 12px; overflow: hidden; background: #000; }
</style>
</head>
<body class="dark">

<div id="login" style="max-width:320px; margin:80px auto; padding:20px; text-align:center;">
    <h2 style="color:var(--accent)">Maikman Stock</h2>
    <input id="email" type="email" placeholder="Email" style="margin-bottom:10px">
    <input id="password" type="password" placeholder="Contraseña">
    <button onclick="login()" style="width:100%; margin-top:20px; padding:12px; background:var(--accent); color:white; border:none; border-radius:6px;">Entrar</button>
</div>

<div id="app">
    <nav class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('tab-maquetas')">📦 MODELOS</button>
        <button class="tab-btn" onclick="switchTab('tab-pinturas')">🎨 STOCK</button>
        <button class="tab-btn" onclick="switchTab('tab-mixer')">🧪 COLOR</button>
        <button class="tab-btn" onclick="window.abrirModalCompra(true)">🛒 <span id="cartCount" class="cart-badge">0</span></button>
        <button class="tab-btn" style="flex:0.3" onclick="window.openConfigModal(true)">⚙️</button>
    </nav>

    <section id="tab-maquetas" class="content-section active">
        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <input id="search" placeholder="Buscar..." oninput="window.renderMaquetas()">
            <button onclick="window.startScanner()" style="background:var(--accent); color:white; border:none; padding:0 15px; border-radius:6px;">📷</button>
            <button onclick="window.openFormModal()" style="background:var(--success); color:white; border:none; padding:0 15px; border-radius:6px;">➕</button>
        </div>
        <div id="grid"></div>
    </section>

    <section id="tab-pinturas" class="content-section">
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <select id="brandFilter" onchange="window.renderPaintCatalog()" style="flex:1"></select>
        </div>
        <input id="paintSearch" placeholder="Buscar pintura..." onkeyup="window.renderPaintCatalog()" style="margin-bottom:15px">
        <div id="paintCatalog" class="paint-grid"></div>
    </section>

    <section id="tab-mixer" class="content-section">
        <div class="mixer-mode-btns">
            <button id="btnModeMix" class="mode-btn active" onclick="window.toggleMixerMode('mix')">Mezclar</button>
            <button id="btnModePick" class="mode-btn" onclick="window.toggleMixerMode('pick')">Identificar Color</button>
        </div>

        <div id="modeMixContainer">
            <h4 style="margin:0 0 10px 0; color:var(--accent)">🧪 Mezclador Proporcional</h4>
            <div id="mixerCardsContainer" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(180px,1fr)); gap:10px; margin-bottom:20px;"></div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; background:rgba(255,255,255,0.03); padding:15px; border-radius:12px;">
                <div id="mixerResultPreview" style="height:100px; border-radius:12px; display:flex; flex-direction:column; align-items:center; justify-content:center; border:1px solid #444;">
                    <span id="hexResult" style="font-weight:bold; text-shadow: 0 0 5px black;">#---</span>
                </div>
                <canvas id="mixerChart" style="max-height: 100px;"></canvas>
            </div>
            <button onclick="window.resetMixer()" style="width:100%; margin-top:20px; padding:10px; background:var(--danger); border:none; color:white; border-radius:8px;">Reiniciar</button>
        </div>

        <div id="modePickContainer" style="display:none;">
            <h4 style="margin:0 0 10px 0; color:var(--accent)">🔍 Selector de Color por Imagen</h4>
            <div id="imagePickerContainer">
                <input type="file" id="imageInput" accept="image/*" onchange="window.loadPickerImage(event)" style="display:none">
                <button onclick="document.getElementById('imageInput').click()" style="padding:10px; background:var(--accent); color:white; border:none; border-radius:8px; width:100%;">Seleccionar Foto</button>
                <canvas id="canvasPicker"></canvas>
            </div>
            <div id="pickerResults" style="margin-top:20px;">
                <p id="pickedColorInfo" style="font-size:12px; opacity:0.8;">Toca la imagen para detectar el color...</p>
                <div id="matchList"></div>
            </div>
        </div>
    </section>
</div>

<div id="scannerModal" class="modal"><div class="modal-content"><h3>Escanear Código</h3><div id="reader"></div><button onclick="window.stopScanner()" style="margin-top:10px; background:var(--danger); color:white; padding:10px; border:none; border-radius:6px;">Cerrar</button></div></div>

<div id="formModal" class="modal">
    <div class="modal-content">
        <h3>Modelo</h3>
        <input type="hidden" id="form_id">
        <input id="form_codigo" placeholder="EAN / Referencia">
        <input id="form_fabricante" placeholder="Fabricante">
        <input id="form_modelo" placeholder="Modelo">
        <input id="form_precio" type="number" step="0.01" placeholder="Precio (€)">
        <input id="form_foto_url" placeholder="URL Foto Portada">
        <button onclick="window.guardarModelo()" style="background:var(--success); color:white; padding:12px; border:none; border-radius:6px;">Guardar</button>
        <button onclick="window.closeFormModal()" style="background:#555; color:white; padding:10px; border:none; border-radius:6px;">Cancelar</button>
    </div>
</div>

<div id="infoModal" class="modal">
    <div class="modal-content" style="padding-bottom: 80px;">
        <h3 id="infoTitle"></h3><div id="infoDetails"></div><hr style="border:0; border-top:1px solid #444;">
        <b>Galería</b>
        <div id="galleryGrid" style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:10px 0;"></div>
        <div style="display:flex; gap:5px;"><input type="text" id="urlPhotoInput" placeholder="URLs..."><button onclick="window.añadirUrlsAGaleria()" style="background:var(--success); color:white; border:none; padding:10px; border-radius:6px;">+</button></div>
        <div style="position: sticky; bottom: -25px; left: 0; right: 0; background: var(--card); padding: 15px 0; border-top: 1px solid #334155;"><button onclick="document.getElementById('infoModal').style.display='none'" style="width:100%; padding:12px; background:var(--accent); color:white; border:none; border-radius:8px;">Cerrar</button></div>
    </div>
</div>

<div id="cartModal" class="modal"><div class="modal-content"><h3>Lista de Compra</h3><div id="cartListContainer"></div><button onclick="window.exportarListaExcel()" style="background:var(--success); color:white; padding:12px; border:none; border-radius:6px; margin-top:10px;">📥 Excel</button><button onclick="window.abrirModalCompra(false)" style="margin-top:5px;">Volver</button></div></div>
<div id="configModal" class="modal"><div class="modal-content"><h3>Opciones</h3><button onclick="document.body.classList.toggle('light')">🌓 Tema</button><button onclick="window.exportarExcelPrincipal()">📊 Exportar Stock</button><button onclick="window.signOutUser()" style="background:var(--danger); color:white; margin-top:10px;">Salir</button><button onclick="window.openConfigModal(false)" style="margin-top:10px;">Volver</button></div></div>

<div id="zoomModal" class="modal">
    <div id="zoomContainer"><img id="zoomImg" src="" draggable="false"></div>
    <div class="zoom-controls"><button class="btn-zoom" onclick="window.adjustZoom(0.2)">➕</button><button class="btn-zoom" onclick="window.resetZoomParams()">🏠</button><button class="btn-zoom" onclick="window.adjustZoom(-0.2)">➖</button><button class="btn-zoom" onclick="window.closeZoom()" style="background:var(--danger)">X</button></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAtWLxQfVqsEt8fLZkGRN-3zSHuzKMUTk8",
  authDomain: "maikmanmodelsstock.firebaseapp.com",
  projectId: "maikmanmodelsstock",
  storageBucket: "maikmanmodelsstock.appspot.com",
  messagingSenderId: "871520809912",
  appId: "1:871520809912:web:4042f15ef200832a95d54d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let modelos = [];
let paintCatalogData = {};
let currentModelId = null;
let myPaints = JSON.parse(localStorage.getItem('maikman_paints')) || { have: [], buy: [], levels: {} };
let mixerChart = null;
let html5QrCode = null;

// Zoom State
let scale = 1, posX = 0, posY = 0, isDragging = false, startX, startY;

window.login = () => {
    const e = document.getElementById('email').value;
    const p = document.getElementById('password').value;
    signInWithEmailAndPassword(auth, e, p).catch(() => alert("Error de acceso"));
};
window.signOutUser = () => signOut(auth);
window.switchTab = (id) => {
    document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
};
window.openConfigModal = (s=true) => document.getElementById('configModal').style.display = s?'flex':'none';

// --- ESCÁNER ---
window.startScanner = () => {
    document.getElementById('scannerModal').style.display = 'flex';
    html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
        window.stopScanner();
        const m = modelos.find(x => x.codigo === text);
        if(m) { window.abrirInfoModelo(m.id); return; }
        // Buscar pintura
        let pFound = null;
        for(let b in paintCatalogData) { let p = paintCatalogData[b].find(x => x.id === text); if(p) { pFound = p; break; } }
        if(pFound) { window.switchTab('tab-pinturas'); document.getElementById('paintSearch').value = text; window.renderPaintCatalog(); }
        else if(confirm("No encontrado. ¿Crear modelo?")) { window.openFormModal(); document.getElementById('form_codigo').value = text; }
    }).catch(err => { alert("Cámara no disponible."); window.stopScanner(); });
};
window.stopScanner = () => { if(html5QrCode) html5QrCode.stop().then(() => { html5QrCode=null; document.getElementById('scannerModal').style.display='none'; }); else document.getElementById('scannerModal').style.display='none'; };

// --- GESTIÓN MODELOS ---
async function cargarModelos() {
    const snap = await getDocs(query(collection(db, "modelos"), orderBy("fabricante")));
    modelos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    window.renderMaquetas();
}

window.renderMaquetas = () => {
    const grid = document.getElementById("grid");
    const q = document.getElementById("search").value.toLowerCase();
    grid.innerHTML = "";
    modelos.filter(m => (m.modelo||"").toLowerCase().includes(q) || (m.fabricante||"").toLowerCase().includes(q) || (m.codigo||"").includes(q)).forEach(m => {
        grid.innerHTML += `<div class="card"><img src="${m.foto || 'https://via.placeholder.com/300x180'}" onclick="window.verZoom('${m.foto}')"><div><b>${m.modelo}</b></div><div style="font-size:12px;opacity:0.7">${m.fabricante}</div><div class="card-btns"><button class="btn-action" style="background:#3498db" onclick="window.abrirInfoModelo('${m.id}')">INFO</button><button class="btn-action" style="background:#f39c12" onclick="window.editarModelo('${m.id}')">EDIT</button><button class="btn-action" style="background:var(--danger)" onclick="window.borrarModelo('${m.id}')">DEL</button></div></div>`;
    });
};

window.abrirInfoModelo = (id) => {
    currentModelId = id; const m = modelos.find(x => x.id === id);
    document.getElementById("infoTitle").innerText = m.modelo;
    document.getElementById("infoDetails").innerHTML = `<b>Marca:</b> ${m.fabricante} | <b>EAN:</b> ${m.codigo||'--'}`;
    const gal = document.getElementById("galleryGrid"); gal.innerHTML = "";
    (m.galeria || []).forEach((url, idx) => {
        gal.innerHTML += `<div style="position:relative;"><img src="${url}" style="width:100%; height:80px; object-fit:cover; border-radius:4px" onclick="window.verZoom('${url}')"><button onclick="window.borrarFotoGaleria(${idx})" style="position:absolute; top:2px; right:2px; background:red; color:white; border:none; border-radius:3px; padding:2px 5px;">X</button></div>`;
    });
    document.getElementById("infoModal").style.display = "flex";
};

window.añadirUrlsAGaleria = async () => {
    const input = document.getElementById("urlPhotoInput").value.trim(); if(!input) return;
    const urls = input.split(/[;,]+/).map(u => u.trim()).filter(u => u.length > 0);
    const m = modelos.find(x => x.id === currentModelId); if(!m.galeria) m.galeria = [];
    m.galeria.push(...urls); await updateDoc(doc(db, "modelos", currentModelId), { galeria: m.galeria });
    document.getElementById("urlPhotoInput").value = ""; window.abrirInfoModelo(currentModelId);
};

window.borrarFotoGaleria = async (idx) => {
    const m = modelos.find(x => x.id === currentModelId); m.galeria.splice(idx, 1);
    await updateDoc(doc(db, "modelos", currentModelId), { galeria: m.galeria }); window.abrirInfoModelo(currentModelId);
};

window.openFormModal = () => { document.getElementById('form_id').value=""; document.getElementById('form_codigo').value=""; document.getElementById('form_fabricante').value=""; document.getElementById('form_modelo').value=""; document.getElementById('form_precio').value=""; document.getElementById('form_foto_url').value=""; document.getElementById('formModal').style.display='flex'; };
window.closeFormModal = () => document.getElementById('formModal').style.display='none';

window.editarModelo = (id) => {
    const m = modelos.find(x => x.id === id);
    document.getElementById('form_id').value=m.id; document.getElementById('form_codigo').value=m.codigo||"";
    document.getElementById('form_fabricante').value=m.fabricante||""; document.getElementById('form_modelo').value=m.modelo||"";
    document.getElementById('form_precio').value=m.precio||""; document.getElementById('form_foto_url').value=m.foto||"";
    document.getElementById('formModal').style.display='flex';
};

window.guardarModelo = async () => {
    const id = document.getElementById('form_id').value;
    const d = { codigo: document.getElementById('form_codigo').value, fabricante: document.getElementById('form_fabricante').value, modelo: document.getElementById('form_modelo').value, precio: document.getElementById('form_precio').value, foto: document.getElementById('form_foto_url').value };
    if(id) await updateDoc(doc(db, "modelos", id), d); else await addDoc(collection(db, "modelos"), d);
    document.getElementById('formModal').style.display='none'; cargarModelos();
};

window.borrarModelo = async (id) => { if(confirm("¿Eliminar?")) { await deleteDoc(doc(db, "modelos", id)); cargarModelos(); } };

// --- STOCK PINTURAS ---
async function cargarCatalogoPinturas() {
    const resp = await fetch('pinturas.json'); paintCatalogData = await resp.json();
    const f = document.getElementById('brandFilter'); f.innerHTML = "";
    Object.keys(paintCatalogData).forEach(b => f.innerHTML += `<option value="${b}">${b}</option>`);
    window.renderPaintCatalog(); initMixerUI();
}

window.renderPaintCatalog = () => {
    const brand = document.getElementById('brandFilter').value;
    const q = document.getElementById('paintSearch').value.toLowerCase();
    const container = document.getElementById('paintCatalog'); container.innerHTML = "";
    if(paintCatalogData[brand]) {
        paintCatalogData[brand].filter(p => p.nombre.toLowerCase().includes(q) || p.id.toLowerCase().includes(q)).forEach(p => {
            const isHave = myPaints.have.includes(p.id); const isBuy = myPaints.buy.includes(p.id); const level = myPaints.levels[p.id] || 'full';
            container.innerHTML += `<div class="paint-item"><div class="color-swatch" style="background:${p.hex}"></div><div style="flex:1"><b>${p.id}</b><br><small>${p.nombre}</small></div><div style="display:flex; flex-direction:column; gap:4px"><div style="display:flex; gap:4px"><button class="btn-mini" style="background:${isHave?'var(--success)':'#333'}" onclick="window.togglePaint('${p.id}', 'have')">✅</button><button class="btn-mini" style="background:${isBuy?'var(--danger)':'#333'}" onclick="window.togglePaint('${p.id}', 'buy')">🛒</button></div><select class="stock-level level-${level}" onchange="window.updatePaintLevel('${p.id}', this.value)"><option value="full" ${level==='full'?'selected':''}>MUCHA</option><option value="low" ${level==='low'?'selected':''}>POCA</option><option value="empty" ${level==='empty'?'selected':''}>NADA</option></select></div></div>`;
        });
    }
};

window.updatePaintLevel = (id, val) => { myPaints.levels[id] = val; if(val === 'empty' && !myPaints.buy.includes(id)) myPaints.buy.push(id); localStorage.setItem('maikman_paints', JSON.stringify(myPaints)); window.renderPaintCatalog(); window.updateCartCount(); };
window.togglePaint = (id, type) => { const idx = myPaints[type].indexOf(id); if(idx > -1) myPaints[type].splice(idx, 1); else myPaints[type].push(id); localStorage.setItem('maikman_paints', JSON.stringify(myPaints)); window.renderPaintCatalog(); window.updateCartCount(); };
window.updateCartCount = () => document.getElementById('cartCount').innerText = myPaints.buy.length;

// --- MIXER & COLOR PICKER (LA CLAVE) ---
window.toggleMixerMode = (mode) => {
    document.getElementById('modeMixContainer').style.display = mode === 'mix' ? 'block' : 'none';
    document.getElementById('modePickContainer').style.display = mode === 'pick' ? 'block' : 'none';
    document.getElementById('btnModeMix').classList.toggle('active', mode === 'mix');
    document.getElementById('btnModePick').classList.toggle('active', mode === 'pick');
};

function initMixerUI() {
    const container = document.getElementById('mixerCardsContainer'); container.innerHTML = "";
    let opts = '<option value="">- Vacío -</option>';
    Object.keys(paintCatalogData).forEach(b => {
        opts += `<optgroup label="${b}">`;
        paintCatalogData[b].forEach(p => opts += `<option value="${p.hex}">${p.id} - ${p.nombre}</option>`);
        opts += `</optgroup>`;
    });
    for(let i=1; i<=4; i++) {
        container.innerHTML += `<div class="mixer-card" style="background:rgba(255,255,255,0.03); padding:8px; border-radius:8px; border:1px solid #333;"><select id="mixColor${i}" onchange="window.calculateMix()">${opts}</select><input type="range" id="mixSlider${i}" min="0" max="100" value="0" oninput="window.handleMixSlider(${i})"><div style="display:flex; justify-content:space-between; font-size:11px;"><span id="mixLabel${i}">0%</span><span id="dropsLabel${i}" style="color:var(--accent)">0.0 g.</span></div></div>`;
    }
    mixerChart = new Chart(document.getElementById('mixerChart').getContext('2d'), { type: 'pie', data: { labels: [], datasets: [{ data: [], backgroundColor: [] }] }, options: { plugins: { legend: { display: false } }, animation: false } });
}

window.handleMixSlider = (index) => {
    let vals = []; let acts = [];
    for(let i=1; i<=4; i++) { let val = parseInt(document.getElementById(`mixSlider${i}`).value); vals.push(val); if(document.getElementById(`mixColor${i}`).value !== "") acts.push(i-1); }
    if(acts.length <= 1) { if(acts.length === 1) document.getElementById(`mixSlider${acts[0]+1}`).value = 100; window.calculateMix(); return; }
    let changed = index-1; let others = acts.filter(idx => idx !== changed);
    let rem = 100 - vals[changed]; let sumOthers = 0; others.forEach(idx => sumOthers += vals[idx]);
    if(sumOthers === 0) others.forEach(idx => document.getElementById(`mixSlider${idx+1}`).value = rem / others.length);
    else others.forEach(idx => document.getElementById(`mixSlider${idx+1}`).value = (vals[idx]/sumOthers)*rem);
    window.calculateMix();
};

window.calculateMix = () => {
    let r=0, g=0, b=0, tot=0; const lbs=[], dts=[], cls=[];
    for(let i=1; i<=4; i++) {
        const hex = document.getElementById(`mixColor${i}`).value; const p = parseFloat(document.getElementById(`mixSlider${i}`).value);
        document.getElementById(`mixLabel${i}`).innerText = Math.round(p) + "%"; document.getElementById(`dropsLabel${i}`).innerText = (p/10).toFixed(1) + " g.";
        if(hex && p > 0) { const rgb = hexToRgb(hex); r += rgb.r*p; g += rgb.g*p; b += rgb.b*p; tot += p; lbs.push(document.getElementById(`mixColor${i}`).selectedOptions[0].text); dts.push(p); cls.push(hex); }
    }
    if(tot > 0) { const fHex = rgbToHex(Math.round(r/tot), Math.round(g/tot), Math.round(b/tot)); document.getElementById('mixerResultPreview').style.backgroundColor = fHex; document.getElementById('hexResult').innerText = fHex; }
    mixerChart.data.labels = lbs; mixerChart.data.datasets[0].data = dts; mixerChart.data.datasets[0].backgroundColor = cls; mixerChart.update();
};

window.resetMixer = () => { for(let i=1; i<=4; i++) { document.getElementById(`mixColor${i}`).value=""; document.getElementById(`mixSlider${i}`).value=0; } window.calculateMix(); };

// --- LÓGICA COLOR PICKER POR IMAGEN ---
window.loadPickerImage = (event) => {
    const reader = new FileReader();
    reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
            const canvas = document.getElementById('canvasPicker'); const ctx = canvas.getContext('2d');
            canvas.width = img.width; canvas.height = img.height;
            ctx.drawImage(img, 0, 0); canvas.style.display = 'block';
        };
        img.src = e.target.result;
    };
    reader.readAsDataURL(event.target.files[0]);
};

document.getElementById('canvasPicker').addEventListener('mousedown', (e) => {
    const canvas = document.getElementById('canvasPicker'); const ctx = canvas.getContext('2d');
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (canvas.width / rect.width);
    const y = (e.clientY - rect.top) * (canvas.height / rect.height);
    const pixel = ctx.getImageData(x, y, 1, 1).data;
    const hex = rgbToHex(pixel[0], pixel[1], pixel[2]);
    document.getElementById('pickedColorInfo').innerHTML = `Color seleccionado: <b style="color:${hex}">${hex}</b>. Buscando equivalencias...`;
    findPaintMatches(pixel[0], pixel[1], pixel[2]);
});

function findPaintMatches(r, g, b) {
    const matches = [];
    for(let brand in paintCatalogData) {
        paintCatalogData[brand].forEach(p => {
            const target = hexToRgb(p.hex);
            const dist = Math.sqrt(Math.pow(r-target.r,2) + Math.pow(g-target.g,2) + Math.pow(b-target.b,2));
            matches.push({ ...p, dist, brand });
        });
    }
    matches.sort((a,b) => a.dist - b.dist);
    const top3 = matches.slice(0, 3);
    const list = document.getElementById('matchList'); list.innerHTML = "<b>Sugerencias de tu stock:</b>";
    top3.forEach(m => {
        const isHave = myPaints.have.includes(m.id);
        list.innerHTML += `<div class="match-card"><div class="color-swatch" style="background:${m.hex}"></div><div style="flex:1"><b>${m.id}</b> (${m.brand})<br><small>${m.nombre}</small></div><div style="font-size:10px; color:${isHave?'var(--success)':'var(--danger)'}">${isHave?'EN STOCK':'SIN STOCK'}</div></div>`;
    });
}

// --- ZOOM ---
window.verZoom = (url) => { if(!url || url.includes('placeholder')) return; document.getElementById("zoomImg").src = url; window.resetZoomParams(); document.getElementById("zoomModal").style.display = "flex"; };
window.resetZoomParams = () => { scale = 1; posX = 0; posY = 0; applyTransform(); };
window.adjustZoom = (delta) => { scale = Math.min(Math.max(.5, scale + delta), 5); applyTransform(); };
function applyTransform() { document.getElementById("zoomImg").style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`; }
window.closeZoom = () => { document.getElementById("zoomModal").style.display = 'none'; };

// --- UTILS ---
function encontrarPintura(id) { for(let b in paintCatalogData) { let p = paintCatalogData[b].find(x => x.id === id); if(p) return p; } return { nombre: id, hex: "#333", id: id }; }
function hexToRgb(h) { return { r: parseInt(h.slice(1,3),16), g: parseInt(h.slice(3,5),16), b: parseInt(h.slice(5,7),16) }; }
function rgbToHex(r, g, b) { return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1).toUpperCase(); }

onAuthStateChanged(auth, user => {
    document.getElementById("login").style.display = user ? "none" : "block";
    document.getElementById("app").style.display = user ? "block" : "none";
    if (user) { cargarModelos(); cargarCatalogoPinturas(); window.updateCartCount(); }
});
