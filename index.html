<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Maikman Models Stock</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
    --bg:#0f172a; --card:#020617; --text:#e5e7eb; --accent:#38bdf8; --success:#00b894; --danger:#d63031;
}
body.light { --bg:#f1f5f9; --card:#fff; --text:#020617; --accent:#2563eb; }
* { box-sizing:border-box; transition:.3s; }
body { margin:0; font-family:system-ui; background:var(--bg); color:var(--text); padding-bottom: 20px; }

/* Navegación Superior Unificada */
.nav-tabs { 
    display: flex; 
    align-items: center;
    background: var(--card); 
    padding: 8px; 
    gap: 6px; 
    position: sticky; 
    top: 0; 
    z-index: 900; 
    border-bottom: 1px solid #334155; 
}
.tab-btn { 
    padding: 12px 10px; 
    border: none; 
    background: rgba(255,255,255,0.05); 
    color: var(--text); 
    cursor: pointer; 
    border-radius: 8px; 
    font-weight: bold; 
    font-size: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
    white-space: nowrap;
}
.tab-btn.active { background: var(--accent); color: white; }

/* Botones Maquetas y Pinturas ocupan el resto del espacio */
.flex-grow { flex: 2; }
/* Lista de compra y config ocupan solo lo necesario */
.tab-btn-compact { flex: 1; min-width: fit-content; }

.cart-badge {
    background: var(--danger);
    color: white;
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 10px;
    margin-left: 5px;
}

#app { display:none; }
.content-section { display: none; padding: 20px; }
.content-section.active { display: block; }

/* Grid de Maquetas */
#grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:16px; }
.card { background:var(--card); border-radius:12px; padding:12px; border: 1px solid #334155; }
.card img { width:100%; height:180px; object-fit:cover; border-radius:8px; margin-bottom:10px; }

/* Catálogo de Pinturas */
.paint-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }
.paint-item { background: var(--card); padding: 12px; border-radius: 8px; display: flex; align-items: center; gap: 12px; border: 1px solid #334155; }
.color-swatch { width: 25px; height: 25px; border-radius: 5px; border: 1px solid #444; flex-shrink: 0; }
.btn-mini { border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; color: white; background: #334155; }
.btn-mini.active-have { background: var(--success) !important; }
.btn-mini.active-buy { background: var(--danger) !important; }

/* Modales */
.modal { position:fixed; inset:0; background:rgba(0,0,0,.85); display:none; align-items:center; justify-content:center; z-index:1000; padding:20px; }
.modal-content { background:var(--card); padding:24px; width:100%; max-width:500px; border-radius:12px; border: 1px solid #444; max-height: 90vh; overflow-y: auto; }

input, select { padding:12px; border-radius:6px; border: 1px solid #334155; background: #1e293b; color: white; width: 100%; margin-bottom: 10px; }
button.primary { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; }
</style>
</head>
<body class="dark">

<div id="login" style="max-width:320px; margin:80px auto; padding:20px; text-align:center; background: var(--card); border-radius: 12px;">
    <h2>Maikman Stock</h2>
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Contraseña">
    <button class="primary" onclick="login()">Entrar</button>
</div>

<div id="app">
    <nav class="nav-tabs">
        <button class="tab-btn flex-grow active" onclick="switchTab('tab-maquetas')">📦 MAQUETAS</button>
        <button class="tab-btn flex-grow" onclick="switchTab('tab-pinturas')">🎨 PINTURAS</button>
        <button class="tab-btn tab-btn-compact" onclick="exportShoppingList()">🛒 COMPRA <span id="cartCount" class="cart-badge">0</span></button>
        <button class="tab-btn tab-btn-compact" onclick="openConfigModal()">⚙️</button>
    </nav>

    <section id="tab-maquetas" class="content-section active">
        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <input id="search" placeholder="Buscar maqueta..." oninput="renderMaquetas()">
            <button onclick="openModal()" style="white-space:nowrap; height:42px; background:var(--accent); color:white; border:none; border-radius:6px; padding:0 15px; cursor:pointer;">➕ Añadir</button>
        </div>
        <div id="grid"></div>
    </section>

    <section id="tab-pinturas" class="content-section">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:20px;">
            <select id="brandFilter" onchange="renderPaintCatalog()"></select>
            <input id="paintSearch" placeholder="Buscar pintura..." onkeyup="renderPaintCatalog()">
        </div>
        <div id="paintCatalog" class="paint-grid"></div>
    </section>
</div>

<div id="configModal" class="modal">
    <div class="modal-content">
        <h3>Configuración</h3>
        <button onclick="document.body.classList.toggle('light')" style="width:100%; padding:10px; margin-bottom:10px;">🌓 Cambiar Tema Claro/Oscuro</button>
        <button onclick="signOutUser()" style="width:100%; padding:10px; background:var(--danger); color:white; border:none; border-radius:6px; cursor:pointer;">Cerrar Sesión</button>
        <button onclick="closeConfigModal()" style="width:100%; margin-top:10px; background:#555; color:white; border:none; padding:10px; border-radius:6px; cursor:pointer;">Cerrar</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    // REEMPLAZA CON TU CONFIGURACIÓN DE FIREBASE
    apiKey: "TU_API_KEY",
    authDomain: "TU_PROYECTO.firebaseapp.com",
    projectId: "TU_PROYECTO",
    storageBucket: "TU_PROYECTO.appspot.com",
    messagingSenderId: "ID",
    appId: "APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let modelos = [];
let paintCatalogData = {};
let myPaints = JSON.parse(localStorage.getItem('maikman_paints')) || { have: [], buy: [] };

// --- AUTENTICACIÓN ---
window.login = () => {
    const e = document.getElementById('email').value;
    const p = document.getElementById('password').value;
    signInWithEmailAndPassword(auth, e, p).catch(err => alert("Acceso denegado"));
};
window.signOutUser = () => signOut(auth);

onAuthStateChanged(auth, user => {
    document.getElementById("login").style.display = user ? "none" : "block";
    document.getElementById("app").style.display = user ? "block" : "none";
    if (user) { 
        cargarModelos(); 
        cargarCatalogoPinturas(); 
        updateCartCount();
    }
});

// --- PESTAÑAS ---
window.switchTab = (tabId) => {
    document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    event.currentTarget.classList.add('active');
};

// --- GESTIÓN DE MAQUETAS ---
async function cargarModelos() {
    const snap = await getDocs(collection(db, "modelos"));
    modelos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderMaquetas();
}

window.renderMaquetas = () => {
    const grid = document.getElementById("grid");
    const q = document.getElementById("search").value.toLowerCase();
    grid.innerHTML = "";
    modelos.filter(m => (m.modelo||"").toLowerCase().includes(q)).forEach(m => {
        grid.innerHTML += `
            <div class="card">
                <img src="${m.foto || 'https://via.placeholder.com/200'}">
                <div style="font-weight:bold">${m.modelo}</div>
                <div style="font-size:12px; opacity:0.7">${m.fabricante}</div>
            </div>`;
    });
};

// --- GESTIÓN DE PINTURAS ---
async function cargarCatalogoPinturas() {
    try {
        const response = await fetch('pinturas.json');
        if (!response.ok) throw new Error('Archivo no encontrado');
        paintCatalogData = await response.json();
        
        const filter = document.getElementById('brandFilter');
        filter.innerHTML = "";
        Object.keys(paintCatalogData).forEach(brand => {
            filter.innerHTML += `<option value="${brand}">${brand}</option>`;
        });
        renderPaintCatalog();
    } catch (err) {
        console.error("Error cargando pinturas.json:", err);
        document.getElementById('paintCatalog').innerHTML = "<p style='color:red'>Error: Asegúrate de que pinturas.json existe y es válido.</p>";
    }
}

window.renderPaintCatalog = () => {
    const brand = document.getElementById('brandFilter').value;
    const search = document.getElementById('paintSearch').value.toLowerCase();
    const container = document.getElementById('paintCatalog');
    container.innerHTML = "";

    if (!paintCatalogData[brand]) return;

    paintCatalogData[brand].filter(p => p.nombre.toLowerCase().includes(search) || p.id.toLowerCase().includes(search)).forEach(p => {
        const isHave = myPaints.have.includes(p.id);
        const isBuy = myPaints.buy.includes(p.id);
        container.innerHTML += `
            <div class="paint-item">
                <div class="color-swatch" style="background:${p.hex || '#555'}"></div>
                <div style="flex:1"><b>${p.id}</b><br><small>${p.nombre}</small></div>
                <button class="btn-mini ${isHave?'active-have':''}" onclick="togglePaint('${p.id}', 'have')">✅</button>
                <button class="btn-mini ${isBuy?'active-buy':''}" onclick="togglePaint('${p.id}', 'buy')">🛒</button>
            </div>`;
    });
};

window.togglePaint = (id, type) => {
    const idx = myPaints[type].indexOf(id);
    if (idx > -1) myPaints[type].splice(idx, 1);
    else myPaints[type].push(id);
    localStorage.setItem('maikman_paints', JSON.stringify(myPaints));
    renderPaintCatalog();
    updateCartCount();
};

window.updateCartCount = () => {
    document.getElementById('cartCount').innerText = myPaints.buy.length;
};

window.exportShoppingList = () => {
    if (myPaints.buy.length === 0) return alert("La lista de compra está vacía.");
    const text = "Lista de Compra Maikman Models:\n" + myPaints.buy.join(", ");
    navigator.clipboard.writeText(text);
    alert("Lista copiada al portapapeles:\n" + text);
};

// --- MODALES ---
window.openConfigModal = () => document.getElementById('configModal').style.display = 'flex';
window.closeConfigModal = () => document.getElementById('configModal').style.display = 'none';
window.openModal = () => alert("Aquí abrirías tu formulario de añadir maqueta");
</script>
</body>
</html>
