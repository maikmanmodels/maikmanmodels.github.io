<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maikman Models - Pro Stock v5.2.3</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
:root {
    --bg:#0f172a; --card:#020617; --text:#e5e7eb; --accent:#38bdf8; --success:#00b894; --danger:#d63031;
    --min-card-width: 260px;
}
body.light { --bg:#f1f5f9; --card:#fff; --text:#020617; --accent:#2563eb; }
* { box-sizing:border-box; transition:.3s; }
body { margin:0; font-family:system-ui; background:var(--bg); color:var(--text); padding-bottom: 20px; }

/* Navegación */
.nav-tabs { display: flex; align-items: center; background: var(--card); padding: 8px; gap: 4px; position: sticky; top: 0; z-index: 900; border-bottom: 1px solid #334155; overflow-x: auto; }
.tab-btn { background:none; border:none; color:var(--text); padding: 10px 16px; cursor:pointer; font-weight:600; white-space:nowrap; border-radius: 6px; }
.tab-btn.active { background:var(--accent); color:#000; }

.container { padding: 16px; max-width: 1200px; margin: auto; }
.view { display:none; } .view.active { display:block; }

/* Buscador y Filtros */
.controls { display:flex; gap:10px; margin-bottom:15px; flex-wrap:wrap; }
.search-bar { flex-grow:1; padding:12px; border-radius:8px; border:1px solid #334155; background:var(--card); color:var(--text); min-width:200px; }

/* Grid Pinturas */
.paint-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(var(--min-card-width), 1fr)); gap: 12px; margin-top:10px; }
.paint-card { background:var(--card); padding: 12px; border-radius: 12px; display:flex; align-items:center; gap:12px; border: 1px solid #334155; position: relative; }
.color-swatch { width: 45px; height: 45px; border-radius: 8px; border: 1px solid #ffffff22; flex-shrink: 0; }
.paint-info { flex-grow: 1; overflow: hidden; }
.paint-id { font-weight: 800; font-size: 0.9em; color: var(--accent); display:block; }
.paint-name { font-size: 0.8em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }

/* Stock Controls */
.stock-ctrl { display:flex; align-items:center; gap:8px; margin-top:5px; }
.btn-qty { width:28px; height:28px; border-radius:50%; border:none; background:#334155; color:white; cursor:pointer; }
.qty-val { font-weight:bold; min-width:15px; text-align:center; font-size:0.9em; }
.btn-buy { background:none; border:1px solid #444; color:var(--text); padding:2px 6px; border-radius:4px; font-size:0.7em; cursor:pointer; }
.btn-buy.active { background:#f39c12; color:black; border-color:#f39c12; }

/* Scanner Modal */
#scannerModal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:2000; flex-direction:column; align-items:center; justify-content:center; }
#reader { width: 320px; border-radius:12px; overflow:hidden; border:2px solid var(--accent); }

/* Modelos */
.model-card { background:var(--card); padding:15px; border-radius:12px; border:1px solid #334155; }
.form-group { display:grid; gap:10px; background:var(--card); padding:15px; border-radius:12px; margin-bottom:20px; border:1px solid var(--accent); }
.form-group input { padding:10px; border-radius:6px; border:1px solid #334155; background:#0f172a; color:white; }

/* Modales */
#cartModal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:2000; align-items:center; justify-content:center; }
.modal-content { background:var(--bg); padding:20px; border-radius:12px; width:90%; max-width:500px; max-height:85vh; overflow-y:auto; border:1px solid var(--accent); }
</style>
</head>
<body>

<div class="nav-tabs">
    <button class="tab-btn active" onclick="showTab('paints')">🎨 Pinturas</button>
    <button class="tab-btn" onclick="showTab('models')">📦 Maquetas</button>
    <button class="tab-btn" onclick="showTab('stats')">📊 Stats</button>
    <button class="tab-btn" onclick="abrirScanner()">📷 Scan</button>
    <button class="tab-btn" onclick="abrirCompra()" id="buyTab">🛒 Compra (0)</button>
    <div style="flex-grow:1"></div>
    <button class="tab-btn" onclick="document.body.classList.toggle('light')">🌓</button>
</div>

<div class="container">
    
    <div id="paintsView" class="view active">
        <div class="controls">
            <input type="text" class="search-bar" id="paintSearch" placeholder="Buscar pintura (ej: XF-1 o Black)..." oninput="renderPaints()">
            <select class="search-bar" style="max-width:150px" id="filterStock" onchange="renderPaints()">
                <option value="all">Todas</option>
                <option value="owned">En Stock</option>
                <option value="missing">Sin Stock</option>
            </select>
        </div>
        <div id="paintsContainer"></div>
    </div>

    <div id="modelsView" class="view">
        <div class="form-group">
            <input type="text" id="mFab" placeholder="Fabricante (Tamiya, Revell...)">
            <input type="text" id="mMod" placeholder="Nombre del Modelo">
            <input type="text" id="mCod" placeholder="Código de Referencia">
            <input type="number" id="mPre" placeholder="Precio (€)">
            <button class="tab-btn" style="background:var(--success); color:black" onclick="addModelo()">Añadir Maqueta</button>
        </div>
        <div style="display:flex; gap:10px; margin-bottom:15px">
            <button class="tab-btn" onclick="exportarExcelPrincipal()" style="background:#27ae60">📥 Exportar Stock</button>
        </div>
        <div class="paint-grid" id="modelsGrid"></div>
    </div>

    <div id="statsView" class="view">
        <canvas id="stockChart" style="max-height:400px"></canvas>
    </div>

</div>

<div id="scannerModal">
    <div id="reader"></div>
    <button class="tab-btn" style="margin-top:20px; background:var(--danger)" onclick="cerrarScanner()">Cancelar</button>
</div>

<div id="cartModal">
    <div class="modal-content">
        <h3>🛒 Lista de Compra</h3>
        <div id="cartList" style="margin-bottom:20px"></div>
        <button class="tab-btn" style="background:var(--success); color:black; width:100%" onclick="exportarListaExcel()">Exportar Excel de Compra</button>
        <button class="tab-btn" style="width:100%; margin-top:10px" onclick="cerrarModalCompra()">Cerrar</button>
    </div>
</div>

<script>
// --- DATOS ---
let paintCatalogData = {};
let myPaints = { stock: {}, buy: [] };
let modelos = [];
let html5QrCode = null;
let stockChart = null;

// INICIO
async function init() {
    try {
        const response = await fetch('pinturas (1).json');
        paintCatalogData = await response.json();
        
        const sPaints = localStorage.getItem('maikman_paints_v5');
        if(sPaints) myPaints = JSON.parse(sPaints);
        
        const sModels = localStorage.getItem('maikman_models_v5');
        if(sModels) modelos = JSON.parse(sModels);
        
        renderPaints();
        renderModelos();
        actualizarGrafico();
    } catch(e) { console.error("Error init:", e); }
}

// --- LÓGICA PINTURAS ---
function renderPaints() {
    const query = document.getElementById('paintSearch').value.toLowerCase();
    const filter = document.getElementById('filterStock').value;
    const container = document.getElementById('paintsContainer');
    container.innerHTML = '';

    for (let marca in paintCatalogData) {
        let filtradas = paintCatalogData[marca].filter(p => {
            const matchesSearch = p.id.toLowerCase().includes(query) || p.nombre.toLowerCase().includes(query);
            const stock = myPaints.stock[p.id] || 0;
            if (filter === 'owned') return matchesSearch && stock > 0;
            if (filter === 'missing') return matchesSearch && stock === 0;
            return matchesSearch;
        });

        if (filtradas.length > 0) {
            const div = document.createElement('div');
            div.innerHTML = `<h3 style="margin:20px 0 10px; color:var(--accent); border-bottom:1px solid #334155">${marca}</h3>`;
            const grid = document.createElement('div');
            grid.className = 'paint-grid';

            filtradas.forEach(p => {
                const qty = myPaints.stock[p.id] || 0;
                const inBuy = myPaints.buy.includes(p.id);
                grid.innerHTML += `
                    <div class="paint-card">
                        <div class="color-swatch" style="background:${p.hex}"></div>
                        <div class="paint-info">
                            <span class="paint-id">${p.id}</span>
                            <span class="paint-name">${p.nombre}</span>
                            <div class="stock-ctrl">
                                <button class="btn-qty" onclick="changeQty('${p.id}', -1)">-</button>
                                <span class="qty-val">${qty}</span>
                                <button class="btn-qty" onclick="changeQty('${p.id}', 1)">+</button>
                                <button class="btn-buy ${inBuy ? 'active' : ''}" onclick="toggleBuy('${p.id}')">🛒</button>
                            </div>
                        </div>
                    </div>`;
            });
            div.appendChild(grid);
            container.appendChild(div);
        }
    }
    actualizarContadorCompra();
}

window.changeQty = (id, delta) => {
    myPaints.stock[id] = Math.max(0, (myPaints.stock[id] || 0) + delta);
    save(); renderPaints(); actualizarGrafico();
};

window.toggleBuy = (id) => {
    const i = myPaints.buy.indexOf(id);
    if(i > -1) myPaints.buy.splice(i, 1);
    else myPaints.buy.push(id);
    save(); renderPaints();
};

// --- LÓGICA MODELOS ---
window.addModelo = () => {
    const m = {
        id: Date.now(),
        fabricante: document.getElementById('mFab').value,
        modelo: document.getElementById('mMod').value,
        codigo: document.getElementById('mCod').value,
        precio: document.getElementById('mPre').value
    };
    if(!m.modelo) return;
    modelos.push(m);
    localStorage.setItem('maikman_models_v5', JSON.stringify(modelos));
    renderModelos();
    document.querySelectorAll('.form-group input').forEach(i => i.value = '');
};

function renderModelos() {
    const grid = document.getElementById('modelsGrid');
    grid.innerHTML = '';
    modelos.forEach(m => {
        grid.innerHTML += `
            <div class="model-card">
                <div style="font-size:0.7em; color:var(--accent)">${m.fabricante}</div>
                <div style="font-weight:bold">${m.modelo}</div>
                <div style="font-size:0.8em; color:#888">${m.codigo}</div>
                <div style="display:flex; justify-content:space-between; margin-top:10px; align-items:center">
                    <span style="color:var(--success)">${m.precio}€</span>
                    <button onclick="deleteModel(${m.id})" style="background:none; border:none; color:var(--danger); cursor:pointer">Eliminar</button>
                </div>
            </div>`;
    });
}

window.deleteModel = (id) => {
    modelos = modelos.filter(m => m.id !== id);
    localStorage.setItem('maikman_models_v5', JSON.stringify(modelos));
    renderModelos();
};

// --- SCANNER (NUEVO FORMATO EAN) ---
window.abrirScanner = () => {
    document.getElementById('scannerModal').style.display='flex';
    html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
        let found = null;
        for(let m in paintCatalogData) {
            found = paintCatalogData[m].find(p => {
                if(!p.ean) return false;
                return Array.isArray(p.ean) ? p.ean.includes(text) : p.ean === text;
            });
            if(found) break;
        }
        if(found) {
            cerrarScanner();
            document.getElementById('paintSearch').value = found.id;
            showTab('paints');
            renderPaints();
        }
    }).catch(e => console.error(e));
};

window.cerrarScanner = () => {
    if(html5QrCode) html5QrCode.stop().then(() => { document.getElementById('scannerModal').style.display='none'; });
};

// --- EXPORTACIÓN ---
window.exportarExcelPrincipal = () => {
    const data = modelos.map(m => ({ MARCA: m.fabricante, MODELO: m.modelo, CODIGO: m.codigo, PRECIO: m.precio }));
    const ws = XLSX.utils.json_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Stock_Modelos");
    XLSX.writeFile(wb, "Maikman_Model_Stock.xlsx");
};

window.exportarListaExcel = () => {
    const data = myPaints.buy.map(id => {
        const p = encontrarPintura(id);
        return { CODIGO: p.id, NOMBRE: p.nombre };
    });
    const ws = XLSX.utils.json_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Compra");
    XLSX.writeFile(wb, "Lista_Compra_Pinturas.xlsx");
};

// --- UTILS ---
function save() { localStorage.setItem('maikman_paints_v5', JSON.stringify(myPaints)); }
function showTab(t) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(t+'View').classList.add('active');
    event.currentTarget.classList.add('active');
}
function encontrarPintura(id) {
    for(let m in paintCatalogData) {
        let p = paintCatalogData[m].find(x => x.id === id);
        if(p) return p;
    }
    return { id: id, nombre: "Desconocido" };
}
function actualizarContadorCompra() { document.getElementById('buyTab').innerText = `🛒 Compra (${myPaints.buy.length})`; }

window.abrirCompra = () => {
    const list = document.getElementById('cartList');
    list.innerHTML = '';
    myPaints.buy.forEach(id => {
        const p = encontrarPintura(id);
        list.innerHTML += `<div style="display:flex; justify-content:space-between; padding:5px; border-bottom:1px solid #334155">
            <span><b>${p.id}</b> ${p.nombre}</span>
            <button onclick="toggleBuy('${p.id}'); abrirCompra()" style="color:var(--danger); background:none; border:none; cursor:pointer">✖</button>
        </div>`;
    });
    document.getElementById('cartModal').style.display='flex';
};
window.cerrarModalCompra = () => document.getElementById('cartModal').style.display='none';

function actualizarGrafico() {
    const ctx = document.getElementById('stockChart').getContext('2d');
    const labels = Object.keys(paintCatalogData);
    const data = labels.map(m => {
        return paintCatalogData[m].filter(p => (myPaints.stock[p.id] || 0) > 0).length;
    });

    if(stockChart) stockChart.destroy();
    stockChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{ label: 'Pinturas en Stock', data: data, backgroundColor: '#38bdf8' }]
        },
        options: { responsive: true, plugins: { legend: { labels: { color: 'white' } } } }
    });
}

init();
</script>
</body>
</html>
