<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maikman Models - Pro Stock v5.5.0</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root {
            --bg: #0f172a; --card: #020617; --text: #e5e7eb; 
            --accent: #38bdf8; --success: #00b894; --danger: #d63031;
            --min-card-width: 260px;
        }
        body.light { --bg: #f1f5f9; --card: #fff; --text: #020617; --accent: #2563eb; }
        
        * { box-sizing: border-box; transition: 0.3s; }
        body { 
            margin: 0; font-family: system-ui, -apple-system, sans-serif; 
            background: var(--bg); color: var(--text); padding-bottom: 40px; 
        }

        /* Navegación */
        .nav-tabs {
            display: flex; align-items: center; background: var(--card);
            padding: 8px; gap: 4px; position: sticky; top: 0; z-index: 999;
            border-bottom: 1px solid #334155; overflow-x: auto;
        }
        .tab-btn {
            background: none; border: none; color: var(--text);
            padding: 10px 16px; cursor: pointer; font-weight: 600;
            white-space: nowrap; border-radius: 6px; font-size: 0.9em;
        }
        .tab-btn.active { background: var(--accent); color: #000; }

        .container { padding: 16px; max-width: 1200px; margin: auto; }
        .view { display: none; }
        .view.active { display: block; }

        /* Tarjetas y Grids */
        .grid {
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(var(--min-card-width), 1fr));
            gap: 15px;
        }
        .card {
            background: var(--card); padding: 15px; border-radius: 12px;
            border: 1px solid #334155; position: relative;
        }
        .paint-card { display: flex; align-items: center; gap: 12px; }
        .color-swatch { width: 45px; height: 45px; border-radius: 8px; border: 1px solid #444; flex-shrink: 0; }

        /* Formularios */
        .form-group {
            display: grid; gap: 10px; background: var(--card);
            padding: 20px; border-radius: 12px; margin-bottom: 25px;
            border: 1px solid var(--accent);
        }
        .form-group input {
            padding: 12px; border-radius: 6px; border: 1px solid #334155;
            background: #0f172a; color: white; width: 100%;
        }

        /* Modales */
        .modal {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.9); z-index: 2000;
            align-items: center; justify-content: center; padding: 20px;
        }
        .modal-content {
            background: var(--bg); padding: 25px; border-radius: 15px;
            width: 100%; max-width: 500px; border: 1px solid var(--accent);
            max-height: 85vh; overflow-y: auto;
        }
        #reader { width: 100%; max-width: 400px; border-radius: 12px; overflow: hidden; background: #000; }

        /* Botones */
        .btn-action { padding: 10px 15px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; }
        .btn-qty { width: 30px; height: 30px; border-radius: 50%; border: none; background: #334155; color: white; cursor: pointer; }
    </style>
</head>
<body>

<nav class="nav-tabs">
    <button class="tab-btn active" onclick="showTab('models', event)">📦 Maquetas</button>
    <button class="tab-btn" onclick="showTab('paints', event)">🎨 Pinturas</button>
    <button class="tab-btn" onclick="showTab('stats', event)">📊 Stats</button>
    <button class="tab-btn" onclick="abrirScanner()">📷 Scan</button>
    <button class="tab-btn" onclick="abrirCompra()" id="buyBtnNav">🛒 Compra (0)</button>
    <div style="flex-grow:1"></div>
    <button class="tab-btn" onclick="document.body.classList.toggle('light')">🌓</button>
</nav>

<div class="container">
    
    <div id="modelsView" class="view active">
        <div class="form-group">
            <h3 style="margin:0">Gestión de Inventario</h3>
            <div style="display:flex; gap:10px; margin-bottom:10px">
                <button class="btn-action" style="background:#444; color:white; font-size:0.8em" onclick="exportarModelos()">📥 Exportar JSON</button>
                <button class="btn-action" style="background:#444; color:white; font-size:0.8em" onclick="document.getElementById('importFile').click()">📤 Importar JSON</button>
                <input type="file" id="importFile" style="display:none" onchange="importarModelos(event)">
            </div>
            <hr style="border:0; border-top:1px solid #334155; margin:10px 0">
            <input type="text" id="mFab" placeholder="Fabricante">
            <input type="text" id="mMod" placeholder="Nombre de la Maqueta">
            <input type="text" id="mCod" placeholder="Referencia / Escala">
            <input type="number" id="mPre" placeholder="Precio (€)">
            <button class="btn-action" style="background:var(--success); color:black" onclick="addModelo()">Añadir al Stock</button>
        </div>
        <div class="grid" id="modelsGrid"></div>
    </div>

    <div id="paintsView" class="view">
        <div style="display:flex; gap:10px; margin-bottom:15px">
            <input type="text" id="paintSearch" style="flex-grow:1; padding:12px; border-radius:8px; background:var(--card); color:white; border:1px solid #334155" placeholder="Buscar pintura..." oninput="renderPaints()">
            <select id="filterStock" style="background:var(--card); color:white; border-radius:8px; border:1px solid #334155" onchange="renderPaints()">
                <option value="all">Todas</option>
                <option value="owned">En Stock</option>
                <option value="missing">Sin Stock</option>
            </select>
        </div>
        <div id="paintsContainer"></div>
    </div>

    <div id="statsView" class="view">
        <div class="card">
            <canvas id="stockChart"></canvas>
        </div>
    </div>

</div>

<div id="scannerModal" class="modal">
    <div id="reader"></div>
    <button class="btn-action" style="background:var(--danger); margin-top:20px; color:white" onclick="cerrarScanner()">Cerrar Cámara</button>
</div>

<div id="cartModal" class="modal">
    <div class="modal-content">
        <h2 style="margin-top:0">🛒 Lista de Compra</h2>
        <div id="cartList" style="margin-bottom:20px"></div>
        <button class="btn-action" style="background:var(--success); color:black; width:100%" onclick="exportarListaExcel()">Exportar a Excel (.xlsx)</button>
        <button class="btn-action" style="background:#334155; color:white; width:100%; margin-top:10px" onclick="cerrarModalCompra()">Cerrar</button>
    </div>
</div>

<script>
let paintCatalogData = {};
let myPaints = { stock: {}, buy: [] };
let modelos = [];
let html5QrCode = null;
let stockChart = null;

// --- INICIALIZACIÓN ---
async function init() {
    // Intentar recuperar modelos de cualquier llave posible
    const llaves = ['maikman_models_v5', 'maikman_models', 'modelos'];
    for (let llave of llaves) {
        const data = localStorage.getItem(llave);
        if (data) {
            try {
                const parsed = JSON.parse(data);
                if (Array.isArray(parsed) && parsed.length > 0) {
                    modelos = parsed;
                    localStorage.setItem('maikman_models_v5', JSON.stringify(modelos));
                    break;
                }
            } catch(e) {}
        }
    }
    renderModelos();

    // Cargar stock de pinturas
    const storedPaints = localStorage.getItem('maikman_paints_v5');
    if (storedPaints) {
        myPaints = JSON.parse(storedPaints);
        actualizarContadorCompra();
    }

    // Cargar catálogo JSON
    try {
        const res = await fetch('pinturas.json');
        if (res.ok) {
            paintCatalogData = await res.json();
            renderPaints();
            actualizarGrafico();
        }
    } catch(e) { console.warn("pinturas.json no disponible."); }
}

// --- FUNCIONES MAQUETAS ---
function renderModelos() {
    const grid = document.getElementById('modelsGrid');
    grid.innerHTML = '';
    modelos.forEach(m => {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `
            <div style="color:var(--accent); font-size:0.8em; font-weight:800">${m.fabricante || 'S/F'}</div>
            <div style="font-size:1.1em; margin:5px 0; font-weight:bold">${m.modelo}</div>
            <div style="color:#888; font-size:0.85em; margin-bottom:10px">${m.codigo || ''}</div>
            <div style="display:flex; justify-content:space-between; align-items:center">
                <span style="color:var(--success); font-weight:bold">${m.precio || 0}€</span>
                <button onclick="deleteModel(${m.id})" style="background:none; border:none; color:var(--danger); cursor:pointer; font-weight:bold">Eliminar</button>
            </div>`;
        grid.appendChild(div);
    });
}

window.addModelo = () => {
    const mod = document.getElementById('mMod').value;
    if (!mod) return alert("Nombre obligatorio");
    modelos.push({ 
        id: Date.now(), 
        fabricante: document.getElementById('mFab').value, 
        modelo: mod, 
        codigo: document.getElementById('mCod').value, 
        precio: document.getElementById('mPre').value 
    });
    localStorage.setItem('maikman_models_v5', JSON.stringify(modelos));
    renderModelos();
    document.querySelectorAll('#modelsView input').forEach(i => i.value = '');
};

window.deleteModel = (id) => {
    if (!confirm("¿Borrar maqueta?")) return;
    modelos = modelos.filter(m => m.id !== id);
    localStorage.setItem('maikman_models_v5', JSON.stringify(modelos));
    renderModelos();
};

window.exportarModelos = () => {
    const blob = new Blob([JSON.stringify(modelos)], {type: "application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = "backup_maquetas.json"; a.click();
};

window.importarModelos = (event) => {
    const reader = new FileReader();
    reader.onload = (e) => {
        try {
            const data = JSON.parse(e.target.result);
            if (Array.isArray(data)) {
                modelos = data;
                localStorage.setItem('maikman_models_v5', JSON.stringify(modelos));
                renderModelos();
                alert("Importado con éxito");
            }
        } catch(err) { alert("Archivo no válido"); }
    };
    reader.readAsText(event.target.files[0]);
};

// --- PINTURAS ---
function renderPaints() {
    const container = document.getElementById('paintsContainer');
    const query = document.getElementById('paintSearch').value.toLowerCase();
    const filter = document.getElementById('filterStock').value;
    container.innerHTML = '';

    for (const marca in paintCatalogData) {
        const filtradas = paintCatalogData[marca].filter(p => {
            const matches = p.id.toLowerCase().includes(query) || p.nombre.toLowerCase().includes(query);
            const stock = myPaints.stock[p.id] || 0;
            if (filter === 'owned') return matches && stock > 0;
            if (filter === 'missing') return matches && stock === 0;
            return matches;
        });

        if (filtradas.length > 0) {
            const section = document.createElement('div');
            section.innerHTML = `<h3 style="color:var(--accent); border-bottom:1px solid #334155; margin-top:20px">${marca}</h3>`;
            const grid = document.createElement('div');
            grid.className = 'grid';
            filtradas.forEach(p => {
                const qty = myPaints.stock[p.id] || 0;
                const inBuy = myPaints.buy.includes(p.id);
                grid.innerHTML += `
                    <div class="card paint-card">
                        <div class="color-swatch" style="background:${p.hex}"></div>
                        <div style="flex-grow:1">
                            <div style="font-weight:bold; font-size:0.9em">${p.id}</div>
                            <div style="font-size:0.75em; color:#aaa">${p.nombre}</div>
                            <div style="display:flex; align-items:center; gap:8px; margin-top:5px">
                                <button class="btn-qty" onclick="changeQty('${p.id}', -1)">-</button>
                                <span>${qty}</span>
                                <button class="btn-qty" onclick="changeQty('${p.id}', 1)">+</button>
                                <button onclick="toggleBuy('${p.id}')" style="background:none; border:1px solid #444; color:${inBuy?'#f39c12':'white'}; border-radius:4px; margin-left:5px">🛒</button>
                            </div>
                        </div>
                    </div>`;
            });
            section.appendChild(grid);
            container.appendChild(section);
        }
    }
}

window.changeQty = (id, delta) => {
    myPaints.stock[id] = Math.max(0, (myPaints.stock[id] || 0) + delta);
    savePaints(); renderPaints(); actualizarGrafico();
};

window.toggleBuy = (id) => {
    const idx = myPaints.buy.indexOf(id);
    if (idx > -1) myPaints.buy.splice(idx, 1);
    else myPaints.buy.push(id);
    savePaints(); renderPaints(); actualizarContadorCompra();
};

// --- COMPRA ---
window.abrirCompra = () => {
    const list = document.getElementById('cartList');
    list.innerHTML = '';
    myPaints.buy.forEach(id => {
        let pInfo = null;
        for (const m in paintCatalogData) {
            const found = paintCatalogData[m].find(x => x.id === id);
            if (found) { pInfo = found; break; }
        }
        list.innerHTML += `
            <div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #334155">
                <span><b>${id}</b> ${pInfo ? pInfo.nombre : ''}</span>
                <button onclick="toggleBuy('${id}'); abrirCompra()" style="background:none; border:none; color:var(--danger)">✖</button>
            </div>`;
    });
    document.getElementById('cartModal').style.display = 'flex';
};

window.cerrarModalCompra = () => { document.getElementById('cartModal').style.display = 'none'; };

window.exportarListaExcel = () => {
    const data = myPaints.buy.map(id => {
        let info = null;
        for (const m in paintCatalogData) {
            const found = paintCatalogData[m].find(x => x.id === id);
            if (found) { info = found; break; }
        }
        return { CODIGO: id, NOMBRE: info ? info.nombre : '', MARCA: info ? info.marca : '' };
    });
    const ws = XLSX.utils.json_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Compra");
    XLSX.writeFile(wb, "Lista_Compra_Maikman.xlsx");
};

// --- SCANNER ---
window.abrirScanner = () => {
    document.getElementById('scannerModal').style.display = 'flex';
    html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
        alert("Detectado: " + txt);
        cerrarScanner();
    }).catch(err => {
        alert("Error cámara: " + err);
        cerrarScanner();
    });
};

window.cerrarScanner = () => {
    if (html5QrCode && html5QrCode.isScanning) {
        html5QrCode.stop().finally(() => { document.getElementById('scannerModal').style.display = 'none'; });
    } else {
        document.getElementById('scannerModal').style.display = 'none';
    }
};

// --- UTILIDADES ---
function savePaints() { localStorage.setItem('maikman_paints_v5', JSON.stringify(myPaints)); }
function actualizarContadorCompra() { document.getElementById('buyBtnNav').innerText = `🛒 Compra (${myPaints.buy.length})`; }
window.showTab = (tab, event) => {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tab + 'View').classList.add('active');
    if (event) event.currentTarget.classList.add('active');
};

function actualizarGrafico() {
    const ctx = document.getElementById('stockChart').getContext('2d');
    const labels = Object.keys(paintCatalogData);
    const data = labels.map(m => paintCatalogData[m].filter(p => (myPaints.stock[p.id] || 0) > 0).length);
    if (stockChart) stockChart.destroy();
    stockChart = new Chart(ctx, {
        type: 'bar',
        data: { labels, datasets: [{ label: 'Stock', data, backgroundColor: '#38bdf8' }] },
        options: { scales: { y: { beginAtZero: true } } }
    });
}

init();
</script>
</body>
</html>
