<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maikman-Models - Pro Stock v5.2.2</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
:root {
    --bg:#0f172a; --card:#020617; --text:#e5e7eb; --accent:#38bdf8; --success:#00b894; --danger:#d63031;
    --min-card-width: 260px;
}
body.light { --bg:#f1f5f9; --card:#fff; --text:#020617; --accent:#2563eb; }
* { box-sizing:border-box; transition:.3s; }
body { margin:0; font-family:system-ui; background:var(--bg); color:var(--text); padding-bottom: 20px; }

/* Navegación - ORDEN ORIGINAL */
.nav-tabs {
    display: flex;
    align-items: center;
    background: var(--card);
    padding: 8px;
    gap: 4px;
    position: sticky;
    top: 0;
    z-index: 900;
    border-bottom: 1px solid #334155;
    overflow-x: auto;
}
.tab-btn {
    background:none;
    border:none;
    color:var(--text);
    padding: 10px 16px;
    cursor:pointer;
    font-weight:600;
    white-space:nowrap;
    border-radius: 6px;
}
.tab-btn.active { background:var(--accent); color:#000; }

.container { padding: 16px; max-width: 1200px; margin: auto; }
.view { display:none; }
.view.active { display:block; }

/* Grid y Tarjetas */
.paint-grid {
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(var(--min-card-width), 1fr));
    gap: 12px;
    margin-top:10px;
}
.paint-card, .model-card {
    background:var(--card);
    padding: 12px;
    border-radius: 12px;
    border: 1px solid #334155;
}
.color-swatch { width: 45px; height: 45px; border-radius: 8px; flex-shrink: 0; }
.stock-ctrl { display:flex; align-items:center; gap:8px; margin-top:5px; }
.btn-qty { width:28px; height:28px; border-radius:50%; border:none; background:#334155; color:white; cursor:pointer; }

/* Scanner Modal */
#scannerModal {
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.9);
    z-index:2000;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}
#reader {
    width: 90%;
    max-width: 350px;
    border-radius:12px;
    overflow:hidden;
    background: #000;
}
</style>
</head>
<body>

<div class="nav-tabs">
    <button class="tab-btn active" onclick="showTab('paints', event)">🎨 Pinturas</button>
    <button class="tab-btn" onclick="showTab('models', event)">📦 Maquetas</button>
    <button class="tab-btn" onclick="showTab('stats', event)">📊 Stats</button>
    <button class="tab-btn" onclick="abrirScanner()">📷 Scan</button>
    <button class="tab-btn" onclick="abrirCompra()" id="buyTab">🛒 Compra (0)</button>
    <div style="flex-grow:1"></div>
    <button class="tab-btn" onclick="document.body.classList.toggle('light')">🌓</button>
</div>

<div class="container">
    <div id="paintsView" class="view active">
        <div class="controls" style="display:flex; gap:10px; margin-bottom:15px">
            <input type="text" id="paintSearch" class="tab-btn" style="flex-grow:1; background:var(--card); border:1px solid #334155; text-align:left" placeholder="Buscar pintura..." oninput="renderPaints()">
            <select id="filterStock" class="tab-btn" style="background:var(--card); border:1px solid #334155" onchange="renderPaints()">
                <option value="all">Todas</option>
                <option value="owned">En Stock</option>
                <option value="missing">Sin Stock</option>
            </select>
        </div>
        <div id="paintsContainer"></div>
    </div>

    <div id="modelsView" class="view">
        <div style="background:var(--card); padding:15px; border-radius:12px; margin-bottom:20px; border:1px solid var(--accent); display:grid; gap:10px">
            <input type="text" id="mFab" placeholder="Fabricante" style="padding:10px; border-radius:6px; background:#0f172a; color:white; border:1px solid #334155">
            <input type="text" id="mMod" placeholder="Modelo" style="padding:10px; border-radius:6px; background:#0f172a; color:white; border:1px solid #334155">
            <input type="text" id="mCod" placeholder="Referencia" style="padding:10px; border-radius:6px; background:#0f172a; color:white; border:1px solid #334155">
            <input type="number" id="mPre" placeholder="Precio" style="padding:10px; border-radius:6px; background:#0f172a; color:white; border:1px solid #334155">
            <button class="tab-btn" style="background:var(--success); color:black" onclick="addModelo()">Añadir Maqueta</button>
        </div>
        <div class="paint-grid" id="modelsGrid"></div>
    </div>

    <div id="statsView" class="view">
        <canvas id="stockChart"></canvas>
    </div>
</div>

<div id="scannerModal">
    <div id="reader"></div>
    <button class="tab-btn" style="margin-top:20px; background:var(--danger)" onclick="cerrarScanner()">Cancelar</button>
</div>

<script>
let paintCatalogData = {};
let myPaints = { stock: {}, buy: [] };
let modelos = [];
let html5QrCode = null;
let stockChart = null;

async function init() {
    // 1. CARGA FORZADA DE MODELOS (Independiente del JSON)
    const storedModels = localStorage.getItem('maikman_models_v5');
    if (storedModels) {
        try { modelos = JSON.parse(storedModels); renderModelos(); } catch(e) { console.error(e); }
    }

    const storedPaints = localStorage.getItem('maikman_paints_v5');
    if (storedPaints) {
        try { myPaints = JSON.parse(storedPaints); } catch(e) { console.error(e); }
    }

    // 2. CARGA DE PINTURAS
    try {
        const response = await fetch('pinturas.json');
        if (response.ok) {
            paintCatalogData = await response.json();
            renderPaints();
            actualizarGrafico();
        }
    } catch(e) { 
        alert("Aviso: pinturas.json no cargó, pero tus modelos están a salvo.");
    }
}

function renderModelos() {
    const grid = document.getElementById('modelsGrid');
    if (!grid) return;
    grid.innerHTML = '';
    modelos.forEach(m => {
        grid.innerHTML += `
            <div class="model-card">
                <div style="color:var(--accent); font-size:0.8em">${m.fabricante}</div>
                <div style="font-weight:bold">${m.modelo}</div>
                <div>${m.precio}€</div>
                <button onclick="deleteModel(${m.id})" style="color:var(--danger); background:none; border:none; margin-top:10px; cursor:pointer">Eliminar</button>
            </div>`;
    });
}

window.addModelo = () => {
    const m = { id: Date.now(), fabricante: document.getElementById('mFab').value, modelo: document.getElementById('mMod').value, codigo: document.getElementById('mCod').value, precio: document.getElementById('mPre').value };
    if(!m.modelo) return;
    modelos.push(m);
    localStorage.setItem('maikman_models_v5', JSON.stringify(modelos));
    renderModelos();
    document.querySelectorAll('#modelsView input').forEach(i => i.value = '');
};

window.deleteModel = (id) => {
    modelos = modelos.filter(m => m.id !== id);
    localStorage.setItem('maikman_models_v5', JSON.stringify(modelos));
    renderModelos();
};

function showTab(tab, event) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tab + 'View').classList.add('active');
    if(event) event.currentTarget.classList.add('active');
}

// SCANNER CORREGIDO PARA MÓVIL
window.abrirScanner = () => {
    const modal = document.getElementById('scannerModal');
    modal.style.display = 'flex';
    
    if (!html5QrCode) {
        html5QrCode = new Html5Qrcode("reader");
    }

    const config = { fps: 10, qrbox: { width: 250, height: 250 } };

    html5QrCode.start({ facingMode: "environment" }, config, (text) => {
        // Lógica de búsqueda...
        alert("Escaneado: " + text);
        cerrarScanner();
    }).catch(err => {
        console.error(err);
        alert("Error: No se pudo acceder a la cámara. Asegúrate de dar permisos.");
        modal.style.display = 'none';
    });
};

window.cerrarScanner = () => {
    if (html5QrCode && html5QrCode.isScanning) {
        html5QrCode.stop().then(() => {
            document.getElementById('scannerModal').style.display = 'none';
        });
    } else {
        document.getElementById('scannerModal').style.display = 'none';
    }
};

function renderPaints() {
    // ... (Tu lógica original de renderizado de pinturas)
}

function actualizarGrafico() {
    // ... (Tu lógica original de Chart.js)
}

init();
</script>
</body>
</html>
