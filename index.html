<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maikman Models - Pro Stock v6.6.0</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
:root {
    --bg:#0f172a; --card:#020617; --text:#e5e7eb; --accent:#38bdf8; --success:#00b894; --danger:#d63031;
    --min-card-width: 260px;
}
body.light { --bg:#f1f5f9; --card:#fff; --text:#020617; --accent:#2563eb; }
* { box-sizing:border-box; transition:.3s; }
body { margin:0; font-family:system-ui; background:var(--bg); color:var(--text); padding-bottom: 20px; }

.nav-tabs { display: flex; align-items: center; background: var(--card); padding: 8px; gap: 4px; position: sticky; top: 0; z-index: 900; border-bottom: 1px solid #334155; }
.tab-btn { flex: 1; padding: 12px 2px; border: none; background: rgba(255,255,255,0.05); color: var(--text); cursor: pointer; border-radius: 8px; font-weight: bold; font-size: 11px; }
.tab-btn.active { background: var(--accent); color: white; }
.cart-badge { background: var(--danger); color: white; font-size: 10px; padding: 2px 5px; border-radius: 10px; margin-left: 3px; }

#app { display:none; }
.content-section { display: none; padding: 20px; }
.content-section.active { display: block; }

#grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(var(--min-card-width),1fr)); gap:16px; }
.card { background:var(--card); border-radius:12px; padding:12px; border: 1px solid #334155; display: flex; flex-direction: column; }
.card img { width:100%; height:180px; object-fit:cover; border-radius:8px; margin-bottom: 10px; cursor: pointer; }
.card-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: auto; }
.btn-action { padding: 8px; font-size: 11px; border-radius: 4px; border: none; cursor: pointer; color: white; font-weight: bold; text-align: center; }

.paint-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }
.paint-item { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 8px; display: flex; align-items: center; gap: 12px; border: 1px solid #334155; }
.color-swatch { width: 25px; height: 25px; border-radius: 5px; border: 1px solid #444; flex-shrink: 0; }
.btn-mini { border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; color: white; background: #334155; }
.btn-mini.active-have { background: var(--success) !important; }
.btn-mini.active-buy { background: var(--danger) !important; }

.modal { position:fixed; inset:0; background:rgba(0,0,0,.9); display:none; align-items:center; justify-content:center; z-index:1000; padding:20px; }
.modal-content { background:var(--card); padding:24px; width:100%; max-width:500px; border-radius:12px; display:flex; flex-direction:column; gap:12px; max-height:90vh; overflow-y:auto; }
input, select { padding:10px; border-radius:6px; border: 1px solid #334155; background: #1e293b; color: white; width: 100%; }

#finderCanvas { max-width: 100%; height: auto; border-radius: 8px; cursor: crosshair; border: 2px solid #334155; }
.match-card { background: rgba(255,255,255,0.05); padding: 8px; border-radius: 6px; display: flex; align-items: center; gap: 10px; font-size: 12px; margin-bottom: 5px; }

/* Mixer Styles */
.mixer-card { background:rgba(255,255,255,0.03); padding:10px; border-radius:8px; border:1px solid #334155; }
.drops-info { color: var(--accent); font-weight: bold; font-size: 13px; }
</style>
</head>
<body class="dark">

<div id="login" style="max-width:320px; margin:80px auto; padding:20px; text-align:center;">
    <h2 style="color:var(--accent)">Maikman Stock</h2>
    <input id="email" type="email" placeholder="Email" style="margin-bottom:10px">
    <input id="password" type="password" placeholder="Contraseña">
    <button onclick="login()" style="width:100%; margin-top:20px; padding:12px; background:var(--accent); color:white; border:none; border-radius:6px;">Entrar</button>
</div>

<div id="app">
    <nav class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('tab-maquetas')">📦 MODELOS</button>
        <button class="tab-btn" onclick="switchTab('tab-pinturas')">🎨 PINTURAS</button>
        <button class="tab-btn" onclick="switchTab('tab-mixer')">🧪 MIXER / FINDER</button>
        <button class="tab-btn" onclick="window.abrirModalCompra(true)">🛒 <span id="cartCount" class="cart-badge">0</span></button>
        <button class="tab-btn" style="flex:0.3" onclick="window.openConfigModal(true)">⚙️</button>
    </nav>

    <section id="tab-maquetas" class="content-section active">
        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <input id="search" placeholder="Buscar maqueta..." oninput="renderMaquetas()">
            <button onclick="openFormModal()" style="background:var(--accent); color:white; border:none; padding:0 15px; border-radius:6px;">➕</button>
        </div>
        <div id="grid"></div>
    </section>

    <section id="tab-pinturas" class="content-section">
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <select id="brandFilter" onchange="renderPaintCatalog()" style="flex:1"></select>
            <button onclick="abrirScanner()" style="background:#8e44ad; color:white; border:none; padding:10px; border-radius:6px;">📷 SCAN</button>
        </div>
        <input id="paintSearch" placeholder="Nombre o código..." onkeyup="renderPaintCatalog()" style="margin-bottom:15px">
        <div id="paintCatalog" class="paint-grid"></div>
    </section>

    <section id="tab-mixer" class="content-section">
        <div style="background:rgba(255,255,255,0.03); padding:15px; border-radius:12px; margin-bottom:20px; border:1px solid #334155;">
            <h4 style="margin:0 0 10px 0; color:var(--accent)">🔍 Color Finder</h4>
            <input type="file" id="finderInput" accept="image/*" style="margin-bottom:10px; font-size:12px;">
            <div style="position:relative; text-align:center;">
                <canvas id="finderCanvas"></canvas>
            </div>
            <div id="finderResults" style="margin-top:15px; display:none;">
                <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
                    <div id="pickedColorBox" style="width:40px; height:40px; border-radius:8px; border:2px solid white;"></div>
                    <div>
                        <b id="pickedHex">#------</b><br>
                        <small>Color seleccionado</small>
                    </div>
                </div>
                <div id="bestMatches"></div>
            </div>
        </div>

        <h4 style="margin:0 0 10px 0; color:var(--accent)">🧪 Mezclador Proporcional (Base 10)</h4>
        <div id="mixerCardsContainer" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(180px,1fr)); gap:10px; margin-bottom:20px;"></div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; background:rgba(255,255,255,0.03); padding:15px; border-radius:12px;">
            <div id="mixerResultPreview" style="height:100px; border-radius:12px; display:flex; flex-direction:column; align-items:center; justify-content:center; border:1px solid #444;">
                <span id="hexResult" style="font-weight:bold; text-shadow: 0 0 5px black;">#---</span>
                <small id="totalDropsLabel" style="font-size:10px; margin-top:5px; text-shadow: 0 0 5px black;">Total: 10 gotas</small>
            </div>
            <canvas id="mixerChart" style="max-height: 100px;"></canvas>
        </div>
        <button onclick="resetMixer()" style="width:100%; margin-top:20px; padding:10px; background:var(--danger); border:none; color:white; border-radius:8px;">Reiniciar Mezclador</button>
    </section>
</div>

<div id="formModal" class="modal"><div class="modal-content"><h3>Modelo</h3><input type="hidden" id="form_id"><input id="form_codigo" placeholder="Referencia"><input id="form_fabricante" placeholder="Fabricante"><input id="form_modelo" placeholder="Modelo"><input id="form_precio" type="number" step="0.01" placeholder="Precio (€)"><input id="form_foto_url" placeholder="URL Foto Portada"><button onclick="guardarModelo()" style="background:var(--success); color:white; padding:12px; border:none; border-radius:6px;">Guardar</button><button onclick="closeFormModal()" style="background:#555; color:white; padding:10px; border:none; border-radius:6px;">Cancelar</button></div></div>

<div id="infoModal" class="modal"><div class="modal-content"><h3 id="infoTitle"></h3><div id="infoDetails"></div><hr style="border:0; border-top:1px solid #444;"><b>Galería</b><div id="galleryGrid" style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:10px 0;"></div><div style="display:flex; gap:5px;"><input type="text" id="urlPhotoInput" placeholder="URL .jpg"><button onclick="añadirUrlAGaleria()" style="background:var(--success); color:white; border:none; padding:10px; border-radius:6px;">Añadir</button></div><button onclick="document.getElementById('infoModal').style.display='none'" style="margin-top:10px;">Cerrar</button></div></div>

<div id="modelPaintsModal" class="modal"><div class="modal-content"><h3 id="modelPaintsTitle">Colores</h3><div id="modelPaintsList" class="paint-grid" style="grid-template-columns: 1fr;"></div><button onclick="document.getElementById('modelPaintsModal').style.display='none'" style="padding:12px; background:var(--accent); color:white; border:none; border-radius:6px;">Cerrar</button></div></div>

<div id="cartModal" class="modal"><div class="modal-content"><h3>Lista de Compra</h3><div id="cartListContainer" style="max-height: 300px; overflow-y: auto;"></div><button onclick="exportarListaExcel()" style="background:var(--success); color:white; padding:12px; border:none; border-radius:6px; margin-top:10px;">📥 Exportar Excel</button><button onclick="window.abrirModalCompra(false)" style="padding:10px; margin-top:5px;">Cerrar</button></div></div>

<div id="configModal" class="modal"><div class="modal-content"><h3>Opciones</h3><button onclick="document.body.classList.toggle('light')">🌓 Cambiar Tema</button><button onclick="exportarExcelPrincipal()">📊 Exportar Stock Completo</button><button onclick="signOutUser()" style="background:var(--danger); color:white; padding:10px; border:none; border-radius:6px; margin-top:10px;">Cerrar Sesión</button><button onclick="window.openConfigModal(false)" style="margin-top:10px;">Volver</button></div></div>

<div id="scannerModal" class="modal"><div class="modal-content"><h3>Lector</h3><div id="reader"></div><button onclick="cerrarScanner()" style="padding:10px; margin-top:10px;">Cerrar</button></div></div>

<div id="zoomModal" class="modal" onclick="this.style.display='none'"><img id="zoomImg" style="max-width:95%; max-height:85vh; border-radius:8px;"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAtWLxQfVqsEt8fLZkGRN-3zSHuzKMUTk8",
  authDomain: "maikmanmodelsstock.firebaseapp.com",
  projectId: "maikmanmodelsstock",
  storageBucket: "maikmanmodelsstock.appspot.com",
  messagingSenderId: "871520809912",
  appId: "1:871520809912:web:4042f15ef200832a95d54d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let modelos = [];
let paintCatalogData = {};
let currentModelId = null;
let myPaints = JSON.parse(localStorage.getItem('maikman_paints')) || { have: [], buy: [] };
let mixerChart = null;
let html5QrCode = null;

// --- AUTH & NAV ---
window.login = () => {
    const e = document.getElementById('email').value;
    const p = document.getElementById('password').value;
    signInWithEmailAndPassword(auth, e, p).catch(() => alert("Error de acceso"));
};
window.signOutUser = () => signOut(auth);
window.switchTab = (id) => {
    document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
};
window.openConfigModal = (show = true) => document.getElementById('configModal').style.display = show ? 'flex' : 'none';
window.openFormModal = () => { document.getElementById('form_id').value = ""; document.getElementById('formModal').style.display = 'flex'; };
window.closeFormModal = () => document.getElementById('formModal').style.display = 'none';

// --- MODELOS ---
async function cargarModelos() {
    const snap = await getDocs(query(collection(db, "modelos"), orderBy("fabricante")));
    modelos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderMaquetas();
}

window.renderMaquetas = () => {
    const grid = document.getElementById("grid");
    const q = document.getElementById("search").value.toLowerCase();
    grid.innerHTML = "";
    modelos.filter(m => (m.modelo||"").toLowerCase().includes(q) || (m.fabricante||"").toLowerCase().includes(q)).forEach(m => {
        grid.innerHTML += `
            <div class="card">
                <img src="${m.foto || 'https://via.placeholder.com/300x180'}" onclick="verZoom('${m.foto}')">
                <div style="font-weight:bold">${m.modelo}</div>
                <div style="font-size:12px; opacity:0.7">${m.fabricante}</div>
                <div class="card-btns">
                    <button class="btn-action" style="background:#3498db" onclick="abrirInfoModelo('${m.id}')">INFO</button>
                    <button class="btn-action" style="background:#9b59b6" onclick="abrirPinturasModelo('${m.id}')">COLOR</button>
                    <button class="btn-action" style="background:#f39c12" onclick="editarModelo('${m.id}')">EDIT</button>
                    <button class="btn-action" style="background:var(--danger)" onclick="borrarModelo('${m.id}')">DEL</button>
                </div>
            </div>`;
    });
};

window.abrirInfoModelo = (id) => {
    currentModelId = id;
    const m = modelos.find(x => x.id === id);
    document.getElementById("infoTitle").innerText = m.modelo;
    document.getElementById("infoDetails").innerHTML = `<b>Marca:</b> ${m.fabricante} | <b>Precio:</b> ${m.precio||'--'}€`;
    const gal = document.getElementById("galleryGrid"); gal.innerHTML = "";
    (m.galeria || []).forEach((url, idx) => {
        gal.innerHTML += `<div style="position:relative;"><img src="${url}" style="width:100%; border-radius:4px" onclick="verZoom('${url}')"><button onclick="borrarFotoGaleria(${idx})" style="position:absolute; top:2px; right:2px; background:red; color:white; border:none; border-radius:3px; padding:2px 5px; cursor:pointer;">X</button></div>`;
    });
    document.getElementById("infoModal").style.display = "flex";
};

window.verZoom = (url) => { if(url && !url.includes('placeholder')) { document.getElementById("zoomImg").src = url; document.getElementById("zoomModal").style.display = "flex"; } };

window.añadirUrlAGaleria = async () => {
    const url = document.getElementById("urlPhotoInput").value.trim();
    if(!url) return;
    const m = modelos.find(x => x.id === currentModelId);
    if(!m.galeria) m.galeria = [];
    m.galeria.push(url);
    await updateDoc(doc(db, "modelos", currentModelId), { galeria: m.galeria });
    document.getElementById("urlPhotoInput").value = "";
    abrirInfoModelo(currentModelId);
};

window.borrarFotoGaleria = async (idx) => {
    const m = modelos.find(x => x.id === currentModelId);
    m.galeria.splice(idx, 1);
    await updateDoc(doc(db, "modelos", currentModelId), { galeria: m.galeria });
    abrirInfoModelo(currentModelId);
};

window.abrirPinturasModelo = (id) => {
    const m = modelos.find(x => x.id === id);
    const list = document.getElementById('modelPaintsList');
    document.getElementById('modelPaintsTitle').innerText = "Colores: " + m.modelo;
    list.innerHTML = "";
    if(m.paints) {
        m.paints.forEach(pCode => {
            let info = encontrarPintura(pCode);
            list.innerHTML += crearHTMLPintura(info);
        });
    } else { list.innerHTML = "<p style='text-align:center; opacity:0.5'>Sin pinturas asignadas.</p>"; }
    document.getElementById('modelPaintsModal').style.display = 'flex';
};

window.editarModelo = (id) => {
    const m = modelos.find(x => x.id === id);
    document.getElementById('form_id').value = m.id;
    document.getElementById('form_codigo').value = m.codigo || "";
    document.getElementById('form_fabricante').value = m.fabricante || "";
    document.getElementById('form_modelo').value = m.modelo || "";
    document.getElementById('form_precio').value = m.precio || "";
    document.getElementById('form_foto_url').value = m.foto || "";
    document.getElementById('formModal').style.display = 'flex';
};

window.guardarModelo = async () => {
    const id = document.getElementById('form_id').value;
    const d = {
        codigo: document.getElementById('form_codigo').value || "",
        fabricante: document.getElementById('form_fabricante').value || "",
        modelo: document.getElementById('form_modelo').value || "",
        precio: document.getElementById('form_precio').value || "",
        foto: document.getElementById('form_foto_url').value || ""
    };
    if(id) await updateDoc(doc(db, "modelos", id), d);
    else await addDoc(collection(db, "modelos"), d);
    document.getElementById('formModal').style.display='none'; cargarModelos();
};

window.borrarModelo = async (id) => { if(confirm("¿Borrar?")) { await deleteDoc(doc(db, "modelos", id)); cargarModelos(); } };

// --- PINTURAS ---
async function cargarCatalogoPinturas() {
    const resp = await fetch('pinturas.json');
    paintCatalogData = await resp.json();
    const f = document.getElementById('brandFilter');
    f.innerHTML = "";
    Object.keys(paintCatalogData).forEach(b => f.innerHTML += `<option value="${b}">${b}</option>`);
    renderPaintCatalog();
    initMixerUI();
    initColorFinder();
}

function crearHTMLPintura(p) {
    const isHave = myPaints.have.includes(p.id);
    const isBuy = myPaints.buy.includes(p.id);
    return `<div class="paint-item"><div class="color-swatch" style="background:${p.hex}"></div><div style="flex:1"><b>${p.id}</b><br><small>${p.nombre}</small></div><button class="btn-mini ${isHave?'active-have':''}" onclick="togglePaint('${p.id}', 'have')">✅</button><button class="btn-mini ${isBuy?'active-buy':''}" onclick="togglePaint('${p.id}', 'buy')">🛒</button></div>`;
}

window.renderPaintCatalog = () => {
    const brand = document.getElementById('brandFilter').value;
    const q = document.getElementById('paintSearch').value.toLowerCase();
    const container = document.getElementById('paintCatalog');
    container.innerHTML = "";
    if(paintCatalogData[brand]) {
        paintCatalogData[brand].filter(p => p.nombre.toLowerCase().includes(q) || p.id.toLowerCase().includes(q)).forEach(p => {
            container.innerHTML += crearHTMLPintura(p);
        });
    }
};

window.togglePaint = (id, type) => {
    const idx = myPaints[type].indexOf(id);
    if(idx > -1) myPaints[type].splice(idx, 1); else myPaints[type].push(id);
    localStorage.setItem('maikman_paints', JSON.stringify(myPaints));
    renderPaintCatalog(); updateCartCount();
};

window.updateCartCount = () => document.getElementById('cartCount').innerText = myPaints.buy.length;

// --- COLOR FINDER ---
function initColorFinder() {
    const input = document.getElementById('finderInput');
    const canvas = document.getElementById('finderCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    input.addEventListener('change', (e) => {
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                const maxW = 400; const scale = maxW / img.width;
                canvas.width = maxW; canvas.height = img.height * scale;
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                document.getElementById('finderResults').style.display = 'block';
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    });
    canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left; const y = e.clientY - rect.top;
        const pixel = ctx.getImageData(x, y, 1, 1).data;
        const hex = rgbToHex(pixel[0], pixel[1], pixel[2]);
        document.getElementById('pickedColorBox').style.background = hex;
        document.getElementById('pickedHex').innerText = hex;
        findSimilarPaints(pixel[0], pixel[1], pixel[2]);
    });
}

function findSimilarPaints(r1, g1, b1) {
    let matches = [];
    for(let brand in paintCatalogData) {
        paintCatalogData[brand].forEach(p => {
            const rgb2 = hexToRgb(p.hex);
            const dist = Math.sqrt(Math.pow(r1 - rgb2.r, 2) + Math.pow(g1 - rgb2.g, 2) + Math.pow(b1 - rgb2.b, 2));
            matches.push({ ...p, brand, dist });
        });
    }
    matches.sort((a, b) => a.dist - b.dist);
    const top3 = matches.slice(0, 3);
    const container = document.getElementById('bestMatches');
    container.innerHTML = "<b>Pinturas sugeridas:</b><br>";
    top3.forEach(m => {
        container.innerHTML += `<div class="match-card"><div class="color-swatch" style="background:${m.hex}"></div><div style="flex:1"><b>${m.brand} - ${m.id}</b><br>${m.nombre} (${Math.round((1 - m.dist/441)*100)}% coincide)</div></div>`;
    });
}

// --- MIXER PROPORCIONAL (MEJORADO) ---
function initMixerUI() {
    const container = document.getElementById('mixerCardsContainer');
    container.innerHTML = "";
    let options = '<option value="">- Vacío -</option>';
    Object.keys(paintCatalogData).forEach(b => {
        options += `<optgroup label="${b}">`;
        paintCatalogData[b].forEach(p => options += `<option value="${p.hex}">${p.id} - ${p.nombre}</option>`);
        options += `</optgroup>`;
    });
    for(let i=1; i<=4; i++) {
        container.innerHTML += `
            <div class="mixer-card">
                <select id="mixColor${i}" onchange="calculateMix()">${options}</select>
                <input type="range" id="mixSlider${i}" min="0" max="100" value="0" oninput="handleMixSlider(${i})">
                <div style="display:flex; justify-content:space-between;">
                    <span id="mixLabel${i}" style="font-size:10px;">0%</span>
                    <span id="dropsLabel${i}" class="drops-info">0.0 gotas</span>
                </div>
            </div>`;
    }
    mixerChart = new Chart(document.getElementById('mixerChart').getContext('2d'), { 
        type: 'pie', 
        data: { labels: [], datasets: [{ data: [], backgroundColor: [] }] }, 
        options: { plugins: { legend: { display: false } }, animation: false } 
    });
}

window.handleMixSlider = (index) => {
    let values = [];
    let actives = [];
    for(let i=1; i<=4; i++) {
        let val = parseInt(document.getElementById(`mixSlider${i}`).value);
        values.push(val);
        if(document.getElementById(`mixColor${i}`).value !== "") actives.push(i-1);
    }

    if(actives.length <= 1) { 
        // Si solo hay uno activo, forzar al 100% si se mueve algo
        if(actives.length === 1) document.getElementById(`mixSlider${actives[0]+1}`).value = 100;
        calculateMix(); return; 
    }

    let changedIdx = index - 1;
    let newVal = values[changedIdx];
    let otherActives = actives.filter(idx => idx !== changedIdx);
    
    let currentOthersSum = 0;
    otherActives.forEach(idx => currentOthersSum += values[idx]);

    let remaining = 100 - newVal;
    
    if(currentOthersSum === 0) {
        // Si los otros estaban en 0, repartir equitativamente lo que sobra
        otherActives.forEach(idx => {
            document.getElementById(`mixSlider${idx+1}`).value = remaining / otherActives.length;
        });
    } else {
        // Repartir proporcionalmente lo que sobra
        otherActives.forEach(idx => {
            let share = (values[idx] / currentOthersSum) * remaining;
            document.getElementById(`mixSlider${idx+1}`).value = share;
        });
    }
    calculateMix();
};

window.calculateMix = () => {
    let r=0, g=0, b=0, total=0; 
    const lbs=[], dts=[], cls=[], drops=[];
    
    for(let i=1; i<=4; i++) {
        const hex = document.getElementById(`mixColor${i}`).value;
        const p = parseFloat(document.getElementById(`mixSlider${i}`).value);
        
        // Actualizar etiquetas visuales
        document.getElementById(`mixLabel${i}`).innerText = Math.round(p) + "%";
        document.getElementById(`dropsLabel${i}`).innerText = (p/10).toFixed(1) + " gotas";

        if(hex && p > 0) {
            const rgb = hexToRgb(hex); r += rgb.r*p; g += rgb.g*p; b += rgb.b*p; total += p;
            lbs.push(document.getElementById(`mixColor${i}`).selectedOptions[0].text + " (" + (p/10).toFixed(1) + " g.)"); 
            dts.push(p); 
            cls.push(hex);
        }
    }
    if(total > 0) {
        const fHex = rgbToHex(Math.round(r/total), Math.round(g/total), Math.round(b/total));
        document.getElementById('mixerResultPreview').style.backgroundColor = fHex;
        document.getElementById('hexResult').innerText = fHex;
        document.getElementById('hexResult').style.color = (r+g+b)/total > 380 ? 'black' : 'white';
    }
    mixerChart.data.labels = lbs; 
    mixerChart.data.datasets[0].data = dts; 
    mixerChart.data.datasets[0].backgroundColor = cls; 
    mixerChart.update();
};

window.resetMixer = () => { 
    for(let i=1; i<=4; i++) { 
        document.getElementById(`mixColor${i}`).value=""; 
        document.getElementById(`mixSlider${i}`).value=0; 
    } 
    calculateMix(); 
};

// --- UTILS ---
function encontrarPintura(id) { for(let b in paintCatalogData) { let p = paintCatalogData[b].find(x => x.id === id); if(p) return p; } return { nombre: id, hex: "#333", id: id }; }
function hexToRgb(h) { return { r: parseInt(h.slice(1,3),16), g: parseInt(h.slice(3,5),16), b: parseInt(h.slice(5,7),16) }; }
function rgbToHex(r, g, b) { return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1).toUpperCase(); }
