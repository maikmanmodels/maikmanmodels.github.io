<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maikman Models - Pro Stock v7.7.0 (Base 6.8.4)</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
:root {
    --bg:#0f172a; --card:#020617; --text:#e5e7eb; --accent:#38bdf8; --success:#00b894; --danger:#d63031;
    --min-card-width: 260px;
}
body.light { --bg:#f1f5f9; --card:#fff; --text:#020617; --accent:#2563eb; }
* { box-sizing:border-box; transition:.3s; }
body { margin:0; font-family:system-ui; background:var(--bg); color:var(--text); padding-bottom: 20px; }

/* Navegación */
.nav-tabs { display: flex; align-items: center; background: var(--card); padding: 8px; gap: 4px; position: sticky; top: 0; z-index: 900; border-bottom: 1px solid #334155; }
.tab-btn { flex: 1; padding: 12px 5px; border: none; background: rgba(255,255,255,0.05); color: var(--text); cursor: pointer; border-radius: 8px; font-weight: bold; font-size: 11px; }
.tab-btn.active { background: var(--accent); color: white; }
.cart-badge { background: var(--danger); color: white; font-size: 10px; padding: 2px 5px; border-radius: 10px; margin-left: 3px; }

/* Secciones */
.content-section { display: none; padding: 15px; }
.content-section.active { display: block; }

/* Grid Modelos */
#grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(var(--min-card-width), 1fr)); gap: 16px; }
.card { background: var(--card); border-radius: 12px; padding: 12px; border: 1px solid #334155; display: flex; flex-direction: column; }
.card img { width: 100%; height: 180px; object-fit: cover; border-radius: 8px; cursor: pointer; margin-bottom: 10px; }
.card-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: auto; }
.btn-action { padding: 8px; font-size: 10px; border-radius: 4px; border: none; cursor: pointer; color: white; font-weight: bold; text-align: center; }

/* Pinturas */
.paint-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
.paint-item-box { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 10px; border: 1px solid #334155; text-align: center; }
.color-circle { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #fff; margin: 0 auto 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }

/* Picker e IA */
.match-card { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; margin-top: 10px; border-left: 4px solid var(--accent); }

/* Modales */
.modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
.modal-content { background: var(--card); padding: 20px; width: 100%; max-width: 500px; border-radius: 12px; max-height: 90vh; overflow-y: auto; border: 1px solid #334155; }
input, select { padding: 10px; border-radius: 6px; border: 1px solid #334155; background: #1e293b; color: white; width: 100%; margin-bottom: 10px; }

/* Galería en Info */
.gallery-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
.gallery-img { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; border: 1px solid #334155; }
</style>
</head>
<body class="dark">

<div id="login" style="max-width:320px; margin:100px auto; padding:20px; text-align:center;">
    <h2 style="color:var(--accent)">Maikman Models</h2>
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Contraseña">
    <button onclick="window.login()" style="width:100%; padding:12px; background:var(--accent); color:white; border:none; border-radius:6px; font-weight:bold;">ENTRAR</button>
</div>

<div id="app" style="display:none;">
    <nav class="nav-tabs">
        <button class="tab-btn active" onclick="window.switchTab('tab-maquetas', this)">📦 MODELOS</button>
        <button class="tab-btn" onclick="window.switchTab('tab-pinturas', this)">🎨 PINTURAS</button>
        <button class="tab-btn" onclick="window.switchTab('tab-mixer', this)">🧪 MIXER/PICK</button>
        <button class="tab-btn" onclick="window.abrirModalCompra(true)">🛒 <span id="cartCount" class="cart-badge">0</span></button>
        <button class="tab-btn" style="flex:0.3" onclick="window.toggleModal('configModal', true)">⚙️</button>
    </nav>

    <section id="tab-maquetas" class="content-section active">
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <input id="search" placeholder="Buscar por modelo o fabricante..." oninput="window.renderMaquetas()">
            <button onclick="window.startScanner('model')" style="background:#4b5563; border:none; padding:0 15px; border-radius:6px; color:white;">📷</button>
            <button onclick="window.openFormModal()" style="background:var(--accent); border:none; padding:0 15px; border-radius:6px; color:white;">➕</button>
        </div>
        <div id="grid"></div>
    </section>

    <section id="tab-pinturas" class="content-section">
        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <select id="brandFilter" onchange="window.renderPaintCatalog()" style="flex:1"></select>
            <button onclick="window.startScanner('paint')" style="background:#4b5563; border:none; padding:0 15px; border-radius:6px; color:white;">📷</button>
        </div>
        <input id="paintSearch" placeholder="Filtrar por nombre o código..." onkeyup="window.renderPaintCatalog()">
        <div id="paintCatalog" class="paint-grid"></div>

    <section id="tab-mixer" class="content-section">
        <div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:12px; margin-bottom:20px;">
            <h4 style="margin:0 0 10px 0; color:var(--accent)">🎯 Picker IA (Catálogo Completo)</h4>
            <input type="file" accept="image/*" onchange="window.loadPickerImage(event)">
            <canvas id="canvasPicker" style="display:none; cursor:crosshair; width:100%; border-radius:8px; margin-top:10px;"></canvas>
            <div id="pickerResults"></div>
        </div>
        <h4>🧪 Mezclador (Base 10 Gotas)</h4>
        <div id="mixerInputs" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;"></div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-top:15px; background:rgba(0,0,0,0.3); padding:15px; border-radius:10px;">
            <div id="mixerResultPreview" style="height:100px; border-radius:10px; border:1px solid #444; display:flex; align-items:center; justify-content:center; font-weight:bold;">#---</div>
            <canvas id="mixerChart" style="max-height:100px;"></canvas>
        </div>
    </section>
</div>

<div id="formModal" class="modal">
    <div class="modal-content">
        <h3 id="formTitle">Nueva Maqueta</h3>

        <button onclick="window.toggleModal('formModal', false)" style="width:100%; margin-top:10px; background:transparent; border:none; color:white;">Cancelar</button>

</div>

<div id="infoModal" class="modal">

        <h3 id="infoTitle"></h3>

        <p id="infoPrecio" style="font-weight:bold;"></p>

        <div style="margin-top:20px; border-top:1px solid #333; padding-top:10px;">
            <input id="urlPhotoInput" placeholder="URL nueva foto...">
            <button onclick="window.añadirUrlsAGaleria()" style="width:100%; background:var(--success); color:white; padding:10px; border:none; border-radius:6px;">Añadir Foto</button>

        <button onclick="window.toggleModal('infoModal', false)" style="width:100%; margin-top:20px; background:#444; color:white; border:none; padding:10px; border-radius:6px;">Cerrar</button>
    </div>
</div>

<div id="modelPaintsModal" class="modal"><div class="modal-content"><h3>Pinturas Necesarias</h3><div id="mPaintsList" class="paint-grid" style="grid-template-columns: 1fr;"></div><button onclick="window.toggleModal('modelPaintsModal', false)" style="width:100%; margin-top:20px; background:var(--accent); color:white; border:none; padding:10px; border-radius:6px;">Cerrar</button></div></div>
<div id="scanModal" class="modal"><div class="modal-content"><div id="reader"></div><button onclick="window.stopScanner()" style="width:100%; margin-top:10px; background:var(--danger); color:white; border:none; padding:10px; border-radius:6px;">Cerrar Cámara</button></div></div>
<div id="cartModal" class="modal"><div class="modal-content"><h3>Lista de Compra</h3><div id="cartListContainer"></div><button onclick="window.exportarListaExcel()" style="width:100%; background:var(--success); color:white; padding:12px; border:none; border-radius:6px; margin-top:10px;">Exportar Excel</button><button onclick="window.toggleModal('cartModal', false)" style="width:100%; margin-top:10px; background:#444; color:white; border:none; padding:10px; border-radius:6px;">Cerrar</button></div></div>
<div id="configModal" class="modal"><div class="modal-content"><h3>Ajustes</h3><button onclick="window.toggleTheme()" style="width:100%; padding:10px; margin-bottom:10px;">🌓 Cambiar Tema</button><button onclick="window.exportarExcelPrincipal()" style="width:100%; padding:10px; margin-bottom:10px; background:var(--accent); color:white; border:none; border-radius:6px;">📊 Exportar Maquetas (Excel)</button><button onclick="window.signOutUser()" style="width:100%; padding:10px; background:var(--danger); color:white; border:none; border-radius:6px;">Cerrar Sesión</button><button onclick="window.toggleModal('configModal', false)" style="width:100%; margin-top:10px; background:transparent; border:none; color:white; width:100%;">Volver</button></div></div>

JavaScript
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = { apiKey: "AIzaSyAtWLxQfVqsEt8fLZkGRN-3zSHuzKMUTk8", authDomain: "maikmanmodelsstock.firebaseapp.com", projectId: "maikmanmodelsstock", storageBucket: "maikmanmodelsstock.appspot.com", messagingSenderId: "871520809912", appId: "1:871520809912:web:4042f15ef200832a95d54d" };
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let modelos = [], paintCatalogData = {}, html5QrCode = null, mixerChart = null, currentModelId = null;
let myPaints = JSON.parse(localStorage.getItem('maikman_paints')) || { have: [], buy: [] };

// --- CORE ---
window.login = () => signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value).catch(()=>alert("Error"));
window.signOutUser = () => signOut(auth);
window.toggleModal = (id, show) => document.getElementById(id).style.display = show ? 'flex' : 'none';
window.switchTab = (id, btn) => {
    document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if(btn) btn.classList.add('active');
};
window.toggleTheme = () => document.body.classList.toggle('light');

onAuthStateChanged(auth, user => {
    document.getElementById('login').style.display = user ? 'none' : 'block';
    document.getElementById('app').style.display = user ? 'block' : 'none';
    if(user) cargarTodo();
});

async function cargarTodo() {
    try {
        const resp = await fetch('pinturas.json');
        paintCatalogData = await resp.json();
        document.getElementById('brandFilter').innerHTML = Object.keys(paintCatalogData).map(b => `<option value="${b}">${b}</option>`).join('');
        window.renderPaintCatalog();
        initMixer();
    } catch(e) { console.error("Error pinturas.json", e); }

    const snap = await getDocs(query(collection(db, "modelos"), orderBy("fabricante")));
    modelos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    window.renderMaquetas();
    window.updateCartCount();
}

// --- GESTIÓN MODELOS (RESURRECCIÓN v6.8.4) ---
window.renderMaquetas = () => {
    const grid = document.getElementById("grid");
    const q = document.getElementById("search").value.toLowerCase();
    grid.innerHTML = "";
    modelos.filter(m => (m.modelo||"").toLowerCase().includes(q) || (m.fabricante||"").toLowerCase().includes(q)).forEach(m => {
        grid.innerHTML += `
            <div class="card">
                <img src="${m.foto || 'https://via.placeholder.com/300'}" onclick="window.abrirInfoModelo('${m.id}')">
                <b>${m.modelo}</b><small>${m.fabricante}</small>
                <div class="card-btns">
                    <button class="btn-action" style="background:#3498db" onclick="window.abrirInfoModelo('${m.id}')">INFO</button>
                    <button class="btn-action" style="background:#9b59b6" onclick="window.abrirPinturasModelo('${m.id}')">COLOR</button>
                    <button class="btn-action" style="background:#f39c12" onclick="window.openFormModal('${m.id}')">EDIT</button>
                    <button class="btn-action" style="background:var(--danger)" onclick="window.borrarModelo('${m.id}')">DEL</button>
                </div>
            </div>`;
    });
};

window.openFormModal = (id = null) => {
    if(id) {
        const m = modelos.find(x => x.id === id);
        document.getElementById('formTitle').innerText = "Editar Maqueta";
        document.getElementById('f_id').value = m.id;
        document.getElementById('f_fabricante').value = m.fabricante || "";
        document.getElementById('f_modelo').value = m.modelo || "";
        document.getElementById('f_precio').value = m.precio || "";
        document.getElementById('f_foto').value = m.foto || "";
        document.getElementById('f_paints').value = (m.paints || []).join(', ');
    } else {
        document.getElementById('formTitle').innerText = "Nueva Maqueta";
        document.getElementById('f_id').value = "";
        document.getElementById('f_fabricante').value = "";
        document.getElementById('f_modelo').value = "";
        document.getElementById('f_precio').value = "";
        document.getElementById('f_foto').value = "";
        document.getElementById('f_paints').value = "";
    }
    window.toggleModal('formModal', true);
};

window.guardarModelo = async () => {
    const id = document.getElementById('f_id').value;
    const paintsArr = document.getElementById('f_paints').value.split(',').map(s => s.trim()).filter(s => s !== "");
    const d = { 
        fabricante: document.getElementById('f_fabricante').value, 
        modelo: document.getElementById('f_modelo').value,
        precio: document.getElementById('f_precio').value,
        foto: document.getElementById('f_foto').value,
        paints: paintsArr
    };
    if(id) await updateDoc(doc(db, "modelos", id), d);
    else await addDoc(collection(db, "modelos"), d);
    window.toggleModal('formModal', false);
    cargarTodo();
};

window.borrarModelo = async (id) => { if(confirm("¿Seguro?")) { await deleteDoc(doc(db, "modelos", id)); cargarTodo(); } };

window.abrirInfoModelo = (id) => {
    currentModelId = id;
    const m = modelos.find(x => x.id === id);
    document.getElementById('infoTitle').innerText = m.modelo;
    document.getElementById('infoFabricante').innerText = m.fabricante;
    document.getElementById('infoPrecio').innerText = "Precio: " + (m.precio || "0") + "€";
    const gallery = [m.foto, ...(m.gallery || [])].filter(u => u && u.includes('http'));
    document.getElementById('galleryGrid').innerHTML = gallery.map(u => `<img src="${u}" class="gallery-img">`).join('');
    window.toggleModal('infoModal', true);
};

window.añadirUrlsAGaleria = async () => {
    const url = document.getElementById('urlPhotoInput').value;
    if(!url) return;
    const m = modelos.find(x => x.id === currentModelId);
    const newGal = m.gallery || []; newGal.push(url);
    await updateDoc(doc(db, "modelos", currentModelId), { gallery: newGal });
    document.getElementById('urlPhotoInput').value = "";
    cargarTodo(); window.toggleModal('infoModal', false);
};

window.abrirPinturasModelo = (id) => {
    const m = modelos.find(x => x.id === id);
    const cont = document.getElementById('mPaintsList'); cont.innerHTML = "";
    (m.paints || []).forEach(pid => {
        const p = encontrarPintura(pid);
        const has = myPaints.have.includes(pid);
        cont.innerHTML += `<div class="paint-item-box" style="display:flex; align-items:center; gap:10px; text-align:left;">
            <div class="color-circle" style="background:${p.hex}; margin:0;"></div>
            <div style="flex:1"><b>${p.id}</b><br><small>${p.nombre}</small></div>
            <div style="color:${has?'var(--success)':'var(--danger)'}; font-weight:bold;">${has?'SÍ':'NO'}</div>
        </div>`;
    });
    window.toggleModal('modelPaintsModal', true);
};

// --- PINTURAS Y SCANNER ---
window.renderPaintCatalog = () => {
    const brand = document.getElementById('brandFilter').value;
    const search = document.getElementById('paintSearch').value.toLowerCase();
    const container = document.getElementById('paintCatalog');
    container.innerHTML = "";
    if(!paintCatalogData[brand]) return;
    paintCatalogData[brand].filter(p => p.id.toLowerCase().includes(search) || p.nombre.toLowerCase().includes(search)).forEach(p => {
        const have = myPaints.have.includes(p.id); const buy = myPaints.buy.includes(p.id);
        container.innerHTML += `<div class="paint-item-box">
            <div class="color-circle" style="background:${p.hex}"></div>
            <span style="font-size:11px; font-weight:bold;">${p.id}</span><br>
            <span style="font-size:10px;">${p.nombre}</span>
            <div style="display:flex; gap:5px; margin-top:8px;">
                <button onclick="window.togglePaint('${p.id}','have')" style="flex:1; background:${have?'var(--success)':'#444'}; border:none; padding:5px; border-radius:4px; color:white;">✅</button>
                <button onclick="window.togglePaint('${p.id}','buy')" style="flex:1; background:${buy?'var(--danger)':'#444'}; border:none; padding:5px; border-radius:4px; color:white;">🛒</button>
            </div>
        </div>`;
    });
};

window.togglePaint = (id, type) => {
    const idx = myPaints[type].indexOf(id);
    if(idx > -1) myPaints[type].splice(idx,1); else myPaints[type].push(id);
    localStorage.setItem('maikman_paints', JSON.stringify(myPaints));
    window.renderPaintCatalog(); window.updateCartCount();
};

window.startScanner = (target) => {
    window.toggleModal('scanModal', true);
    html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (t) => {
        if(target === 'model') { document.getElementById("search").value = t; window.renderMaquetas(); window.switchTab('tab-maquetas'); }
        else { document.getElementById("paintSearch").value = t; window.renderPaintCatalog(); window.switchTab('tab-pinturas'); }
        window.stopScanner();
    }).catch(e => console.error(e));
};
window.stopScanner = () => { if(html5QrCode) html5QrCode.stop().then(() => window.toggleModal('scanModal', false)); };

// --- PICKER E IA ---
window.loadPickerImage = (e) => {
    const reader = new FileReader(); reader.onload = (ev) => {
        const img = new Image(); img.onload = () => {
            const cvs = document.getElementById('canvasPicker'); const ctx = cvs.getContext('2d');
            cvs.width = img.width; cvs.height = img.height; ctx.drawImage(img, 0, 0); cvs.style.display = 'block';
        }; img.src = ev.target.result;
    }; reader.readAsDataURL(e.target.files[0]);
};

document.getElementById('canvasPicker').addEventListener('mousedown', (e) => {
    const cvs = document.getElementById('canvasPicker'); const rect = cvs.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (cvs.width / rect.width);
    const y = (e.clientY - rect.top) * (cvs.height / rect.height);
    const pix = cvs.getContext('2d').getImageData(x,y,1,1).data;
    analizarColorPicker(pix[0], pix[1], pix[2]);
});

function analizarColorPicker(r,g,b) {
    let list = [];
    for(let brand in paintCatalogData) {
        paintCatalogData[brand].forEach(p => {
            const t = hexToRgb(p.hex);
            const dist = Math.sqrt((r-t.r)**2 + (g-t.g)**2 + (b-t.b)**2);
            let score = Math.max(0, 100 - (dist / 4.41));
            let prio = brand.includes("Tamiya") ? 3 : brand.includes("Ammo") ? 2 : brand.includes("Mr") ? 1 : 0;
            list.push({...p, score, brand, prio});
        });
    }
    list.sort((a,b) => b.score - a.score || b.prio - a.prio);
    document.getElementById('pickerResults').innerHTML = list.slice(0,3).map(best => `
        <div class="match-card" style="border-color:${best.hex}">
            <b>${best.brand}: ${best.id}</b> (${best.score.toFixed(1)}%)<br><small>${best.nombre}</small>
            <div style="display:flex; align-items:center; gap:10px; margin-top:5px;">
                <div class="color-circle" style="background:${best.hex}; margin:0;"></div>
                <button onclick="window.togglePaint('${best.id}','buy')" style="background:var(--accent); color:white; border:none; padding:4px 8px; border-radius:4px; font-size:10px;">Añadir 🛒</button>
            </div>
        </div>`).join('');
}

// --- MIXER (BASE 10) ---
function initMixer() {
    const cont = document.getElementById('mixerInputs');
    let opts = '<option value="">-</option>';
    for(let b in paintCatalogData) opts += `<optgroup label="${b}">${paintCatalogData[b].map(p => `<option value="${p.hex}">${p.id}</option>`).join('')}</optgroup>`;
    cont.innerHTML = [1,2,3,4].map(i => `
        <div style="background:rgba(255,255,255,0.03); padding:8px; border-radius:8px;">
            <select id="mc${i}" onchange="window.calcMix()">${opts}</select>
            <input type="range" id="mv${i}" min="0" max="10" step="1" value="0" oninput="window.calcMix()">
            <div id="ml${i}" style="font-size:10px; text-align:right;">0 gotas</div>
        </div>`).join('');
    mixerChart = new Chart(document.getElementById('mixerChart'), { type:'pie', data:{labels:[], datasets:[{data:[], backgroundColor:[]}]}, options:{plugins:{legend:{display:false}}, animation:false} });
}

window.calcMix = () => {
    let r=0, g=0, b=0, tot=0; const lbs=[], dts=[], cls=[];
    for(let i=1; i<=4; i++){
        const h = document.getElementById(`mc${i}`).value, v = parseInt(document.getElementById(`mv${i}`).value);
        document.getElementById(`ml${i}`).innerText = v + " gotas";
        if(h && v > 0){ const c = hexToRgb(h); r+=c.r*v; g+=c.g*v; b+=c.b*v; tot+=v; lbs.push(document.getElementById(`mc${i}`).selectedOptions[0].text); dts.push(v); cls.push(h); }
    }
    const resDiv = document.getElementById('mixerResultPreview');
    if(tot>0){
        const hex = rgbToHex(Math.round(r/tot), Math.round(g/tot), Math.round(b/tot));
        resDiv.style.backgroundColor = hex; resDiv.innerText = hex;
    } else { resDiv.style.backgroundColor = 'transparent'; resDiv.innerText = '#---'; }
    mixerChart.data.labels = lbs; mixerChart.data.datasets[0].data = dts; mixerChart.data.datasets[0].backgroundColor = cls; mixerChart.update();
};

// --- EXCEL & UTILS ---
window.updateCartCount = () => document.getElementById('cartCount').innerText = myPaints.buy.length;
window.exportarExcelPrincipal = () => {
    const ws = XLSX.utils.json_to_sheet(modelos.map(m => ({ MARCA: m.fabricante, MODELO: m.modelo, PRECIO: m.precio })));
    const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Stock"); XLSX.writeFile(wb, "Stock_Maikman.xlsx");
};
window.exportarListaExcel = () => {
    const ws = XLSX.utils.json_to_sheet(myPaints.buy.map(id => ({ CODIGO: id, NOMBRE: encontrarPintura(id).nombre })));
    const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Compra"); XLSX.writeFile(wb, "Compra_Maikman.xlsx");
};
window.abrirModalCompra = (s) => {
    if(!s) return window.toggleModal('cartModal', false);
    const cont = document.getElementById('cartListContainer');
    cont.innerHTML = myPaints.buy.map(id => {
        const p = encontrarPintura(id);
        return `<div style="display:flex; align-items:center; gap:10px; padding:10px; border-bottom:1px solid #333;"><div class="color-circle" style="width:20px; height:20px; background:${p.hex}; margin:0;"></div><span>${id} - ${p.nombre}</span></div>`;
    }).join('');
    window.toggleModal('cartModal', true);
};

function encontrarPintura(id) { for(let b in paintCatalogData) { let p = paintCatalogData[b].find(x => x.id === id); if(p) return p; } return { nombre: id, hex: "#333", id: id }; }
function hexToRgb(h) { return { r: parseInt(h.slice(1,3),16), g: parseInt(h.slice(3,5),16), b: parseInt(h.slice(5,7),16) }; }
function rgbToHex(r, g, b) { return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1).toUpperCase(); }

</script>
