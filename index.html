<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maikman Models - Pro Stock v5.2</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
:root {
    --bg:#0f172a; --card:#020617; --text:#e5e7eb; --accent:#38bdf8; --success:#00b894; --danger:#d63031;
    --min-card-width: 260px;
}
body.light { --bg:#f1f5f9; --card:#fff; --text:#020617; --accent:#2563eb; }
* { box-sizing:border-box; transition:.3s; }
body { margin:0; font-family:system-ui; background:var(--bg); color:var(--text); padding-bottom: 20px; }

/* Navegación Superior */
.nav-tabs { 
    display: flex; align-items: center; background: var(--card); padding: 8px; gap: 4px; 
    position: sticky; top: 0; z-index: 900; border-bottom: 1px solid #334155; 
}
.tab-btn { 
    flex: 1; padding: 12px 2px; border: none; background: rgba(255,255,255,0.05); 
    color: var(--text); cursor: pointer; border-radius: 8px; font-weight: bold; font-size: 11px;
}
.tab-btn.active { background: var(--accent); color: white; }
.cart-badge { background: var(--danger); color: white; font-size: 10px; padding: 2px 5px; border-radius: 10px; margin-left: 3px; }

#app { display:none; }
.content-section { display: none; padding: 20px; }
.content-section.active { display: block; }

/* Grid Maquetas */
#grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(var(--min-card-width),1fr)); gap:16px; }
.card { background:var(--card); border-radius:12px; padding:12px; border: 1px solid #334155; display: flex; flex-direction: column; }
.card img { width:100%; height:180px; object-fit:cover; border-radius:8px; margin-bottom: 10px; }
.card-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: auto; }

/* Pinturas y Mixer */
.paint-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }
.paint-item { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 8px; display: flex; align-items: center; gap: 12px; border: 1px solid #334155; }
.color-swatch { width: 25px; height: 25px; border-radius: 5px; border: 1px solid #444; flex-shrink: 0; }
.btn-mini { border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; color: white; background: #334155; }
.btn-mini.active-have { background: var(--success) !important; }
.btn-mini.active-buy { background: var(--danger) !important; }

/* Scanner Styles */
#reader { width: 100%; border-radius: 12px; overflow: hidden; background: #000; }
.mixer-card { background: var(--card); padding: 10px; border-radius: 12px; border: 1px solid #334155; }

/* Modales */
.modal { position:fixed; inset:0; background:rgba(0,0,0,.85); display:none; align-items:center; justify-content:center; z-index:1000; padding:20px; }
.modal-content { background:var(--card); padding:24px; width:100%; max-width:500px; border-radius:12px; display:flex; flex-direction:column; gap:12px; max-height:90vh; overflow-y:auto; }
input, select { padding:10px; border-radius:6px; border: 1px solid #334155; background: #1e293b; color: white; width: 100%; }
.btn-main { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
</style>
</head>
<body class="dark">

<div id="login" style="max-width:320px; margin:80px auto; padding:20px; text-align:center;">
    <h2 style="color:var(--accent)">Maikman Models</h2>
    <input id="email" type="email" placeholder="Email" style="margin-bottom:10px">
    <input id="password" type="password" placeholder="Contraseña" style="margin-bottom:20px">
    <button onclick="login()" class="btn-main" style="width:100%">Entrar al Taller</button>
</div>

<div id="app">
    <nav class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('tab-maquetas')">📦 MODELOS</button>
        <button class="tab-btn" onclick="switchTab('tab-pinturas')">🎨 PINTURAS</button>
        <button class="tab-btn" onclick="switchTab('tab-mixer')">🧪 MIXER</button>
        <button class="tab-btn" onclick="abrirModalCompra()">🛒 <span id="cartCount" class="cart-badge">0</span></button>
        <button class="tab-btn" style="flex:0.3" onclick="openConfigModal()">⚙️</button>
    </nav>

    <section id="tab-maquetas" class="content-section active">
        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <input id="search" placeholder="Buscar maqueta..." oninput="renderMaquetas()">
            <button onclick="openFormModal()" class="btn-main" style="padding:0 20px">➕</button>
        </div>
        <div id="grid"></div>
    </section>

    <section id="tab-pinturas" class="content-section">
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <select id="brandFilter" onchange="renderPaintCatalog()" style="flex:1"></select>
            <button onclick="abrirScanner()" style="background:#8e44ad; color:white; border:none; border-radius:8px; padding:0 15px; cursor:pointer;">📷 SCAN</button>
        </div>
        <input id="paintSearch" placeholder="Nombre o código..." onkeyup="renderPaintCatalog()" style="margin-bottom:15px">
        <div id="paintCatalog" class="paint-grid"></div>
    </section>

    <section id="tab-mixer" class="content-section">
        <div id="mixerCardsContainer" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(180px,1fr)); gap:10px; margin-bottom:20px;"></div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; background:rgba(255,255,255,0.03); padding:15px; border-radius:15px;">
            <div id="mixerResultPreview" style="height:120px; border-radius:12px; display:flex; flex-direction:column; align-items:center; justify-content:center; border:2px solid #334155; font-weight:bold;">
                <span>Resultado</span>
                <small id="hexResult">#---</small>
            </div>
            <canvas id="mixerChart" style="max-height: 120px;"></canvas>
        </div>
        <button onclick="resetMixer()" style="width:100%; margin-top:15px; padding:10px; background:var(--danger); border:none; color:white; border-radius:8px;">Reiniciar Mezcla</button>
    </section>
</div>

<div id="scannerModal" class="modal">
    <div class="modal-content">
        <h3>Lector de Pinturas</h3>
        <div id="reader"></div>
        <p id="scannerStatus" style="text-align:center; color:var(--accent);">Apunta al código de barras</p>
        <button onclick="cerrarScanner()" class="btn-main" style="background:#555">Cancelar</button>
    </div>
</div>

<div id="formModal" class="modal">
    <div class="modal-content">
        <h3 id="formTitle">Nuevo Modelo</h3>
        <input type="hidden" id="form_id">
        <input id="form_codigo" placeholder="Código (Ej: 24345)">
        <input id="form_fabricante" placeholder="Fabricante (Ej: Tamiya)">
        <input id="form_modelo" placeholder="Nombre del modelo">
        <input id="form_precio" type="number" step="0.01" placeholder="Precio (€)">
        <p style="font-size:12px; margin:0">Imagen de portada:</p>
        <input type="file" id="form_fotoFile" accept="image/*">
        <button onclick="guardarModelo()" class="btn-main" style="background:var(--success)">Guardar Modelo</button>
        <button onclick="closeFormModal()" class="btn-main" style="background:#555">Cancelar</button>
    </div>
</div>

<div id="cartModal" class="modal">
    <div class="modal-content">
        <h3>Carrito de Compra</h3>
        <div id="cartListContainer" style="max-height: 350px; overflow-y: auto; margin-bottom: 15px;"></div>
        <button onclick="exportarListaExcel(true)" class="btn-main" style="background:var(--success)">📥 EXPORTAR MARCADOS</button>
        <button onclick="exportarListaExcel(false)" class="btn-main">💾 GUARDAR NO MARCADOS</button>
        <button onclick="cerrarModalCompra()" class="btn-main" style="background:#555">Cerrar</button>
    </div>
</div>

<div id="infoModal" class="modal">
    <div class="modal-content">
        <h3 id="infoTitle"></h3>
        <div id="infoDetails"></div>
        <hr style="border-color:#334155">
        <b>Galeria del Proyecto</b>
        <div id="galleryGrid" style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:10px 0;"></div>
        <input type="file" id="galleryFile" accept="image/*" onchange="subirAFotoGaleria()">
        <button onclick="document.getElementById('infoModal').style.display='none'" class="btn-main">Cerrar</button>
    </div>
</div>

<div id="configModal" class="modal">
    <div class="modal-content">
        <h3>Opciones</h3>
        <button onclick="document.body.classList.toggle('light')" class="btn-main" style="background:#555">🌓 Cambiar Tema</button>
        <button onclick="exportarExcelPrincipal()" class="btn-main" style="background:var(--success)">📊 Exportar Stock a Excel</button>
        <hr style="border-color:#334155">
        <button onclick="signOutUser()" class="btn-main" style="background:var(--danger)">Cerrar Sesión</button>
        <button onclick="closeConfigModal()" class="btn-main" style="background:#334155">Volver</button>
    </div>
</div>

<script type="module">
// FIREBASE CONFIG Y CARGA
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyAtWLxQfVqsEt8fLZkGRN-3zSHuzKMUTk8",
  authDomain: "maikmanmodelsstock.firebaseapp.com",
  projectId: "maikmanmodelsstock",
  storageBucket: "maikmanmodelsstock.appspot.com",
  messagingSenderId: "871520809912",
  appId: "1:871520809912:web:4042f15ef200832a95d54d"
};

const fApp = initializeApp(firebaseConfig);
const auth = getAuth(fApp);
const db = getFirestore(fApp);
const storage = getStorage(fApp);

let modelos = [];
let paintCatalogData = {};
let currentModelId = null;
let myPaints = JSON.parse(localStorage.getItem('maikman_paints')) || { have: [], buy: [] };
let mixerChart = null;
let html5QrCode = null;

// --- EXPORTAR A WINDOW (Para que los onclick funcionen) ---
window.login = () => {
    const e = document.getElementById('email').value;
    const p = document.getElementById('password').value;
    signInWithEmailAndPassword(auth, e, p).catch(() => alert("Error de acceso"));
};

window.signOutUser = () => signOut(auth);

window.switchTab = (tabId) => {
    document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    event.currentTarget.classList.add('active');
    if(tabId !== 'tab-pinturas') cerrarScanner();
};

window.openConfigModal = () => document.getElementById('configModal').style.display='flex';
window.closeConfigModal = () => document.getElementById('configModal').style.display='none';

// --- GESTIÓN DE MODELOS ---
async function cargarModelos() {
    const snap = await getDocs(query(collection(db, "modelos"), orderBy("fabricante")));
    modelos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderMaquetas();
}

window.renderMaquetas = () => {
    const grid = document.getElementById("grid");
    const q = document.getElementById("search").value.toLowerCase();
    grid.innerHTML = "";
    modelos.filter(m => (m.modelo||"").toLowerCase().includes(q) || (m.fabricante||"").toLowerCase().includes(q)).forEach(m => {
        grid.innerHTML += `
            <div class="card">
                <img src="${m.foto || 'https://via.placeholder.com/300x180'}">
                <div style="font-weight:bold">${m.modelo}</div>
                <div style="font-size:12px; opacity:0.7">${m.fabricante} (${m.codigo||'S/C'})</div>
                <div class="card-btns">
                    <button onclick="abrirInfoModelo('${m.id}')" style="background:var(--accent); color:white; border:none; padding:8px; border-radius:4px; font-size:11px; cursor:pointer;">INFO</button>
                    <button onclick="editarModelo('${m.id}')" style="background:#f39c12; color:white; border:none; padding:8px; border-radius:4px; font-size:11px; cursor:pointer;">EDIT</button>
                    <button onclick="borrarModelo('${m.id}')" style="background:var(--danger); color:white; border:none; padding:8px; border-radius:4px; font-size:11px; cursor:pointer;">BORRAR</button>
                </div>
            </div>`;
    });
};

window.openFormModal = () => {
    document.getElementById('form_id').value = "";
    document.getElementById('formModal').style.display = 'flex';
};

window.closeFormModal = () => document.getElementById('formModal').style.display = 'none';

window.guardarModelo = async () => {
    const id = document.getElementById('form_id').value;
    const file = document.getElementById('form_fotoFile').files[0];
    let fotoUrl = null;
    if(file) {
        const r = ref(storage, `fotos/${Date.now()}_${file.name}`);
        await uploadBytes(r, file);
        fotoUrl = await getDownloadURL(r);
    }
    const data = {
        codigo: document.getElementById('form_codigo').value || "",
        fabricante: document.getElementById('form_fabricante').value || "",
        modelo: document.getElementById('form_modelo').value || "",
        precio: document.getElementById('form_precio').value || ""
    };
    if(fotoUrl) data.foto = fotoUrl;
    if(id) await updateDoc(doc(db, "modelos", id), data);
    else await addDoc(collection(db, "modelos"), data);
    closeFormModal(); cargarModelos();
};

window.borrarModelo = async (id) => { if(confirm("¿Seguro que quieres borrar este modelo?")) { await deleteDoc(doc(db, "modelos", id)); cargarModelos(); } };

// --- PINTURAS Y SCANNER ---
async function cargarCatalogoPinturas() {
    try {
        const response = await fetch('pinturas.json');
        paintCatalogData = await response.json();
        const filter = document.getElementById('brandFilter');
        filter.innerHTML = "";
        Object.keys(paintCatalogData).forEach(brand => filter.innerHTML += `<option value="${brand}">${brand}</option>`);
        renderPaintCatalog();
        initMixerUI();
    } catch (e) {}
}

window.renderPaintCatalog = () => {
    const brand = document.getElementById('brandFilter').value;
    const q = document.getElementById('paintSearch').value.toLowerCase();
    const container = document.getElementById('paintCatalog');
    container.innerHTML = "";
    if(paintCatalogData[brand]) {
        paintCatalogData[brand]
        .filter(p => p.nombre.toLowerCase().includes(q) || p.id.toLowerCase().includes(q))
        .forEach(p => {
            const isHave = myPaints.have.includes(p.id);
            const isBuy = myPaints.buy.includes(p.id);
            container.innerHTML += `
                <div class="paint-item">
                    <div class="color-swatch" style="background:${p.hex}"></div>
                    <div style="flex:1"><b>${p.id}</b><br><small>${p.nombre}</small></div>
                    <button class="btn-mini ${isHave?'active-have':''}" onclick="togglePaint('${p.id}', 'have')">✅</button>
                    <button class="btn-mini ${isBuy?'active-buy':''}" onclick="togglePaint('${p.id}', 'buy')">🛒</button>
                </div>`;
        });
    }
};

window.togglePaint = (id, type) => {
    const idx = myPaints[type].indexOf(id);
    if(idx > -1) myPaints[type].splice(idx, 1);
    else myPaints[type].push(id);
    localStorage.setItem('maikman_paints', JSON.stringify(myPaints));
    renderPaintCatalog(); updateCartCount();
};

window.abrirScanner = () => {
    document.getElementById('scannerModal').style.display = 'flex';
    html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
        buscarPinturaEscaneada(text);
    }).catch(() => alert("Error al abrir la cámara"));
};

window.cerrarScanner = () => {
    if(html5QrCode) html5QrCode.stop().then(() => { document.getElementById('scannerModal').style.display='none'; });
    else document.getElementById('scannerModal').style.display='none';
};

function buscarPinturaEscaneada(codigoEan) {
    let encontrada = null;
    for(let marca in paintCatalogData) {
        encontrada = paintCatalogData[marca].find(p => codigoEan.includes(p.id.replace("-","")));
        if(encontrada) break;
    }
    if(encontrada) {
        navigator.vibrate(200);
        if(confirm(`Detectada: ${encontrada.nombre}. ¿Añadir al Stock?`)) {
            if(!myPaints.have.includes(encontrada.id)) {
                myPaints.have.push(encontrada.id);
                localStorage.setItem('maikman_paints', JSON.stringify(myPaints));
                renderPaintCatalog();
            }
            cerrarScanner();
        }
    }
}

// --- MIXER ---
function initMixerUI() {
    const container = document.getElementById('mixerCardsContainer');
    container.innerHTML = "";
    let options = '<option value="">- Vacío -</option>';
    Object.keys(paintCatalogData).forEach(brand => {
        options += `<optgroup label="${brand}">`;
        paintCatalogData[brand].forEach(p => options += `<option value="${p.hex}">${p.id} - ${p.nombre}</option>`);
        options += `</optgroup>`;
    });

    for(let i=1; i<=4; i++) {
        container.innerHTML += `
            <div class="mixer-card">
                <select id="mixColor${i}" onchange="calculateMix()">${options}</select>
                <input type="range" id="mixSlider${i}" min="0" max="100" value="0" oninput="updateMixSlider(${i})">
                <div id="mixLabel${i}" style="text-align:center; font-size:12px;">0%</div>
            </div>`;
    }
    const ctx = document.getElementById('mixerChart').getContext('2d');
    mixerChart = new Chart(ctx, {
        type: 'pie',
        data: { labels: [], datasets: [{ data: [], backgroundColor: [] }] },
        options: { responsive: true, plugins: { legend: { display: false } } }
    });
}

window.updateMixSlider = (i) => {
    document.getElementById(`mixLabel${i}`).innerText = document.getElementById(`mixSlider${i}`).value + "%";
    calculateMix();
};

window.calculateMix = () => {
    let r=0, g=0, b=0, total=0;
    const lbs = [], dts = [], cls = [];
    for(let i=1; i<=4; i++) {
        const hex = document.getElementById(`mixColor${i}`).value;
        const p = parseInt(document.getElementById(`mixSlider${i}`).value);
        if(hex && p > 0) {
            const rgb = hexToRgb(hex);
            r += rgb.r * p; g += rgb.g * p; b += rgb.b * p;
            total += p;
            lbs.push(document.getElementById(`mixColor${i}`).selectedOptions[0].text);
            dts.push(p); cls.push(hex);
        }
    }
    const res = document.getElementById('mixerResultPreview');
    if(total > 0) {
        const fHex = rgbToHex(Math.round(r/total), Math.round(g/total), Math.round(b/total));
        res.style.backgroundColor = fHex;
        document.getElementById('hexResult').innerText = fHex;
        res.style.color = (r+g+b)/total > 380 ? '#000' : '#fff';
    }
    mixerChart.data.labels = lbs;
    mixerChart.data.datasets[0].data = dts;
    mixerChart.data.datasets[0].backgroundColor = cls;
    mixerChart.update();
};

window.resetMixer = () => {
    for(let i=1; i<=4; i++) {
        document.getElementById(`mixColor${i}`).value = "";
        document.getElementById(`mixSlider${i}`).value = 0;
        document.getElementById(`mixLabel${i}`).innerText = "0%";
    }
    calculateMix();
};

// --- COMPRA Y EXPORT ---
window.updateCartCount = () => { document.getElementById('cartCount').innerText = myPaints.buy.length; };

window.abrirModalCompra = () => {
    const cont = document.getElementById('cartListContainer');
    cont.innerHTML = "";
    myPaints.buy.forEach(id => {
        let p = encontrarPintura(id);
        cont.innerHTML += `<div style="display:flex; align-items:center; gap:10px; padding:10px; border-bottom:1px solid #334155;">
            <input type="checkbox" class="cart-check" value="${id}" checked>
            <div style="width:15px; height:15px; background:${p.hex}"></div>
            <span>${id} - ${p.nombre}</span>
        </div>`;
    });
    document.getElementById('cartModal').style.display='flex';
};

window.exportarListaExcel = (soloMarcados) => {
    let lista = [];
    document.querySelectorAll('.cart-check').forEach(c => {
        if((soloMarcados && c.checked) || (!soloMarcados && !c.checked)) {
            let p = encontrarPintura(c.value);
            lista.push({ CODIGO: c.value, PINTURA: p.nombre });
        }
    });
    const ws = XLSX.utils.json_to_sheet(lista);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Lista");
    XLSX.writeFile(wb, soloMarcados ? "Compra_Maikman.xlsx" : "Pendientes.xlsx");
};

window.exportarExcelPrincipal = () => {
    const datos = modelos.map(m => ({
        FABRICANTE: m.fabricante || "",
        MODELO: m.modelo || "",
        CODIGO: m.codigo || "",
        PINTURAS: m.paints ? m.paints.join(", ") : ""
    }));
    const ws = XLSX.utils.json_to_sheet(datos);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Stock");
    XLSX.writeFile(wb, "Stock_Maikman.xlsx");
};

// --- UTILIDADES ---
function encontrarPintura(id) {
    for(let b in paintCatalogData) {
        let p = paintCatalogData[b].find(x => x.id === id);
        if(p) return p;
    }
    return { nombre: "S/D", hex: "#333" };
}
function hexToRgb(h) {
    return { r: parseInt(h.slice(1,3),16), g: parseInt(h.slice(3,5),16), b: parseInt(h.slice(5,7),16) };
}
function rgbToHex(r, g, b) {
    return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1).toUpperCase();
}

onAuthStateChanged(auth, user => {
    document.getElementById("login").style.display = user ? "none" : "block";
    document.getElementById("app").style.display = user ? "block" : "none";
    if (user) { cargarModelos(); cargarCatalogoPinturas(); updateCartCount(); }
});

</script>
</body>
</html>
