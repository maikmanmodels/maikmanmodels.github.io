<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Maikman Models Stock & Colors</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
--bg:#0f172a; --card:#020617; --text:#e5e7eb; --accent:#38bdf8; --success:#00b894; --danger:#d63031;
--min-card-width: 260px;
}
body.light { --bg:#f1f5f9; --card:#fff; --text:#020617; --accent:#2563eb; }
* { box-sizing:border-box; transition:.3s; }
body { margin:0; font-family:system-ui; background:var(--bg); color:var(--text); padding-bottom: 50px; }

/* Navegación por Pestañas */
.nav-tabs { display: flex; background: var(--card); padding: 10px; gap: 10px; position: sticky; top: 0; z-index: 900; border-bottom: 1px solid #334155; }
.tab-btn { flex: 1; padding: 12px; border: none; background: rgba(255,255,255,0.05); color: var(--text); cursor: pointer; border-radius: 8px; font-weight: bold; }
.tab-btn.active { background: var(--accent); color: white; }

header { padding:20px; display:flex; justify-content:space-between; align-items:center; font-size:22px; font-weight:bold; }
button { background:var(--accent); border:none; padding:8px 14px; border-radius:6px; cursor:pointer; color:white; }
input, select { padding:10px; border-radius:6px; border:none; background: var(--card); color: var(--text); border: 1px solid #334155; width: 100%; }

#app { display:none; }
.content-section { display: none; padding: 20px; }
.content-section.active { display: block; }

/* Grid Maquetas */
#grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(var(--min-card-width),1fr)); gap:16px; }
.card { background:var(--card); border-radius:12px; padding:12px; position:relative; border: 1px solid #334155; }
.card img { width:100%; height:200px; object-fit:cover; border-radius:8px; }

/* Estilos Catálogo Pinturas */
.paint-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; margin-top: 20px; }
.paint-item { background: var(--card); padding: 12px; border-radius: 8px; display: flex; align-items: center; gap: 12px; border: 1px solid #334155; }
.color-swatch { width: 30px; height: 30px; border-radius: 6px; border: 1px solid #444; flex-shrink: 0; }
.paint-info { flex-grow: 1; }
.paint-info div { font-size: 0.8em; opacity: 0.7; }
.btn-group { display: flex; gap: 5px; }
.btn-mini { padding: 5px 8px; font-size: 12px; border-radius: 4px; border: none; cursor: pointer; background: #334155; color: white; }
.btn-mini.have.active { background: var(--success); }
.btn-mini.buy.active { background: var(--danger); }

/* Lista Compra Flotante */
.shopping-cart { position: fixed; bottom: 20px; right: 20px; background: var(--accent); color: white; padding: 15px 25px; border-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); cursor: pointer; font-weight: bold; z-index: 1001; }

/* Modales (heredados de tu código) */
.modal { position:fixed; inset:0; background:rgba(0,0,0,.8); display:none; align-items:center; justify-content:center; z-index:1000; }
.modal-content { background:var(--card); padding:24px; width:90%; max-width:500px; border-radius:12px; display:flex; flex-direction:column; gap:12px; max-height:90vh; overflow-y:auto; }
</style>
</head>
<body class="dark">

<div id="login" style="max-width:320px; margin:80px auto; background:var(--card); padding:20px; border-radius:12px;">
    <h2>Maikman Stock Login</h2>
    <input id="email" type="email" placeholder="Email"><br><br>
    <input id="password" type="password" placeholder="Contraseña"><br><br>
    <button onclick="login()" style="width:100%">Entrar</button>
    <p id="error" style="color:red;"></p>
</div>

<div id="app">
    <nav class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('tab-maquetas')">📦 MAQUETAS</button>
        <button class="tab-btn" onclick="switchTab('tab-pinturas')">🎨 PINTURAS</button>
        <button onclick="openConfigModal()">⚙️</button>
    </nav>

    <section id="tab-maquetas" class="content-section active">
        <div id="controls" style="display:flex; gap:10px; margin-bottom:20px;">
            <input id="search" placeholder="Buscar maqueta...">
            <button onclick="openModal()">➕ Añadir</button>
        </div>
        <div id="grid"></div>
    </section>

    <section id="tab-pinturas" class="content-section">
        <div class="controls-pinturas" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <select id="brandFilter" onchange="renderPaintCatalog()"></select>
            <input id="paintSearch" placeholder="Buscar color o código..." onkeyup="renderPaintCatalog()">
        </div>
        <div id="paintCatalog" class="paint-grid"></div>
    </section>

    <div class="shopping-cart" id="cartBtn" onclick="exportShoppingList()">
        🛒 Lista de Compra (<span id="cartCount">0</span>)
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Nuevo modelo</h3>
        <input id="codigo" placeholder="Código">
        <input id="fabricante" placeholder="Fabricante">
        <input id="modelo" placeholder="Modelo">
        <input id="precio" type="number" step="0.01" placeholder="Precio (€)">
        <input type="file" id="fotoFile" accept="image/*">
        <button onclick="guardarModelo()">Guardar</button>
        <button onclick="closeModal()">Cancelar</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// TU CONFIGURACIÓN DE FIREBASE (Mantenida)
const firebaseConfig = {
  apiKey: "AIzaSyAtWLxQfVqsEt8fLZkGRN-3zSHuzKMUTk8",
  authDomain: "maikmanmodelsstock.firebaseapp.com",
  projectId: "maikmanmodelsstock",
  storageBucket: "maikmanmodelsstock.appspot.com",
  messagingSenderId: "871520809912",
  appId: "1:871520809912:web:4042f15ef200832a95d54d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// VARIABLES DE ESTADO
let modelos = [];
let paintCatalogData = {};
let myPaints = JSON.parse(localStorage.getItem('maikman_paints')) || { have: [], buy: [] };

// --- LÓGICA DE INICIO ---
onAuthStateChanged(auth, user => {
    document.getElementById("login").style.display = user ? "none" : "block";
    document.getElementById("app").style.display = user ? "block" : "none";
    if (user) {
        cargarModelos();
        cargarCatalogoPinturas();
    }
});

window.login = () => signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value)
    .catch(err => document.getElementById('error').innerText = "Error: " + err.message);

// --- GESTIÓN DE PESTAÑAS ---
window.switchTab = (tabId) => {
    document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    event.currentTarget.classList.add('active');
};

// --- CARGAR MAQUETAS (Tu lógica original) ---
async function cargarModelos() {
    const snap = await getDocs(collection(db, "modelos"));
    modelos = [];
    snap.forEach(d => modelos.push({ id: d.id, ...d.data() }));
    renderMaquetas();
}

function renderMaquetas() {
    const grid = document.getElementById("grid");
    const q = document.getElementById("search").value.toLowerCase();
    grid.innerHTML = "";
    modelos.filter(m => m.modelo.toLowerCase().includes(q) || m.fabricante.toLowerCase().includes(q))
    .forEach(m => {
        grid.innerHTML += `
            <div class="card">
                <img src="${m.foto || ''}">
                <div style="padding:10px">
                    <b>${m.modelo}</b><br><small>${m.fabricante} [${m.codigo}]</small>
                </div>
            </div>`;
    });
}

// --- SECCIÓN PINTURAS (NUEVA) ---
async function cargarCatalogoPinturas() {
    try {
        const res = await fetch('pinturas.json');
        paintCatalogData = await res.json();
        const selector = document.getElementById("brandFilter");
        Object.keys(paintCatalogData).forEach(brand => {
            selector.innerHTML += `<option value="${brand}">${brand}</option>`;
        });
        renderPaintCatalog();
    } catch (e) { console.error("Falta el archivo pinturas.json"); }
}

window.renderPaintCatalog = () => {
    const brand = document.getElementById("brandFilter").value;
    const search = document.getElementById("paintSearch").value.toLowerCase();
    const container = document.getElementById("paintCatalog");
    container.innerHTML = "";

    if(!paintCatalogData[brand]) return;

    paintCatalogData[brand].forEach(p => {
        if(p.id.toLowerCase().includes(search) || p.nombre.toLowerCase().includes(search)) {
            const hasIt = myPaints.have.includes(p.id);
            const buyIt = myPaints.buy.includes(p.id);
            container.innerHTML += `
                <div class="paint-item">
                    <div class="color-swatch" style="background:${p.hex}"></div>
                    <div class="paint-info">
                        <strong>${p.id}</strong>
                        <div>${p.nombre}</div>
                    </div>
                    <div class="btn-group">
                        <button class="btn-mini have ${hasIt?'active':''}" onclick="togglePaint('${p.id}', 'have')">✅</button>
                        <button class="btn-mini buy ${buyIt?'active':''}" onclick="togglePaint('${p.id}', 'buy')">🛒</button>
                    </div>
                </div>`;
        }
    });
    document.getElementById("cartCount").innerText = myPaints.buy.length;
};

window.togglePaint = (id, type) => {
    const idx = myPaints[type].indexOf(id);
    if(idx > -1) myPaints[type].splice(idx, 1);
    else myPaints[type].push(id);
    localStorage.setItem('maikman_paints', JSON.stringify(myPaints));
    renderPaintCatalog();
};

window.exportShoppingList = () => {
    if(myPaints.buy.length === 0) return alert("Lista vacía");
    const txt = "Maikman Models - Comprar: " + myPaints.buy.join(", ");
    navigator.clipboard.writeText(txt);
    alert("¡Lista copiada para WhatsApp!");
};

// Eventos de búsqueda
document.getElementById("search").addEventListener("input", renderMaquetas);
</script>
</body>
</html>
