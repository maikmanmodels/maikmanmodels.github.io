<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maikman Models - Pro Stock v7.5.5</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
:root { --bg:#0f172a; --card:#020617; --text:#e5e7eb; --accent:#38bdf8; --success:#00b894; --danger:#d63031; }
body.light { --bg:#f1f5f9; --card:#ffffff; --text:#020617; --accent:#2563eb; }
* { box-sizing:border-box; transition:.3s; font-family: system-ui, sans-serif; }
body { margin:0; background:var(--bg); color:var(--text); padding-bottom: 20px; }

.nav-tabs { display: flex; background: var(--card); padding: 8px; gap: 4px; position: sticky; top: 0; z-index: 900; border-bottom: 1px solid #334155; }
.tab-btn { flex: 1; padding: 12px 2px; border: none; background: rgba(255,255,255,0.05); color: var(--text); cursor: pointer; border-radius: 8px; font-weight: bold; font-size: 11px; }
.tab-btn.active { background: var(--accent); color: white; }
.cart-badge { background: var(--danger); color: white; font-size: 10px; padding: 2px 5px; border-radius: 10px; margin-left: 3px; }

.content-section { display: none; padding: 15px; }
.content-section.active { display: block; }

#grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:16px; }
.card { background:var(--card); border-radius:12px; padding:12px; border: 1px solid #334155; display: flex; flex-direction: column; }
.card img { width:100%; height:180px; object-fit:cover; border-radius:8px; cursor: pointer; margin-bottom: 10px; }
.card-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: auto; }
.btn-action { padding: 8px; font-size: 10px; border-radius: 4px; border: none; cursor: pointer; color: white; font-weight: bold; text-align: center; }

.paint-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
.paint-item-box { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 10px; border: 1px solid #334155; text-align: center; }
.color-circle { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #fff; margin: 0 auto 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
.paint-id { font-size: 11px; font-weight: bold; color: var(--accent); display: block; }
.paint-name { font-size: 10px; opacity: 0.8; height: 24px; overflow: hidden; display: flex; align-items: center; justify-content: center; margin: 4px 0; }

.modal { position:fixed; inset:0; background:rgba(0,0,0,.9); display:none; align-items:center; justify-content:center; z-index:1000; padding:20px; }
.modal-content { background:var(--card); padding:20px; width:100%; max-width:500px; border-radius:12px; max-height:90vh; overflow-y:auto; border: 1px solid #334155; }

input, select { padding:10px; border-radius:6px; border: 1px solid #334155; background: #1e293b; color: white; width: 100%; margin-bottom: 10px; }
.match-card { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; margin-top: 10px; border-left: 4px solid var(--accent); }
</style>
</head>
<body class="dark">

<div id="login" style="max-width:320px; margin:80px auto; padding:20px; text-align:center;">
    <h2 style="color:var(--accent)">Maikman Models</h2>
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Contraseña">
    <button onclick="window.login()" style="width:100%; padding:12px; background:var(--accent); color:white; border:none; border-radius:6px; font-weight:bold;">ENTRAR</button>
</div>

<div id="app" style="display:none;">
    <nav class="nav-tabs">
        <button class="tab-btn active" onclick="window.switchTab('tab-maquetas', this)">📦 MODELOS</button>
        <button class="tab-btn" onclick="window.switchTab('tab-pinturas', this)">🎨 PINTURAS</button>
        <button class="tab-btn" onclick="window.switchTab('tab-mixer', this)">🧪 PICK/MIX</button>
        <button class="tab-btn" onclick="window.abrirModalCompra(true)">🛒 <span id="cartCount" class="cart-badge">0</span></button>
        <button class="tab-btn" style="flex:0.3" onclick="window.toggleModal('configModal', true)">⚙️</button>
    </nav>

    <section id="tab-maquetas" class="content-section active">
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <input id="search" placeholder="Buscar..." oninput="window.renderMaquetas()">
            <button onclick="window.startScanner('model')" style="background:#4b5563; border:none; padding:0 15px; border-radius:6px; color:white;">📷</button>
            <button onclick="window.openFormModal()" style="background:var(--accent); border:none; padding:0 15px; border-radius:6px; color:white;">➕</button>
        </div>
        <div id="grid"></div>
    </section>

    <section id="tab-pinturas" class="content-section">
        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <select id="brandFilter" onchange="window.renderPaintCatalog()" style="flex:1"></select>
            <button onclick="window.startScanner('paint')" style="background:#4b5563; border:none; padding:0 15px; border-radius:6px; color:white;">📷</button>
        </div>
        <input id="paintSearch" placeholder="Buscar pintura..." onkeyup="window.renderPaintCatalog()">
        <div id="paintCatalog" class="paint-grid"></div>
    </section>

    <section id="tab-mixer" class="content-section">
        <div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:12px; margin-bottom:20px;">
            <h4 style="margin:0 0 10px 0; color:var(--accent)">🎯 Picker IA (Catálogo Completo)</h4>
            <input type="file" accept="image/*" onchange="window.loadPickerImage(event)">
            <canvas id="canvasPicker" style="display:none; cursor:crosshair; width:100%; border-radius:8px; margin-top:10px;"></canvas>
            <div id="pickerResults"></div>
        </div>
        <h4>🧪 Mezclador (Base 10)</h4>
        <div id="mixerInputs" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;"></div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-top:15px; background:rgba(0,0,0,0.3); padding:10px; border-radius:10px;">
            <div id="mixerResultPreview" style="height:100px; border-radius:10px; border:1px solid #444; display:flex; align-items:center; justify-content:center; font-weight:bold;">#---</div>
            <canvas id="mixerChart" style="max-height:100px;"></canvas>
        </div>
    </section>
</div>

<div id="scanModal" class="modal"><div class="modal-content"><div id="reader"></div><button onclick="window.stopScanner()" style="width:100%; margin-top:10px; background:var(--danger); color:white; border:none; padding:10px; border-radius:6px;">Cerrar Cámara</button></div></div>
<div id="modelPaintsModal" class="modal"><div class="modal-content"><h3>Colores Maqueta</h3><div id="mPaintsList" class="paint-grid" style="grid-template-columns: 1fr;"></div><button onclick="window.toggleModal('modelPaintsModal', false)" style="width:100%; margin-top:10px; background:var(--accent); color:white; border:none; padding:10px; border-radius:6px;">Cerrar</button></div></div>
<div id="infoModal" class="modal"><div class="modal-content"><h3 id="infoTitle"></h3><div id="galleryGrid" style="display:grid; grid-template-columns:1fr 1fr; gap:8px;"></div><input id="urlPhotoInput" placeholder="URLs separadas por ,"><button onclick="window.añadirUrlsAGaleria()" style="width:100%; background:var(--success); color:white; padding:10px; border:none; border-radius:6px;">Añadir</button><button onclick="window.toggleModal('infoModal', false)" style="width:100%; margin-top:10px; background:#444; color:white; border:none; padding:10px; border-radius:6px;">Cerrar</button></div></div>
<div id="formModal" class="modal"><div class="modal-content"><h3>Maqueta</h3><input type="hidden" id="f_id"><input id="f_fabricante" placeholder="Fabricante"><input id="f_modelo" placeholder="Modelo"><input id="f_foto" placeholder="URL Foto"><button onclick="window.guardarModelo()" style="width:100%; background:var(--success); color:white; padding:10px; border:none; border-radius:6px;">Guardar</button><button onclick="window.toggleModal('formModal', false)" style="width:100%; margin-top:5px; background:transparent; border:none; color:white;">Cancelar</button></div></div>
<div id="cartModal" class="modal"><div class="modal-content"><h3>Lista de Compra</h3><div id="cartListContainer"></div><button onclick="window.exportarListaExcel()" style="width:100%; background:var(--success); color:white; padding:12px; border:none; border-radius:6px; margin-top:10px;">Exportar Excel</button><button onclick="window.toggleModal('cartModal', false)" style="width:100%; margin-top:10px; background:#444; color:white; border:none; padding:10px; border-radius:6px;">Volver</button></div></div>
<div id="configModal" class="modal"><div class="modal-content"><h3>Opciones</h3><button onclick="window.toggleTheme()">🌓 Cambiar Tema</button><button onclick="window.exportarExcelPrincipal()" style="background:var(--accent); color:white;">📊 Exportar Stock</button><button onclick="window.signOutUser()" style="background:var(--danger); color:white;">Cerrar Sesión</button><button onclick="window.toggleModal('configModal', false)">Volver</button></div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = { apiKey: "AIzaSyAtWLxQfVqsEt8fLZkGRN-3zSHuzKMUTk8", authDomain: "maikmanmodelsstock.firebaseapp.com", projectId: "maikmanmodelsstock", storageBucket: "maikmanmodelsstock.appspot.com", messagingSenderId: "871520809912", appId: "1:871520809912:web:4042f15ef200832a95d54d" };
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let modelos = [], paintCatalogData = {}, currentModelId = null, html5QrCode = null, mixerChart = null;
let myPaints = JSON.parse(localStorage.getItem('maikman_paints')) || { have: [], buy: [] };

window.login = () => signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value).catch(()=>alert("Error"));
window.signOutUser = () => signOut(auth);
window.toggleModal = (id, show) => document.getElementById(id).style.display = show ? 'flex' : 'none';
window.switchTab = (id, btn) => {
    document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if(btn) btn.classList.add('active');
};
window.toggleTheme = () => document.body.classList.toggle('light');

onAuthStateChanged(auth, user => {
    document.getElementById('login').style.display = user ? 'none' : 'block';
    document.getElementById('app').style.display = user ? 'block' : 'none';
    if(user) cargarTodo();
});

async function cargarTodo() {
    const snap = await getDocs(query(collection(db, "modelos"), orderBy("fabricante")));
    modelos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    try {
        const r = await fetch('pinturas.json');
        paintCatalogData = await r.json();
        const f = document.getElementById('brandFilter');
        f.innerHTML = Object.keys(paintCatalogData).map(b => `<option value="${b}">${b}</option>`).join('');
    } catch(e) { console.error("Error cargando pinturas.json", e); }
    window.renderMaquetas(); window.renderPaintCatalog(); initMixer(); window.updateCartCount();
}

window.renderMaquetas = () => {
    const grid = document.getElementById("grid");
    const q = document.getElementById("search").value.toLowerCase();
    grid.innerHTML = "";
    modelos.filter(m => (m.modelo||"").toLowerCase().includes(q) || (m.fabricante||"").toLowerCase().includes(q)).forEach(m => {
        grid.innerHTML += `<div class="card">
            <img src="${m.foto || 'https://via.placeholder.com/300'}" onclick="window.abrirInfoModelo('${m.id}')">
            <b>${m.modelo}</b><small>${m.fabricante}</small>
            <div class="card-btns">
                <button class="btn-action" style="background:#3498db" onclick="window.abrirInfoModelo('${m.id}')">INFO</button>
                <button class="btn-action" style="background:#9b59b6" onclick="window.abrirPinturasModelo('${m.id}')">COLOR</button>
                <button class="btn-action" style="background:#f39c12" onclick="window.openFormModal('${m.id}')">EDIT</button>
                <button class="btn-action" style="background:var(--danger)" onclick="window.borrarModelo('${m.id}')">DEL</button>
            </div>
        </div>`;
    });
};

window.abrirPinturasModelo = (id) => {
    const m = modelos.find(x => x.id === id);
    const cont = document.getElementById('mPaintsList'); cont.innerHTML = "";
    (m.paints || []).forEach(pid => {
        const p = encontrarPintura(pid);
        const has = myPaints.have.includes(pid);
        cont.innerHTML += `<div class="paint-item-box" style="display:flex; align-items:center; gap:10px; text-align:left;">
            <div class="color-circle" style="background:${p.hex}; margin:0;"></div>
            <div style="flex:1"><b>${p.id}</b><br><small>${p.nombre}</small></div>
            <div style="color:${has?'var(--success)':'var(--danger)'}">${has?'SÍ':'NO'}</div>
        </div>`;
    });
    window.toggleModal('modelPaintsModal', true);
};

window.renderPaintCatalog = () => {
    const brand = document.getElementById('brandFilter').value;
    const search = document.getElementById('paintSearch').value.toLowerCase();
    const container = document.getElementById('paintCatalog');
    container.innerHTML = "";
    if(!paintCatalogData[brand]) return;
    paintCatalogData[brand].filter(p => p.id.toLowerCase().includes(search) || p.nombre.toLowerCase().includes(search)).forEach(p => {
        const have = myPaints.have.includes(p.id);
        const buy = myPaints.buy.includes(p.id);
        container.innerHTML += `<div class="paint-item-box">
            <div class="color-circle" style="background:${p.hex}"></div>
            <span class="paint-id">${p.id}</span>
            <span class="paint-name">${p.nombre}</span>
            <div style="display:flex; gap:5px; justify-content:center;">
                <button onclick="window.togglePaint('${p.id}','have')" style="flex:1; background:${have?'var(--success)':'#444'}">✅</button>
                <button onclick="window.togglePaint('${p.id}','buy')" style="flex:1; background:${buy?'var(--danger)':'#444'}">🛒</button>
            </div>
        </div>`;
    });
};

window.togglePaint = (id, type) => {
    const idx = myPaints[type].indexOf(id);
    if(idx > -1) myPaints[type].splice(idx,1); else myPaints[type].push(id);
    localStorage.setItem('maikman_paints', JSON.stringify(myPaints));
    window.renderPaintCatalog(); window.updateCartCount();
};

// SCANNER
window.startScanner = (target) => {
    window.toggleModal('scanModal', true);
    html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (t) => {
        if(target === 'model') { document.getElementById("search").value = t; window.renderMaquetas(); }
        else { document.getElementById("paintSearch").value = t; window.renderPaintCatalog(); }
        window.stopScanner();
    }).catch(() => window.toggleModal('scanModal', false));
};
window.stopScanner = () => { if(html5QrCode) html5QrCode.stop().then(() => window.toggleModal('scanModal', false)); };

// PICKER
window.loadPickerImage = (e) => {
    const reader = new FileReader(); reader.onload = (ev) => {
        const img = new Image(); img.onload = () => {
            const cvs = document.getElementById('canvasPicker'); const ctx = cvs.getContext('2d');
            cvs.width = img.width; cvs.height = img.height; ctx.drawImage(img, 0, 0); cvs.style.display = 'block';
        }; img.src = ev.target.result;
    }; reader.readAsDataURL(e.target.files[0]);
};

document.getElementById('canvasPicker').onclick = (e) => {
    const cvs = document.getElementById('canvasPicker'); const rect = cvs.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (cvs.width / rect.width);
    const y = (e.clientY - rect.top) * (cvs.height / rect.height);
    const pix = cvs.getContext('2d').getImageData(x,y,1,1).data;
    analizarColorPicker(pix[0], pix[1], pix[2]);
};

function analizarColorPicker(r,g,b) {
    let list = [];
    for(let brnd in paintCatalogData) {
        paintCatalogData[brnd].forEach(p => {
            const t = hexToRgb(p.hex);
            const dist = Math.sqrt((r-t.r)**2 + (g-t.g)**2 + (b-t.b)**2);
            let score = Math.max(0, 100 - (dist / 4.41));
            let prio = brnd.includes("Tamiya") ? 3 : brnd.includes("Ammo") ? 2 : brnd.includes("Color") ? 1 : 0;
            list.push({...p, score, brnd, prio});
        });
    }
    list.sort((a,b) => b.score - a.score || b.prio - a.prio);
    document.getElementById('pickerResults').innerHTML = list.slice(0,3).map(best => `
        <div class="match-card" style="border-color:${best.hex}">
            <b>${best.brnd}: ${best.id}</b> - ${best.score.toFixed(1)}%<br>
            <small>${best.nombre}</small>
            <div class="color-circle" style="background:${best.hex}; margin-top:5px;"></div>
        </div>`).join('');
}

// MIXER (BASE 10)
function initMixer() {
    const cont = document.getElementById('mixerInputs'); cont.innerHTML = "";
    let opts = '<option value="">-</option>';
    for(let b in paintCatalogData) {
        opts += `<optgroup label="${b}">` + paintCatalogData[b].map(p => `<option value="${p.hex}">${p.id}</option>`).join('') + `</optgroup>`;
    }
    for(let i=1; i<=4; i++) {
        cont.innerHTML += `<div style="background:rgba(255,255,255,0.03); padding:8px; border-radius:8px;">
            <select id="mc${i}" onchange="window.calcMix()">${opts}</select>
            <input type="range" id="mv${i}" min="0" max="10" step="0.5" value="0" oninput="window.calcMix()">
            <div id="ml${i}" style="font-size:10px; text-align:right;">0 gotas</div>
        </div>`;
    }
    mixerChart = new Chart(document.getElementById('mixerChart'), { type:'pie', data:{labels:[], datasets:[{data:[], backgroundColor:[]}]}, options:{plugins:{legend:{display:false}}, animation:false} });
}

window.calcMix = () => {
    let r=0, g=0, b=0, tot=0; const lbs=[], dts=[], cls=[];
    for(let i=1; i<=4; i++){
        const h = document.getElementById(`mc${i}`).value, v = parseFloat(document.getElementById(`mv${i}`).value);
        document.getElementById(`ml${i}`).innerText = v + " gotas";
        if(h && v > 0){ const c = hexToRgb(h); r+=c.r*v; g+=c.g*v; b+=c.b*v; tot+=v; lbs.push(document.getElementById(`mc${i}`).selectedOptions[0].text); dts.push(v); cls.push(h); }
    }
    if(tot>0){
        const res = rgbToHex(Math.round(r/tot), Math.round(g/tot), Math.round(b/tot));
        const resDiv = document.getElementById('mixerResultPreview'); resDiv.style.backgroundColor = res; resDiv.innerText = res;
    }
    mixerChart.data.labels = lbs; mixerChart.data.datasets[0].data = dts; mixerChart.data.datasets[0].backgroundColor = cls; mixerChart.update();
};

// EXPORTS
window.exportarExcelPrincipal = () => {
    const ws = XLSX.utils.json_to_sheet(modelos.map(m => ({ MARCA: m.fabricante, MODELO: m.modelo, FOTO: m.foto })));
    const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Stock"); XLSX.writeFile(wb, "Stock_Maikman.xlsx");
};
window.exportarListaExcel = () => {
    const ws = XLSX.utils.json_to_sheet(myPaints.buy.map(id => ({ CODIGO: id, NOMBRE: encontrarPintura(id).nombre })));
    const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Compra"); XLSX.writeFile(wb, "Compra_Pinturas.xlsx");
};

// UTILS
function encontrarPintura(id) { for(let b in paintCatalogData) { let p = paintCatalogData[b].find(x => x.id === id); if(p) return p; } return { nombre: id, hex: "#333", id: id }; }
function hexToRgb(h) { return { r: parseInt(h.slice(1,3),16), g: parseInt(h.slice(3,5),16), b: parseInt(h.slice(5,7),16) }; }
function rgbToHex(r, g, b) { return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1).toUpperCase(); }
window.updateCartCount = () => document.getElementById('cartCount').innerText = myPaints.buy.length;
window.abrirInfoModelo = (id) => { currentModelId = id; const m = modelos.find(x => x.id === id); document.getElementById('infoTitle').innerText = m.modelo; window.toggleModal('infoModal', true); };
window.openFormModal = (id = null) => { if(id) { const m = modelos.find(x => x.id === id); document.getElementById('f_id').value = m.id; document.getElementById('f_fabricante').value = m.fabricante; document.getElementById('f_modelo').value = m.modelo; document.getElementById('f_foto').value = m.foto || ""; } else { document.getElementById('f_id').value = ""; document.getElementById('f_fabricante').value = ""; document.getElementById('f_modelo').value = ""; document.getElementById('f_foto').value = ""; } window.toggleModal('formModal', true); };
window.guardarModelo = async () => { const id = document.getElementById('f_id').value; const d = { fabricante: document.getElementById('f_fabricante').value, modelo: document.getElementById('f_modelo').value, foto: document.getElementById('f_foto').value }; if(id) await updateDoc(doc(db, "modelos", id), d); else await addDoc(collection(db, "modelos"), d); window.toggleModal('formModal', false); cargarTodo(); };
window.borrarModelo = async (id) => { if(confirm("¿Borrar?")) { await deleteDoc(doc(db, "modelos", id)); cargarTodo(); } };
window.abrirModalCompra = (s) => {
    if(!s) { window.toggleModal('cartModal', false); return; }
    const cont = document.getElementById('cartListContainer'); cont.innerHTML = myPaints.buy.map(id => {
        const p = encontrarPintura(id);
        return `<div style="display:flex; align-items:center; gap:10px; padding:10px; border-bottom:1px solid #333;"><div style="width:20px; height:20px; background:${p.hex}; border-radius:4px;"></div><span>${id} - ${p.nombre}</span></div>`;
    }).join('');
    window.toggleModal('cartModal', true);
};
</script>
</body>
</html>
