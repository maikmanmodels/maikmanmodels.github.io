<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Maikman Models - Stock & Colors v5.0</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
    --bg:#0f172a; --card:#020617; --text:#e5e7eb; --accent:#38bdf8; --success:#00b894; --danger:#d63031;
    --min-card-width: 260px;
}
body.light { --bg:#f1f5f9; --card:#fff; --text:#020617; --accent:#2563eb; }
* { box-sizing:border-box; transition:.3s; }
body { margin:0; font-family:system-ui; background:var(--bg); color:var(--text); padding-bottom: 20px; }

/* Navegación Superior Unificada */
.nav-tabs { 
    display: flex; align-items: center; background: var(--card); padding: 8px; gap: 4px; 
    position: sticky; top: 0; z-index: 900; border-bottom: 1px solid #334155; 
}
.tab-btn { 
    flex: 1; padding: 12px 2px; border: none; background: rgba(255,255,255,0.05); 
    color: var(--text); cursor: pointer; border-radius: 8px; font-weight: bold; font-size: 11px;
}
.tab-btn.active { background: var(--accent); color: white; }
.cart-badge { background: var(--danger); color: white; font-size: 10px; padding: 2px 5px; border-radius: 10px; margin-left: 3px; }

#app { display:none; }
.content-section { display: none; padding: 20px; }
.content-section.active { display: block; }

/* Grid Maquetas */
#grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(var(--min-card-width),1fr)); gap:16px; }
.card { background:var(--card); border-radius:12px; padding:12px; border: 1px solid #334155; display: flex; flex-direction: column; }
.card img { width:100%; height:180px; object-fit:cover; border-radius:8px; margin-bottom: 10px; }
.card-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: auto; }
.btn-action { padding: 8px; font-size: 11px; border-radius: 4px; border: none; cursor: pointer; color: white; font-weight: bold; }
.btn-edit { background: #f39c12; } .btn-delete { background: var(--danger); }
.btn-paints { background: #9b59b6; } .btn-info { background: #3498db; }

/* Pinturas y Mixer */
.paint-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }
.paint-item { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 8px; display: flex; align-items: center; gap: 12px; border: 1px solid #334155; }
.color-swatch { width: 25px; height: 25px; border-radius: 5px; border: 1px solid #444; flex-shrink: 0; }
.btn-mini { border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; color: white; background: #334155; }
.btn-mini.active-have { background: var(--success) !important; }
.btn-mini.active-buy { background: var(--danger) !important; }

/* MIXER STYLES */
.mixer-container { display: flex; flex-direction: column; gap: 20px; }
.mixer-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
.mixer-card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #334155; text-align: center; }
.mixer-result { height: 100px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 2px solid #334155; margin-top: 10px; }
input[type="range"] { width: 100%; margin: 10px 0; accent-color: var(--accent); }

/* Modales */
.modal { position:fixed; inset:0; background:rgba(0,0,0,.85); display:none; align-items:center; justify-content:center; z-index:1000; padding:20px; }
.modal-content { background:var(--card); padding:24px; width:100%; max-width:500px; border-radius:12px; display:flex; flex-direction:column; gap:12px; max-height:90vh; overflow-y:auto; }
input, select { padding:10px; border-radius:6px; border: 1px solid #334155; background: #1e293b; color: white; width: 100%; }
</style>
</head>
<body class="dark">

<div id="login" style="max-width:320px; margin:80px auto; padding:20px; text-align:center;">
    <h2>Maikman Stock</h2>
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Contraseña" style="margin-top:10px; margin-bottom:20px">
    <button onclick="login()" style="width:100%; padding:12px; background:var(--accent); color:white; border:none; border-radius:6px; cursor:pointer;">Entrar</button>
</div>

<div id="app">
    <nav class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('tab-maquetas')">📦 MODELOS</button>
        <button class="tab-btn" onclick="switchTab('tab-pinturas')">🎨 PINTURAS</button>
        <button class="tab-btn" onclick="switchTab('tab-mixer')">🧪 MIXER</button>
        <button class="tab-btn" onclick="abrirModalCompra()">🛒 <span id="cartCount" class="cart-badge">0</span></button>
        <button class="tab-btn" style="flex:0.4" onclick="openConfigModal()">⚙️</button>
    </nav>

    <section id="tab-maquetas" class="content-section active">
        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <input id="search" placeholder="Buscar maqueta..." oninput="renderMaquetas()">
            <button onclick="openFormModal()" style="background:var(--accent); color:white; border:none; border-radius:6px; padding:0 15px; cursor:pointer;">➕</button>
        </div>
        <div id="grid"></div>
    </section>

    <section id="tab-pinturas" class="content-section">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:20px;">
            <select id="brandFilter" onchange="renderPaintCatalog()"></select>
            <input id="paintSearch" placeholder="Buscar pintura..." onkeyup="renderPaintCatalog()">
        </div>
        <div id="paintCatalog" class="paint-grid"></div>
    </section>

    <section id="tab-mixer" class="content-section">
        <div class="mixer-container">
            <div class="mixer-cards" id="mixerCardsContainer">
                </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; align-items: start;">
                <div>
                    <div id="mixerResultPreview" class="mixer-result">Mezcla vacía</div>
                    <button onclick="resetMixer()" style="width:100%; margin-top:10px; padding:10px; background:var(--danger); border:none; color:white; border-radius:8px;">Reiniciar Mezclador</button>
                </div>
                <div style="background:rgba(255,255,255,0.05); padding:10px; border-radius:12px;">
                    <canvas id="mixerChart" style="max-height: 180px;"></canvas>
                </div>
            </div>
        </div>
    </section>
</div>

<div id="cartModal" class="modal">
    <div class="modal-content">
        <h3>Lista de Compra</h3>
        <div id="cartListContainer" style="max-height: 400px; overflow-y: auto; margin-bottom: 15px;"></div>
        <div style="display: grid; grid-template-columns: 1fr; gap: 8px;">
            <button onclick="exportarListaExcel(true)" style="background:var(--success); color:white; padding:12px; border:none; border-radius:6px; font-weight:bold;">📥 EXPORTAR MARCADOS</button>
            <button onclick="exportarListaExcel(false)" style="background:var(--accent); color:white; padding:12px; border:none; border-radius:6px; font-weight:bold;">💾 GUARDAR NO MARCADOS</button>
            <button onclick="cerrarModalCompra()" style="background:#555; color:white; padding:10px; border:none; border-radius:6px;">Cerrar</button>
        </div>
    </div>
</div>

<div id="formModal" class="modal"><div class="modal-content"><h3 id="formTitle"></h3><input type="hidden" id="form_id"><input id="form_codigo" placeholder="Código"><input id="form_fabricante" placeholder="Fabricante"><input id="form_modelo" placeholder="Modelo"><input id="form_precio" type="number" step="0.01" placeholder="Precio (€)"><input type="file" id="form_fotoFile" accept="image/*"><button onclick="guardarModelo()" style="background:var(--success); color:white; padding:12px; border:none; border-radius:6px;">Guardar</button><button onclick="closeFormModal()" style="background:#555; color:white; padding:10px; border:none; border-radius:6px;">Cancelar</button></div></div>
<div id="infoModal" class="modal"><div class="modal-content"><h3 id="infoTitle"></h3><div id="infoDetails"></div><hr style="border:0; border-top:1px solid #444;"><b>Galería</b><div id="galleryGrid" style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:10px 0;"></div><input type="file" id="galleryFile" accept="image/*" onchange="subirAFotoGaleria()"><button onclick="document.getElementById('infoModal').style.display='none'" style="padding:10px;">Cerrar</button></div></div>
<div id="modelPaintsModal" class="modal"><div class="modal-content"><h3 id="modelPaintsTitle"></h3><div id="modelPaintsList" class="paint-grid" style="grid-template-columns: 1fr;"></div><button onclick="document.getElementById('modelPaintsModal').style.display='none'" style="padding:12px; background:var(--accent); color:white; border:none; border-radius:6px;">Cerrar</button></div></div>
<div id="configModal" class="modal"><div class="modal-content"><h3>Configuración</h3><button onclick="document.body.classList.toggle('light')" style="padding:10px; margin-bottom:5px;">🌓 Cambiar Tema</button><button onclick="exportarExcelPrincipal()" style="padding:10px; margin-bottom:5px;">📊 Exportar Stock Completo</button><hr style="border:0; border-top:1px solid #444;"><button onclick="signOutUser()" style="background:var(--danger); color:white; padding:12px; border:none; border-radius:6px;">Cerrar Sesión</button><button onclick="closeConfigModal()" style="margin-top:10px; padding:10px;">Volver</button></div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyAtWLxQfVqsEt8fLZkGRN-3zSHuzKMUTk8",
  authDomain: "maikmanmodelsstock.firebaseapp.com",
  projectId: "maikmanmodelsstock",
  storageBucket: "maikmanmodelsstock.appspot.com",
  messagingSenderId: "871520809912",
  appId: "1:871520809912:web:4042f15ef200832a95d54d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

let modelos = [];
let paintCatalogData = {};
let currentModelId = null;
let myPaints = JSON.parse(localStorage.getItem('maikman_paints')) || { have: [], buy: [] };
let mixerChart = null;

// --- LOGIN Y NAVEGACIÓN ---
window.login = () => {
    const e = document.getElementById('email').value;
    const p = document.getElementById('password').value;
    signInWithEmailAndPassword(auth, e, p).catch(() => alert("Error de acceso"));
};
window.signOutUser = () => signOut(auth);

onAuthStateChanged(auth, user => {
    document.getElementById("login").style.display = user ? "none" : "block";
    document.getElementById("app").style.display = user ? "block" : "none";
    if (user) { cargarModelos(); cargarCatalogoPinturas(); updateCartCount(); initMixerUI(); }
});

window.switchTab = (tabId) => {
    document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    event.currentTarget.classList.add('active');
};

// --- GESTIÓN DE MODELOS ---
async function cargarModelos() {
    const snap = await getDocs(query(collection(db, "modelos"), orderBy("fabricante")));
    modelos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderMaquetas();
}

window.renderMaquetas = () => {
    const grid = document.getElementById("grid");
    const q = document.getElementById("search").value.toLowerCase();
    grid.innerHTML = "";
    modelos.filter(m => (m.modelo||"").toLowerCase().includes(q) || (m.fabricante||"").toLowerCase().includes(q)).forEach(m => {
        grid.innerHTML += `<div class="card"><img src="${m.foto || 'https://via.placeholder.com/300x180'}"><div style="font-weight:bold">${m.modelo}</div><div style="font-size:12px; opacity:0.7">${m.fabricante} (${m.codigo||'S/C'})</div><div class="card-btns"><button class="btn-action btn-info" onclick="abrirInfoModelo('${m.id}')">INFO</button><button class="btn-action btn-paints" onclick="abrirPinturasModelo('${m.id}')">PINTURAS</button><button class="btn-action btn-edit" onclick="editarModelo('${m.id}')">EDIT</button><button class="btn-action btn-delete" onclick="borrarModelo('${m.id}')">BORRAR</button></div></div>`;
    });
};

window.openFormModal = () => { document.getElementById('form_id').value = ""; document.getElementById('formModal').style.display = 'flex'; };
window.closeFormModal = () => document.getElementById('formModal').style.display = 'none';
window.guardarModelo = async () => { /* Lógica de guardado Firebase */ }; // Mantén la lógica anterior aquí
window.borrarModelo = async (id) => { if(confirm("¿Borrar?")) { await deleteDoc(doc(db, "modelos", id)); cargarModelos(); } };

// --- PINTURAS ---
async function cargarCatalogoPinturas() {
    try {
        const response = await fetch('pinturas.json');
        paintCatalogData = await response.json();
        const filter = document.getElementById('brandFilter');
        filter.innerHTML = "";
        Object.keys(paintCatalogData).forEach(brand => filter.innerHTML += `<option value="${brand}">${brand}</option>`);
        renderPaintCatalog();
        updateMixerSelectors(); // Carga las pinturas en el mixer
    } catch (err) {}
}

window.renderPaintCatalog = () => {
    const brand = document.getElementById('brandFilter').value;
    const container = document.getElementById('paintCatalog');
    container.innerHTML = "";
    if(paintCatalogData[brand]) paintCatalogData[brand].forEach(p => container.innerHTML += crearHTMLPintura(p));
};

function crearHTMLPintura(p) {
    const isHave = myPaints.have.includes(p.id);
    const isBuy = myPaints.buy.includes(p.id);
    return `<div class="paint-item"><div class="color-swatch" style="background:${p.hex || '#555'}"></div><div style="flex:1"><b>${p.id}</b><br><small>${p.nombre}</small></div><button class="btn-mini ${isHave?'active-have':''}" onclick="togglePaint('${p.id}', 'have')">✅</button><button class="btn-mini ${isBuy?'active-buy':''}" onclick="togglePaint('${p.id}', 'buy')">🛒</button></div>`;
}

window.togglePaint = (id, type) => {
    const idx = myPaints[type].indexOf(id);
    if(idx > -1) myPaints[type].splice(idx, 1);
    else myPaints[type].push(id);
    localStorage.setItem('maikman_paints', JSON.stringify(myPaints));
    renderPaintCatalog(); updateCartCount();
};

window.updateCartCount = () => document.getElementById('cartCount').innerText = myPaints.buy.length;

// --- 🧪 LÓGICA DEL MIXER (ADAPTADA) ---
function initMixerUI() {
    const container = document.getElementById('mixerCardsContainer');
    container.innerHTML = "";
    for(let i=1; i<=5; i++) {
        container.innerHTML += `
            <div class="mixer-card">
                <small>Color ${i}</small>
                <select id="mixColor${i}" onchange="calculateMix()"><option value="">-</option></select>
                <input type="range" id="mixSlider${i}" min="0" max="100" value="0" oninput="updateMixSlider(${i})">
                <div id="mixLabel${i}">0%</div>
            </div>`;
    }
    const ctx = document.getElementById('mixerChart').getContext('2d');
    mixerChart = new Chart(ctx, {
        type: 'pie',
        data: { labels: [], datasets: [{ data: [], backgroundColor: [] }] },
        options: { responsive: true, plugins: { legend: { display: false } } }
    });
}

function updateMixerSelectors() {
    for(let i=1; i<=5; i++) {
        const select = document.getElementById(`mixColor${i}`);
        select.innerHTML = '<option value="">- Vacío -</option>';
        Object.keys(paintCatalogData).forEach(brand => {
            const group = document.createElement('optgroup');
            group.label = brand;
            paintCatalogData[brand].forEach(p => {
                const opt = document.createElement('option');
                opt.value = p.hex;
                opt.text = `${p.id} - ${p.nombre}`;
                opt.dataset.id = p.id;
                group.appendChild(opt);
            });
            select.appendChild(group);
        });
    }
}

window.updateMixSlider = (idx) => {
    document.getElementById(`mixLabel${idx}`).innerText = document.getElementById(`mixSlider${idx}`).value + "%";
    calculateMix();
};

window.calculateMix = () => {
    let r=0, g=0, b=0, total=0;
    const chartLabels = [], chartData = [], chartColors = [];

    for(let i=1; i<=5; i++) {
        const hex = document.getElementById(`mixColor${i}`).value;
        const perc = parseInt(document.getElementById(`mixSlider${i}`).value);
        if(hex && perc > 0) {
            const rgb = hexToRgb(hex);
            r += rgb.r * perc; g += rgb.g * perc; b += rgb.b * perc;
            total += perc;
            const opt = document.getElementById(`mixColor${i}`).selectedOptions[0];
            chartLabels.push(opt.text);
            chartData.push(perc);
            chartColors.push(hex);
        }
    }

    const preview = document.getElementById('mixerResultPreview');
    if(total > 0) {
        const resHex = rgbToHex(Math.round(r/total), Math.round(g/total), Math.round(b/total));
        preview.style.backgroundColor = resHex;
        preview.innerText = resHex;
        preview.style.color = (r+g+b)/total > 380 ? 'black' : 'white';
    } else {
        preview.style.backgroundColor = 'transparent';
        preview.innerText = "Mezcla vacía";
    }

    mixerChart.data.labels = chartLabels;
    mixerChart.data.datasets[0].data = chartData;
    mixerChart.data.datasets[0].backgroundColor = chartColors;
    mixerChart.update();
};

window.resetMixer = () => {
    for(let i=1; i<=5; i++) {
        document.getElementById(`mixColor${i}`).value = "";
        document.getElementById(`mixSlider${i}`).value = 0;
        document.getElementById(`mixLabel${i}`).innerText = "0%";
    }
    calculateMix();
};

function hexToRgb(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return {r, g, b};
}
function rgbToHex(r, g, b) {
    return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1).toUpperCase();
}

// --- RESTO DE FUNCIONES (EXPORT, MODALES COMPRA ETC.) ---
// (Mantener todas las funciones de la versión anterior)
window.abrirModalCompra = () => { /* ... lógica anterior ... */ };
window.exportarListaExcel = (soloMarcados) => { /* ... lógica anterior ... */ };
window.exportarExcelPrincipal = () => { /* ... lógica anterior con el fix de pinturas ... */ };

</script>
</body>
</html>
