<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Maikman Models - Stock & Colors Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
    --bg:#0f172a; --card:#020617; --text:#e5e7eb; --accent:#38bdf8; --success:#00b894; --danger:#d63031;
    --min-card-width: 260px;
}
body.light { --bg:#f1f5f9; --card:#fff; --text:#020617; --accent:#2563eb; }
* { box-sizing:border-box; transition:.3s; }
body { margin:0; font-family:system-ui; background:var(--bg); color:var(--text); padding-bottom: 20px; }

/* Navegación Superior Unificada */
.nav-tabs { 
    display: flex; 
    align-items: center;
    background: var(--card); 
    padding: 8px; 
    gap: 6px; 
    position: sticky; 
    top: 0; 
    z-index: 900; 
    border-bottom: 1px solid #334155; 
}
.tab-btn { 
    flex: 2; 
    padding: 12px 5px; 
    border: none; 
    background: rgba(255,255,255,0.05); 
    color: var(--text); 
    cursor: pointer; 
    border-radius: 8px; 
    font-weight: bold; 
    font-size: 12px;
    white-space: nowrap;
}
.tab-btn-compact { 
    flex: 1; 
    min-width: fit-content; 
    padding: 12px 10px;
}
.tab-btn.active { background: var(--accent); color: white; }

.cart-badge {
    background: var(--danger);
    color: white;
    font-size: 10px;
    padding: 2px 5px;
    border-radius: 10px;
    margin-left: 3px;
}

#app { display:none; }
.content-section { display: none; padding: 20px; }
.content-section.active { display: block; }

/* Grid Maquetas */
#grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(var(--min-card-width),1fr)); gap:16px; }
.card { background:var(--card); border-radius:12px; padding:12px; border: 1px solid #334155; display: flex; flex-direction: column; }
.card img { width:100%; height:180px; object-fit:cover; border-radius:8px; margin-bottom: 10px; }

.card-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: auto; }
.btn-action { padding: 8px; font-size: 11px; border-radius: 4px; border: none; cursor: pointer; color: white; font-weight: bold; }
.btn-edit { background: #f39c12; } 
.btn-delete { background: var(--danger); }
.btn-paints { background: #9b59b6; } 
.btn-info { background: #3498db; }

/* Formato de Pinturas */
.paint-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }
.paint-item { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 8px; display: flex; align-items: center; gap: 12px; border: 1px solid #334155; }
.color-swatch { width: 25px; height: 25px; border-radius: 5px; border: 1px solid #444; flex-shrink: 0; }
.btn-mini { border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; color: white; background: #334155; }
.btn-mini.active-have { background: var(--success) !important; }
.btn-mini.active-buy { background: var(--danger) !important; }

/* Modales */
.modal { position:fixed; inset:0; background:rgba(0,0,0,.85); display:none; align-items:center; justify-content:center; z-index:1000; padding:20px; }
.modal-content { background:var(--card); padding:24px; width:100%; max-width:500px; border-radius:12px; display:flex; flex-direction:column; gap:12px; max-height:90vh; overflow-y:auto; }
input, select { padding:10px; border-radius:6px; border: 1px solid #334155; background: #1e293b; color: white; width: 100%; }
</style>
</head>
<body class="dark">

<div id="login" style="max-width:320px; margin:80px auto; padding:20px; text-align:center;">
    <h2>Maikman Stock</h2>
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Contraseña" style="margin-top:10px; margin-bottom:20px">
    <button onclick="login()" style="width:100%; padding:12px; background:var(--accent); color:white; border:none; border-radius:6px; cursor:pointer;">Entrar</button>
</div>

<div id="app">
    <nav class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('tab-maquetas')">📦 MAQUETAS</button>
        <button class="tab-btn" onclick="switchTab('tab-pinturas')">🎨 PINTURAS</button>
        <button class="tab-btn tab-btn-compact" onclick="exportShoppingList()">🛒 COMPRA <span id="cartCount" class="cart-badge">0</span></button>
        <button class="tab-btn tab-btn-compact" onclick="openConfigModal()">⚙️</button>
    </nav>

    <section id="tab-maquetas" class="content-section active">
        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <input id="search" placeholder="Buscar maqueta..." oninput="renderMaquetas()">
            <button onclick="openAddModal()" style="background:var(--accent); color:white; border:none; border-radius:6px; padding:0 15px; cursor:pointer;">➕</button>
        </div>
        <div id="grid"></div>
    </section>

    <section id="tab-pinturas" class="content-section">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:20px;">
            <select id="brandFilter" onchange="renderPaintCatalog()"></select>
            <input id="paintSearch" placeholder="Buscar pintura..." onkeyup="renderPaintCatalog()">
        </div>
        <div id="paintCatalog" class="paint-grid"></div>
    </section>
</div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Nuevo Modelo</h3>
        <input type="hidden" id="edit_id">
        <input id="edit_codigo" placeholder="Código">
        <input id="edit_fabricante" placeholder="Fabricante">
        <input id="edit_modelo" placeholder="Nombre del modelo">
        <input id="edit_precio" type="number" step="0.01" placeholder="Precio (€)">
        <p style="font-size:12px; margin:0">Imagen principal (dejar vacío para mantener)</p>
        <input type="file" id="edit_fotoFile" accept="image/*">
        <button onclick="guardarModelo()" style="background:var(--success); color:white; padding:12px; border:none; border-radius:6px; cursor:pointer;">Guardar</button>
        <button onclick="closeEditModal()" style="background:#555; color:white; padding:10px; border:none; border-radius:6px; cursor:pointer;">Cancelar</button>
    </div>
</div>

<div id="modelPaintsModal" class="modal">
    <div class="modal-content">
        <h3 id="modelPaintsTitle">Pinturas</h3>
        <div id="modelPaintsList" class="paint-grid" style="grid-template-columns: 1fr;"></div>
        <button onclick="document.getElementById('modelPaintsModal').style.display='none'" style="margin-top:10px; padding:12px; background:var(--accent); color:white; border:none; border-radius:6px; cursor:pointer;">Cerrar</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyAtWLxQfVqsEt8fLZkGRN-3zSHuzKMUTk8",
  authDomain: "maikmanmodelsstock.firebaseapp.com",
  projectId: "maikmanmodelsstock",
  storageBucket: "maikmanmodelsstock.appspot.com",
  messagingSenderId: "871520809912",
  appId: "1:871520809912:web:4042f15ef200832a95d54d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

let modelos = [];
let paintCatalogData = {};
let myPaints = JSON.parse(localStorage.getItem('maikman_paints')) || { have: [], buy: [] };

// --- LOGIN ---
window.login = () => {
    const e = document.getElementById('email').value;
    const p = document.getElementById('password').value;
    signInWithEmailAndPassword(auth, e, p).catch(() => alert("Error de acceso"));
};
window.signOutUser = () => signOut(auth);

onAuthStateChanged(auth, user => {
    document.getElementById("login").style.display = user ? "none" : "block";
    document.getElementById("app").style.display = user ? "block" : "none";
    if (user) { cargarModelos(); cargarCatalogoPinturas(); updateCartCount(); }
});

window.switchTab = (tabId) => {
    document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    event.currentTarget.classList.add('active');
};

// --- GESTIÓN MODELOS ---
async function cargarModelos() {
    const snap = await getDocs(query(collection(db, "modelos"), orderBy("fabricante")));
    modelos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderMaquetas();
}

window.renderMaquetas = () => {
    const grid = document.getElementById("grid");
    const q = document.getElementById("search").value.toLowerCase();
    grid.innerHTML = "";
    modelos.filter(m => (m.modelo||"").toLowerCase().includes(q) || (m.fabricante||"").toLowerCase().includes(q)).forEach(m => {
        grid.innerHTML += `
            <div class="card">
                <img src="${m.foto || 'https://via.placeholder.com/300x180'}">
                <div style="font-weight:bold">${m.modelo}</div>
                <div style="font-size:12px; opacity:0.7">${m.fabricante} (${m.codigo||'S/C'})</div>
                <div class="card-btns">
                    <button class="btn-action btn-paints" onclick="abrirPinturasModelo('${m.id}')">PINTURAS</button>
                    <button class="btn-action btn-info" onclick="alert('Info pronto')">INFO</button>
                    <button class="btn-action btn-edit" onclick="editarModelo('${m.id}')">EDIT</button>
                    <button class="btn-action btn-delete" onclick="borrarModelo('${m.id}')">BORRAR</button>
                </div>
            </div>`;
    });
};

// FUNCIÓN EDITAR (ARREGLADA)
window.editarModelo = (id) => {
    const m = modelos.find(x => x.id === id);
    if(!m) return;
    document.getElementById('modalTitle').innerText = "Editar Modelo";
    document.getElementById('edit_id').value = m.id;
    document.getElementById('edit_codigo').value = m.codigo || "";
    document.getElementById('edit_fabricante').value = m.fabricante || "";
    document.getElementById('edit_modelo').value = m.modelo || "";
    document.getElementById('edit_precio').value = m.precio || "";
    document.getElementById('editModal').style.display = 'flex';
};

window.openAddModal = () => {
    document.getElementById('modalTitle').innerText = "Nuevo Modelo";
    document.getElementById('edit_id').value = "";
    document.getElementById('edit_codigo').value = "";
    document.getElementById('edit_fabricante').value = "";
    document.getElementById('edit_modelo').value = "";
    document.getElementById('edit_precio').value = "";
    document.getElementById('editModal').style.display = 'flex';
};

window.closeEditModal = () => document.getElementById('editModal').style.display = 'none';

window.guardarModelo = async () => {
    const id = document.getElementById('edit_id').value;
    const file = document.getElementById('edit_fotoFile').files[0];
    let fotoUrl = null;

    if(file) {
        const r = ref(storage, `fotos/${Date.now()}_${file.name}`);
        await uploadBytes(r, file);
        fotoUrl = await getDownloadURL(r);
    }

    const data = {
        codigo: document.getElementById('edit_codigo').value,
        fabricante: document.getElementById('edit_fabricante').value,
        modelo: document.getElementById('edit_modelo').value,
        precio: document.getElementById('edit_precio').value
    };
    if(fotoUrl) data.foto = fotoUrl;

    if(id) {
        await updateDoc(doc(db, "modelos", id), data);
    } else {
        await addDoc(collection(db, "modelos"), data);
    }
    
    closeEditModal();
    cargarModelos();
};

window.borrarModelo = async (id) => {
    if(confirm("¿Seguro que quieres borrarlo?")) {
        await deleteDoc(doc(db, "modelos", id));
        cargarModelos();
    }
};

// --- GESTIÓN PINTURAS ---
async function cargarCatalogoPinturas() {
    try {
        const response = await fetch('pinturas.json');
        paintCatalogData = await response.json();
        const filter = document.getElementById('brandFilter');
        filter.innerHTML = "";
        Object.keys(paintCatalogData).forEach(brand => {
            filter.innerHTML += `<option value="${brand}">${brand}</option>`;
        });
        renderPaintCatalog();
    } catch (err) { console.warn("pinturas.json no cargado"); }
}

window.renderPaintCatalog = () => {
    const brand = document.getElementById('brandFilter').value;
    const container = document.getElementById('paintCatalog');
    container.innerHTML = "";
    if(!paintCatalogData[brand]) return;
    paintCatalogData[brand].forEach(p => container.innerHTML += crearHTMLPintura(p));
};

function crearHTMLPintura(p) {
    const isHave = myPaints.have.includes(p.id);
    const isBuy = myPaints.buy.includes(p.id);
    return `
        <div class="paint-item">
            <div class="color-swatch" style="background:${p.hex || '#555'}"></div>
            <div style="flex:1"><b>${p.id}</b><br><small>${p.nombre}</small></div>
            <button class="btn-mini ${isHave?'active-have':''}" onclick="togglePaint('${p.id}', 'have')">✅</button>
            <button class="btn-mini ${isBuy?'active-buy':''}" onclick="togglePaint('${p.id}', 'buy')">🛒</button>
        </div>`;
}

window.togglePaint = (id, type) => {
    const idx = myPaints[type].indexOf(id);
    if(idx > -1) myPaints[type].splice(idx, 1);
    else myPaints[type].push(id);
    localStorage.setItem('maikman_paints', JSON.stringify(myPaints));
    
    renderPaintCatalog(); 
    if(document.getElementById('modelPaintsModal').style.display === 'flex') {
        const currentId = document.getElementById('modelPaintsModal').dataset.modelId;
        abrirPinturasModelo(currentId); 
    }
    updateCartCount();
};

window.updateCartCount = () => {
    document.getElementById('cartCount').innerText = myPaints.buy.length;
};

window.abrirPinturasModelo = (modelId) => {
    const m = modelos.find(x => x.id === modelId);
    const modal = document.getElementById('modelPaintsModal');
    const list = document.getElementById('modelPaintsList');
    modal.dataset.modelId = modelId;
    document.getElementById('modelPaintsTitle').innerText = "Pinturas: " + m.modelo;
    list.innerHTML = "";
    
    if(m.paints && m.paints.length > 0) {
        m.paints.forEach(pCode => {
            let infoPintura = encontrarPinturaPorCodigo(pCode);
            list.innerHTML += infoPintura ? crearHTMLPintura(infoPintura) : `<div class="paint-item"><b>${pCode}</b> (S/D)</div>`;
        });
    } else { list.innerHTML = "<p>Sin pinturas asignadas.</p>"; }
    modal.style.display = 'flex';
};

function encontrarPinturaPorCodigo(codigo) {
    for (let marca in paintCatalogData) {
        let p = paintCatalogData[marca].find(x => x.id === codigo);
        if(p) return p;
    }
    return null;
}

window.exportShoppingList = () => {
    if(myPaints.buy.length === 0) return alert("Lista vacía");
    navigator.clipboard.writeText("Lista Maikman: " + myPaints.buy.join(", "));
    alert("¡Lista copiada!");
};

window.openConfigModal = () => document.getElementById('configModal').style.display = 'flex';

</script>
</body>
</html>
