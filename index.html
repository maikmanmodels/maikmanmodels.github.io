<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maikman Models - Stock & Control</title>
    <style>
        :root { --primary: #2d3436; --accent: #0984e3; --danger: #d63031; --success: #00b894; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #dfe6e9; margin: 0; padding: 20px; color: #2d3436; }
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        h1 { text-align: center; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        
        /* Pestañas */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: #b2bec3; cursor: pointer; border-radius: 6px; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: white; }

        .content-section { display: none; }
        .content-section.active { display: block; }

        /* Estilos Pinturas */
        .controls { display: flex; gap: 10px; margin-bottom: 15px; }
        select, input { padding: 10px; border-radius: 5px; border: 1px solid #ccc; flex-grow: 1; }
        
        .pintura-card { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #eee; transition: 0.2s; }
        .pintura-card:hover { background: #f9f9f9; }
        .color-circle { width: 24px; height: 24px; border-radius: 50%; margin-right: 15px; border: 1px solid #ddd; }
        .info { flex-grow: 1; }
        .info span { display: block; font-size: 0.8em; color: #636e72; }
        
        .btn-status { border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 0.9em; margin-left: 5px; }
        .btn-have { background: #eee; color: #636e72; }
        .btn-have.active { background: var(--success); color: white; }
        .btn-buy { background: #eee; color: #636e72; }
        .btn-buy.active { background: var(--danger); color: white; }

        /* Lista Compra */
        .shopping-list { background: #f1f2f6; padding: 15px; border-radius: 8px; margin-top: 20px; border-left: 5px solid var(--accent); }
        .copy-btn { width: 100%; background: var(--accent); color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🛠️ Maikman Models</h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('maquetas')">MAQUETAS</button>
        <button class="tab-btn" onclick="showTab('pinturas')">PINTURAS</button>
    </div>

    <section id="maquetas" class="content-section active">
        <h3>Mi Stock de Maquetas</h3>
        <p><em>Aquí puedes seguir listando tus maquetas como lo hacías antes...</em></p>
    </section>

    <section id="pinturas" class="content-section">
        <div class="controls">
            <select id="brandSelect" onchange="renderPaints()">
                </select>
            <input type="text" id="searchInput" placeholder="Buscar color o ID..." onkeyup="renderPaints()">
        </div>

        <div id="paintList"></div>

        <div class="shopping-list">
            <strong>🛒 Lista de la Compra:</strong>
            <p id="shoppingText">No hay pinturas marcadas para comprar.</p>
            <button class="copy-btn" onclick="copyList()">Copiar para WhatsApp</button>
        </div>
    </section>
</div>

<script>
    let globalCatalog = {};
    let myStock = JSON.parse(localStorage.getItem('maikman_stock')) || { owned: [], buy: [] };

    // 1. Cargar el JSON externo
    async function loadData() {
        try {
            const response = await fetch('pinturas.json');
            globalCatalog = await response.json();
            
            const selector = document.getElementById('brandSelect');
            Object.keys(globalCatalog).forEach(brand => {
                let opt = document.createElement('option');
                opt.value = brand;
                opt.innerHTML = brand;
                selector.appendChild(opt);
            });
            renderPaints();
        } catch (e) { console.error("Error cargando JSON. Asegúrate de que el archivo existe."); }
    }

    // 2. Dibujar las pinturas
    function renderPaints() {
        const brand = document.getElementById('brandSelect').value;
        const search = document.getElementById('searchInput').value.toLowerCase();
        const container = document.getElementById('paintList');
        container.innerHTML = "";

        if(!globalCatalog[brand]) return;

        globalCatalog[brand].forEach(p => {
            if(p.nombre.toLowerCase().includes(search) || p.id.toLowerCase().includes(search)) {
                const isOwned = myStock.owned.includes(p.id);
                const isToBuy = myStock.buy.includes(p.id);

                container.innerHTML += `
                    <div class="pintura-card">
                        <div class="color-circle" style="background:${p.hex}"></div>
                        <div class="info">
                            <strong>${p.id}</strong>
                            <span>${p.nombre}</span>
                        </div>
                        <button class="btn-status btn-have ${isOwned?'active':''}" onclick="toggleStatus('${p.id}', 'owned')">✅</button>
                        <button class="btn-status btn-buy ${isToBuy?'active':''}" onclick="toggleStatus('${p.id}', 'buy')">🛒</button>
                    </div>
                `;
            }
        });
        updateShoppingSummary();
    }

    // 3. Gestionar estados
    function toggleStatus(id, type) {
        const index = myStock[type].indexOf(id);
        if(index > -1) myStock[type].splice(index, 1);
        else myStock[type].push(id);
        
        localStorage.setItem('maikman_stock', JSON.stringify(myStock));
        renderPaints();
    }

    // 4. Resumen y Copiar
    function updateShoppingSummary() {
        const textElem = document.getElementById('shoppingText');
        textElem.innerText = myStock.buy.length > 0 ? myStock.buy.join(", ") : "Lista vacía";
    }

    function copyList() {
        if(myStock.buy.length === 0) return alert("Lista vacía");
        const txt = "Maikman Models - Lista de Compra: " + myStock.buy.join(", ");
        navigator.clipboard.writeText(txt);
        alert("¡Copiado!");
    }

    // Navegación
    function showTab(tabId) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    loadData();
</script>

</body>
</html>
